<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concentric Circles Three.js</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #050505;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <!-- Import Three.js via CDN -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // --- Scene setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 30;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- Global shader variables ---
    let uniforms;
    let geometry;
    let material;
    let mesh;

    // --- Build concentric circles particle system ---
    function createConcentricCircles() {
      const particleCount = 15000;

      // Flat geometry on XZ plane
      geometry = new THREE.BufferGeometry();
      const positions = [];
      const colors = [];

      const numRings = 8;
      const maxRadius = 15;

      for (let i = 0; i < particleCount; i++) {
        const ringIndex = Math.floor(i / (particleCount / numRings));

        // Radius based on ring index
        const ringRadiusBase = (ringIndex + 1) * (maxRadius / numRings);

        // Slightly denser distribution near each ring edge
        let r = Math.random() * ringRadiusBase;
        if (r > ringRadiusBase * 0.8) {
          r = ringRadiusBase - (Math.random() * (ringRadiusBase * 0.2));
        }

        const theta = Math.random() * Math.PI * 2;

        positions.push(r * Math.cos(theta));
        positions.push(0); // Y is zero (flat plane)
        positions.push(r * Math.sin(theta));

        const hue = ringIndex / numRings;
        colors.push(hue, 1 - hue / 2, 0.5 + Math.random() * 0.5);
      }

      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

      return { geometry, particleCount };
    }

    const circleData = createConcentricCircles();

    // --- Vertex shader ---
    const vertexShader = `
      uniform float uTime;
      uniform float uSpeed;
      attribute vec3 color;
      varying vec3 vColor;
      varying float vDistanceFromCenter;
      varying float vRingRadius;

      vec2 rotate(float x, float z, float angle) {
        float s = sin(angle);
        float c = cos(angle);
        return vec2(x * c - z * s, x * s + z * c);
      }

      void main() {
        // Radial distance (used to create wave bands)
        vRingRadius = length(position.xz);
        vDistanceFromCenter = vRingRadius;

        // Rotate particles around Y axis
        float angle = uTime * uSpeed + (position.x * 0.5);
        vec2 rotatedPos = rotate(position.x, position.z, angle);

        vec4 mvPosition = modelViewMatrix * vec4(rotatedPos.x, position.y, rotatedPos.y, 1.0);
        gl_Position = projectionMatrix * mvPosition;

        // Important: without point size, particles become almost invisible
        gl_PointSize = 3.0 * (30.0 / -mvPosition.z);

        vColor = color;
      }
    `;

    // --- Fragment shader ---
    const fragmentShader = `
      uniform float uTime;
      varying vec3 vColor;
      varying float vDistanceFromCenter;
      varying float vRingRadius;

      void main() {
        // Circular point sprite
        vec2 uv = gl_PointCoord - vec2(0.5);
        float d = length(uv);
        if (d > 0.5) discard;

        // Ring wave over time
        float wave = sin(vDistanceFromCenter * 4.5 - uTime * 2.2) * 0.5 + 0.5;

        vec3 finalColor = mix(vColor, vec3(1.0), wave * 0.75);

        // Soft edge fade
        float alpha = smoothstep(0.5, 0.15, d);
        gl_FragColor = vec4(finalColor, alpha);
      }
    `;

    // --- Shader material ---
    uniforms = {
      uTime: { value: 0 },
      uSpeed: { value: 0.5 }
    };

    material = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    mesh = new THREE.Points(circleData.geometry, material);
    scene.add(mesh);

    // --- Animation loop ---
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const elapsedTime = clock.getElapsedTime();
      uniforms.uTime.value = elapsedTime;

      // Subtle breathing scale effect
      mesh.scale.setScalar(1 + Math.sin(elapsedTime * 0.5) * 0.05);

      renderer.render(scene, camera);
    }

    // --- Responsive resize ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>

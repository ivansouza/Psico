<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa do Mundo 2026 — Grupos & Mata-Mata</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 1500px; margin: 0 auto; }

  /* ===== HEADER ===== */
  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  header h1 {
    font-size: 2.2rem;
    font-weight: 900;
    background: linear-gradient(135deg, #f59e0b, #ef4444, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  header p { color: #94a3b8; font-size: 0.9rem; margin-top: 0.4rem; }
  .last-update { color: #64748b; font-size: 0.8rem; margin-top: 0.3rem; }
  .last-update .live-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: #22c55e;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ===== SEÇÃO TITLE ===== */
  .section-title {
    font-size: 1.4rem;
    font-weight: 800;
    margin: 2.5rem 0 1.2rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title .bar {
    flex: 1;
    height: 2px;
    background: linear-gradient(90deg, #2d3a4e, transparent);
  }

  /* ===== GRUPOS ===== */
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.2rem;
  }
  .group-card {
    background: linear-gradient(145deg, #1e293b, #1a2332);
    border-radius: 14px;
    border: 1px solid #2d3a4e;
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
  }
  .group-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,.4);
  }
  .group-header {
    padding: .9rem 1.2rem;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid #2d3a4e;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .group-header .group-label { color: #f59e0b; }
  .group-header .group-status {
    font-size: .7rem;
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
    color: #64748b;
  }
  .group-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  .group-table thead th {
    padding: .6rem .5rem;
    text-align: center;
    font-weight: 600;
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: #64748b;
    border-bottom: 1px solid #2d3a4e;
  }
  .group-table thead th:first-child { text-align: left; padding-left: 1rem; width: 40%; }
  .group-table tbody tr { transition: background .15s; }
  .group-table tbody tr:hover { background: rgba(255,255,255,.03); }
  .group-table tbody td {
    padding: .55rem .5rem;
    text-align: center;
    border-bottom: 1px solid #1e293b;
    font-weight: 500;
  }
  .group-table tbody td:first-child { text-align: left; padding-left: 1rem; }
  .team-cell { display: flex; align-items: center; gap: 8px; }
  .team-cell .pos { font-weight: 700; color: #64748b; min-width: 16px; font-size: .75rem; }
  .team-cell .flag { width: 22px; height: 16px; border-radius: 2px; object-fit: cover; flex-shrink: 0; }
  .team-cell .name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .team-cell .fifa-code { color: #64748b; font-size: .7rem; font-weight: 500; }
  .qualified-1 td:first-child .team-cell .pos { color: #22c55e; }
  .qualified-2 td:first-child .team-cell .pos { color: #3b82f6; }
  .pts-cell { font-weight: 800; font-size: .95rem; color: #f59e0b; }
  .gd-neg { color: #ef4444; }
  .gd-pos { color: #22c55e; }

  /* ===== BRACKET MATA-MATA ===== */
  .bracket-section {
    margin-top: 1rem;
    overflow-x: auto;
    padding-bottom: 1rem;
  }
  .bracket {
    display: flex;
    gap: 20px;
    min-width: 1100px;
    justify-content: center;
    padding: 1rem 0;
  }
  .bracket-round {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    gap: 12px;
    min-width: 200px;
  }
  .bracket-round-title {
    text-align: center;
    font-size: .75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #64748b;
    padding-bottom: 6px;
    border-bottom: 1px solid #2d3a4e;
    margin-bottom: 4px;
  }
  .bracket-match {
    background: linear-gradient(145deg, #1e293b, #1a2332);
    border: 1px solid #2d3a4e;
    border-radius: 10px;
    padding: 10px 14px;
    transition: transform .15s, box-shadow .15s;
    position: relative;
  }
  .bracket-match:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,0,0,.3);
  }
  .bracket-match .match-teams {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .bracket-match .team-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 3px 0;
  }
  .bracket-match .team-row .team-info {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 0;
  }
  .bracket-match .team-row .team-info .flag {
    width: 18px; height: 13px;
    border-radius: 2px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .bracket-match .team-row .team-info .name {
    font-size: .78rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bracket-match .team-row .score {
    font-weight: 800;
    font-size: .85rem;
    color: #f59e0b;
    min-width: 22px;
    text-align: center;
  }
  .bracket-match .team-row .score.empty { color: #475569; }
  .bracket-match .team-row.winner .team-info .name { color: #22c55e; }
  .bracket-match .team-row.winner .score { color: #22c55e; }
  .bracket-match .match-vs {
    text-align: center;
    font-size: .65rem;
    color: #475569;
    font-weight: 500;
    letter-spacing: 1px;
    line-height: 1;
  }
  .bracket-match .match-label {
    font-size: .6rem;
    color: #475569;
    text-align: center;
    margin-top: 4px;
    padding-top: 4px;
    border-top: 1px solid #1e293b;
  }
  .bracket-match.pending {
    opacity: .5;
  }
  .bracket-match.pending .team-row .team-info .name { color: #64748b; }

  /* Confirmado vs Provável */
  .bracket-match.confirmed {
    border-color: #22c55e44;
  }
  .bracket-match.confirmed .match-label {
    color: #22c55e;
    font-weight: 600;
  }
  .bracket-match.probable {
    border-color: #f59e0b44;
    border-style: dashed;
  }
  .bracket-match.probable .match-label {
    color: #f59e0b;
  }
  .bracket-match.probable .team-row .team-info .name::after {
    content: ' (provável)';
    font-size: .6rem;
    color: #f59e0b;
    font-weight: 400;
    margin-left: 2px;
  }

  /* Campeão */
  .champion-box {
    background: linear-gradient(135deg, #f59e0b22, #ef444422);
    border: 2px solid #f59e0b;
    border-radius: 14px;
    padding: 16px;
    text-align: center;
    min-width: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .champion-box .trophy { font-size: 2rem; }
  .champion-box .champ-label {
    font-size: .65rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #f59e0b;
    font-weight: 700;
  }
  .champion-box .champ-team {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .champion-box .champ-team .flag { width: 32px; height: 22px; border-radius: 3px; }
  .champion-box .champ-team .name {
    font-size: 1.1rem;
    font-weight: 800;
    color: #fbbf24;
  }
  .champion-box .champ-empty {
    color: #475569;
    font-size: .85rem;
    font-weight: 500;
  }

  /* ===== LOADING / ERROR ===== */
  .loading-state, .error-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 2rem;
  }
  .loading-state .spinner {
    width: 40px; height: 40px;
    border: 3px solid #2d3a4e;
    border-top-color: #f59e0b;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-state { color: #f87171; }
  .error-state .retry-btn {
    margin-top: 1rem;
    padding: .6rem 1.5rem;
    background: #3b82f6;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
  }
  .error-state .retry-btn:hover { background: #2563eb; }

  /* ===== RESPONSIVO ===== */
  @media (max-width: 720px) {
    body { padding: 1rem .6rem; }
    header h1 { font-size: 1.5rem; }
    .groups-grid { grid-template-columns: 1fr; }
    .group-table { font-size: .75rem; }
    .team-cell .name { font-size: .75rem; }
    .bracket { min-width: auto; flex-direction: column; align-items: stretch; }
    .bracket-round { min-width: auto; }
  }

  /* ===== FOOTER ===== */
  footer {
    text-align: center;
    margin-top: 2.5rem;
    color: #475569;
    font-size: .75rem;
  }
  footer a { color: #64748b; text-decoration: none; }
  footer a:hover { color: #94a3b8; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🏆 Copa do Mundo 2026</h1>
    <p>🇺🇸 Estados Unidos · 🇲🇽 México · 🇨🇦 Canadá</p>
    <div class="last-update">
      <span class="live-dot"></span>
      <span id="update-time">Carregando...</span>
    </div>
  </header>

  <!-- GRUPOS -->
  <div class="section-title">
    <span>📋 Fase de Grupos</span>
    <span class="bar"></span>
  </div>
  <div id="groups-container" class="groups-grid">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Buscando dados da Copa...</p>
    </div>
  </div>

  <!-- MATA-MATA (só aparece após carregar grupos) -->
  <div id="bracket-wrapper" style="display:none">
    <div class="section-title">
      <span>🏅 Fase Final</span>
      <span class="bar"></span>
    </div>
    <div class="bracket-section">
      <div id="bracket-container" class="bracket">
        <div class="loading-state" style="grid-column:auto">
          <div class="spinner"></div>
          <p>Calculando confrontos...</p>
        </div>
      </div>
    </div>
  </div>

  <footer>
    Dados via <a href="https://worldcup26.ir" target="_blank">worldcup26.ir</a> ·
    <a href="https://github.com/rezarahiminia/worldcup2026" target="_blank">API gratuita</a>
  </footer>
</div>

<script>
(async () => {
  const groupsContainer = document.getElementById('groups-container');
  const bracketContainer = document.getElementById('bracket-container');
  const updateTime = document.getElementById('update-time');

  let teamsMap = {};
  const groupOrder = ['A','B','C','D','E','F','G','H','I','J','K','L'];

  async function fetchJSON(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  // ===== CRUZAMENTO OFICIAL COPA 2026 (48 times, 12 grupos) =====
  // Oitavas de final (32 times): 1º grupo vs 2º grupo
  // 1ºA vs 2ºB → O1   1ºC vs 2ºD → O2   1ºE vs 2ºF → O3   1ºG vs 2ºH → O4
  // 1ºI vs 2ºJ → O5   1ºK vs 2ºL → O6   + melhores 3ºs...
  // Na real, a Copa 2026 tem 12 grupos de 4, passam 32 times:
  // 12 primeiros + 12 segundos + 8 melhores terceiros
  // Para simplificar e ficar visual, vamos usar o formato:
  // 1º de cada grupo + 2º de cada grupo = 24 times
  // + 8 melhores 3ºs = 32 times no mata-mata
  // Mas como a API não tem dados de jogos, vamos mostrar o bracket
  // baseado nos 1ºs e 2ºs colocados de cada grupo (24 times)
  // e os 8 melhores 3ºs seriam calculados, mas pra visualização
  // vamos mostrar um bracket simplificado com os 16 primeiros (1ºs)
  // que é mais limpo visualmente.

  // Na verdade, vou fazer o bracket REAL da Copa 2026:
  // 12 grupos, passam 32 times (24 primeiros+segundos + 8 melhores terceiros)
  // O cruzamento das oitavas segue um chaveamento pré-definido pela FIFA.
  // Para este visual, vou mostrar o bracket com os 1ºs e 2ºs colocados
  // e indicar que os melhores 3ºs completam.

  // Um grupo é considerado "fechado" quando todos os 4 times já jogaram
  function isGroupClosed(groupTeams) {
    return groupTeams.every(t => parseInt(t.mp) > 0);
  }

  function buildBracket(sortedGroups) {
    // Pega 1º e 2º de cada grupo + se o grupo está fechado
    const classified = {};
    sortedGroups.forEach(g => {
      const sorted = [...g.teams].sort((a,b) => {
        if (parseInt(b.pts) !== parseInt(a.pts)) return parseInt(b.pts) - parseInt(a.pts);
        if (parseInt(b.gd) !== parseInt(a.gd)) return parseInt(b.gd) - parseInt(a.gd);
        return parseInt(b.gf) - parseInt(a.gf);
      });
      classified[g.name] = {
        first: sorted[0],
        second: sorted[1],
        teams: g.teams,
        closed: isGroupClosed(g.teams)
      };
    });

    // Cruzamentos das oitavas
    const oitavas = [
      { label: 'Oitava 1', home: classified.A?.first, away: classified.B?.second, g1: 'A', g2: 'B' },
      { label: 'Oitava 2', home: classified.C?.first, away: classified.D?.second, g1: 'C', g2: 'D' },
      { label: 'Oitava 3', home: classified.E?.first, away: classified.F?.second, g1: 'E', g2: 'F' },
      { label: 'Oitava 4', home: classified.G?.first, away: classified.H?.second, g1: 'G', g2: 'H' },
      { label: 'Oitava 5', home: classified.I?.first, away: classified.J?.second, g1: 'I', g2: 'J' },
      { label: 'Oitava 6', home: classified.K?.first, away: classified.L?.second, g1: 'K', g2: 'L' },
      { label: 'Oitava 7', home: classified.B?.first, away: classified.A?.second, g1: 'B', g2: 'A' },
      { label: 'Oitava 8', home: classified.D?.first, away: classified.C?.second, g1: 'D', g2: 'C' },
    ];

    // Mapeia quais grupos alimentam cada quartas
    // Q1 ← O1+O2 ← grupos A,B,C,D
    // Q2 ← O3+O4 ← grupos E,F,G,H
    // Q3 ← O5+O6 ← grupos I,J,K,L
    // Q4 ← O7+O8 ← grupos A,B,C,D (mesmo)
    const quartasGroupMap = [
      ['A','B','C','D'],
      ['E','F','G','H'],
      ['I','J','K','L'],
      ['A','B','C','D'],
    ];

    const quartas = [
      { label: 'Quartas 1', home: null, away: null, source: [0, 1], groups: ['A','B','C','D'] },
      { label: 'Quartas 2', home: null, away: null, source: [2, 3], groups: ['E','F','G','H'] },
      { label: 'Quartas 3', home: null, away: null, source: [4, 5], groups: ['I','J','K','L'] },
      { label: 'Quartas 4', home: null, away: null, source: [6, 7], groups: ['A','B','C','D'] },
    ];

    const semis = [
      { label: 'Semifinal 1', home: null, away: null, source: [0, 1], groups: ['A','B','C','D','E','F','G','H'] },
      { label: 'Semifinal 2', home: null, away: null, source: [2, 3], groups: ['I','J','K','L','A','B','C','D'] },
    ];

    const final = { label: 'Final', home: null, away: null, source: [0, 1], groups: ['A','B','C','D','E','F','G','H','I','J','K','L'] };

    return { oitavas, quartas, semis, final, classified };
  }

  function renderMatch(team1, team2, label, isPending, status) {
    const t1 = team1 ? teamsMap[team1.team_id] : null;
    const t2 = team2 ? teamsMap[team2.team_id] : null;
    const pending = isPending || !team1 || !team2;

    // status: 'confirmed' | 'probable' | 'pending'
    // Mesmo sem times definidos (pending), a borda reflete o status dos grupos
    let statusClass = status === 'confirmed' ? 'confirmed' : (status === 'probable' ? 'probable' : 'pending');

    const t1Flag = t1?.flag || '';
    const t1Name = t1?.name_en || `#${team1?.team_id || '?'}`;
    const t1Fifa = t1?.fifa_code || '';
    const t2Flag = t2?.flag || '';
    const t2Name = t2?.name_en || `#${team2?.team_id || '?'}`;
    const t2Fifa = t2?.fifa_code || '';

    return `
      <div class="bracket-match ${statusClass}">
        <div class="match-teams">
          <div class="team-row">
            <div class="team-info">
              ${t1Flag ? `<img class="flag" src="${t1Flag}" alt="" onerror="this.style.display='none'">` : ''}
              <span class="name">${t1Name}${t1Fifa ? ` (${t1Fifa})` : ''}</span>
            </div>
            <span class="score empty">-</span>
          </div>
          <div class="match-vs">⚔</div>
          <div class="team-row">
            <div class="team-info">
              ${t2Flag ? `<img class="flag" src="${t2Flag}" alt="" onerror="this.style.display='none'">` : ''}
              <span class="name">${t2Name}${t2Fifa ? ` (${t2Fifa})` : ''}</span>
            </div>
            <span class="score empty">-</span>
          </div>
        </div>
        <div class="match-label">${label}</div>
      </div>
    `;
  }

  function renderBracket(sortedGroups) {
    const bracket = buildBracket(sortedGroups);

    let html = '';

    const classified = bracket.classified;

    // Status de um grupo: 'closed' | 'started' | 'pending'
    function groupStatus(gName) {
      const c = classified[gName];
      if (!c) return 'pending';
      if (c.closed) return 'closed';
      if (c.teams.some(t => parseInt(t.mp) > 0)) return 'started';
      return 'pending';
    }

    // Status de um conjunto de grupos: 'confirmed' se todos fechados, 'probable' se algum começou, 'pending' se nenhum
    function groupsStatus(groupNames) {
      let hasClosed = true, hasStarted = false;
      for (const g of groupNames) {
        const s = groupStatus(g);
        if (s !== 'closed') hasClosed = false;
        if (s === 'started' || s === 'closed') hasStarted = true;
      }
      if (hasClosed) return 'confirmed';
      if (hasStarted) return 'probable';
      return 'pending';
    }

    // Rodada 1: Oitavas
    html += `<div class="bracket-round"><div class="bracket-round-title">Oitavas de Final</div>`;
    bracket.oitavas.forEach(o => {
      const status = groupsStatus([o.g1, o.g2]);
      html += renderMatch(o.home, o.away, o.label, false, status);
    });
    html += `</div>`;

    // Rodada 2: Quartas
    html += `<div class="bracket-round"><div class="bracket-round-title">Quartas de Final</div>`;
    bracket.quartas.forEach(q => {
      const status = groupsStatus(q.groups);
      html += renderMatch(null, null, q.label, true, status);
    });
    html += `</div>`;

    // Rodada 3: Semifinais
    html += `<div class="bracket-round"><div class="bracket-round-title">Semifinais</div>`;
    bracket.semis.forEach(s => {
      const status = groupsStatus(s.groups);
      html += renderMatch(null, null, s.label, true, status);
    });
    html += `</div>`;

    // Rodada 4: Final + Campeão
    html += `<div class="bracket-round"><div class="bracket-round-title">Final</div>`;
    html += renderMatch(null, null, 'Grande Final', true, groupsStatus(final.groups));
    html += `
      <div class="champion-box">
        <div class="trophy">🏆</div>
        <div class="champ-label">Campeão 2026</div>
        <div class="champ-empty">A definir</div>
      </div>
    `;
    html += `</div>`;

    bracketContainer.innerHTML = html;
  }

  function renderGroups(groups) {
    groups.sort((a, b) => groupOrder.indexOf(a.name) - groupOrder.indexOf(b.name));

    let html = '';
    groups.forEach(group => {
      const groupName = group.name;
      const sortedTeams = [...group.teams].sort((a, b) => {
        if (parseInt(b.pts) !== parseInt(a.pts)) return parseInt(b.pts) - parseInt(a.pts);
        if (parseInt(b.gd) !== parseInt(a.gd)) return parseInt(b.gd) - parseInt(a.gd);
        return parseInt(b.gf) - parseInt(a.gf);
      });

      const hasMatches = sortedTeams.some(t => parseInt(t.mp) > 0);

      let rows = '';
      sortedTeams.forEach((team, idx) => {
        const t = teamsMap[team.team_id];
        if (!t) return;

        const flagUrl = t.flag || `https://flagcdn.com/w80/${(t.iso2||'xx').toLowerCase()}.png`;
        const name = t.name_en || t.name_fa || `Time #${team.team_id}`;
        const fifa = t.fifa_code || '';
        const pts = parseInt(team.pts);
        const gd = parseInt(team.gd);
        const gdClass = gd > 0 ? 'gd-pos' : (gd < 0 ? 'gd-neg' : '');
        const gdDisplay = gd > 0 ? `+${gd}` : gd;
        const highlightClass = hasMatches && idx < 2 ? `qualified-${idx + 1}` : '';

        rows += `
          <tr class="${highlightClass}">
            <td>
              <div class="team-cell">
                <span class="pos">${idx + 1}</span>
                <img class="flag" src="${flagUrl}" alt="${fifa}" loading="lazy" onerror="this.style.display='none'">
                <span class="name">${name}</span>
                ${fifa ? `<span class="fifa-code">${fifa}</span>` : ''}
              </div>
            </td>
            <td>${team.mp}</td>
            <td>${team.w}</td>
            <td>${team.d}</td>
            <td>${team.l}</td>
            <td>${team.gf}</td>
            <td>${team.ga}</td>
            <td class="${gdClass}">${gdDisplay}</td>
            <td class="pts-cell">${pts}</td>
          </tr>
        `;
      });

      html += `
        <div class="group-card">
          <div class="group-header">
            <span class="group-label">Grupo ${groupName}</span>
            <span class="group-status">${hasMatches ? '🔴 Ao vivo' : '⚽ Aguardando'}</span>
          </div>
          <table class="group-table">
            <thead>
              <tr>
                <th>Time</th>
                <th>P</th>
                <th>V</th>
                <th>E</th>
                <th>D</th>
                <th>GP</th>
                <th>GC</th>
                <th>SG</th>
                <th>Pts</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    });

    groupsContainer.innerHTML = html;
    // Só renderiza o bracket depois que os grupos aparecerem
    setTimeout(() => {
      document.getElementById('bracket-wrapper').style.display = 'block';
      renderBracket(groups);
    }, 100);
  }

  async function loadData(retryCount = 10) {
    for (let attempt = 1; attempt <= retryCount; attempt++) {
      try {
        const [teamsData, groupsData] = await Promise.all([
          fetchJSON('https://worldcup26.ir/get/teams'),
          fetchJSON('https://worldcup26.ir/get/groups')
        ]);

        teamsData.teams.forEach(t => { teamsMap[t.id] = t; });

        renderGroups(groupsData.groups);
        updateTime.textContent = `Atualizado ${new Date().toLocaleString('pt-BR')}`;
        return; // deu certo, sai
      } catch (err) {
        console.error(`Tentativa ${attempt}/${retryCount} falhou:`, err);
        if (attempt < retryCount) {
          // Mostra tentativa na tela
          groupsContainer.innerHTML = `
            <div class="loading-state">
              <div class="spinner"></div>
              <p>Tentando conectar... (${attempt}/${retryCount})</p>
              <p style="color:#64748b;font-size:.8rem;margin-top:.5rem">${err.message}</p>
            </div>
          `;
          // Espera progressivo: 1s, 2s, 3s... até 5s max
          const delay = Math.min(attempt * 1000, 5000);
          await new Promise(r => setTimeout(r, delay));
        } else {
          // Esgotou as tentativas
          groupsContainer.innerHTML = `
            <div class="error-state">
              <p>❌ Erro ao carregar dados da Copa</p>
              <p style="color:#94a3b8;font-size:.85rem;margin-top:.5rem">${err.message}</p>
              <button class="retry-btn" onclick="location.reload()">Tentar novamente</button>
            </div>
          `;
        }
      }
    }
  }

  await loadData();
  setInterval(() => loadData(3), 60000); // nas atualizações, só 3 retries
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-PT">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>Live AI Transcribe - WebGPU</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <style>
 @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap');
 
 body {
 font-family: 'Inter', sans-serif;
 background: #08080c;
 color: #f0f0f5;
 }

 .mono { font-family: 'JetBrains Mono', monospace; }

 .vad-inactive { border-color: rgba(255, 255, 255, 0.1); }
 .vad-active { border-color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }

 .streaming-text::after {
 content: "";
 display: inline-block;
 width: 2px;
 height: 1.2em;
 background: #6366f1;
 margin-left: 4px;
 vertical-align: middle;
 animation: blink 0.8s infinite;
 }

 @keyframes blink {
 0%, 100% { opacity: 1; }
 50% { opacity: 0; }
 }

 .gradient-border {
 background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
 }
 </style>
</head>
<body class="min-h-screen flex flex-col p-4">

 <div class="max-w-xl mx-auto w-full flex-1 flex flex-col gap-6">
 <header class="flex justify-between items-center py-4">
 <div>
 <h1 class="text-xl font-bold text-white flex items-center gap-2">
 <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
 Live Stream STT
 </h1>
 <p class="text-[10px] uppercase tracking-tighter text-gray-500 font-bold">Processamento WebGPU Local</p>
 </div>
 <div id="gpuStatus" class="px-3 py-1 rounded-full bg-white/5 border border-white/10 text-[10px] font-mono text-gray-400">
 A carregar...
 </div>
 </header>

 <div id="vadIndicator" class="vad-inactive border-2 rounded-2xl p-4 bg-white/5 transition-all duration-300">
 <div class="flex justify-between items-center mb-2">
 <span class="text-xs font-bold text-gray-400">Estado da Voz (VAD)</span>
 <span id="vadLabel" class="text-xs font-mono text-gray-500">Silêncio</span>
 </div>
 <div class="w-full bg-black/40 h-2 rounded-full overflow-hidden">
 <div id="vadBar" class="h-full bg-emerald-500 w-0 transition-all duration-75"></div>
 </div>
 </div>

 <div class="flex-1 glass-card bg-white/5 border border-white/10 rounded-3xl p-6 relative overflow-hidden flex flex-col">
 <div class="absolute top-0 left-0 w-full h-1 gradient-border opacity-50"></div>
 
 <div class="flex justify-between mb-4">
 <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Tempo Real</span>
 <button id="clearBtn" class="text-[10px] text-indigo-400 hover:text-white uppercase font-bold">Limpar</button>
 </div>

 <div id="transcript" class="streaming-text text-xl md:text-2xl font-medium leading-relaxed overflow-y-auto max-h-[40vh]">
 Inicie o stream para transcrever...
 </div>
 </div>

 <div class="py-6 flex flex-col gap-4">
 <div class="flex justify-center gap-4">
 <button id="toggleBtn" disabled class="px-8 py-4 rounded-full bg-indigo-600 hover:bg-indigo-500 disabled:bg-gray-800 text-white font-bold transition-all shadow-xl shadow-indigo-500/20 flex items-center gap-2">
 <svg id="playIcon" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"></path></svg>
 <span>Iniciar Stream</span>
 </button>
 </div>

 <p class="text-center text-[10px] text-gray-600 px-8">
 Nota: O modo stream processa áudio em janelas de 2-3 segundos. Requer um processador moderno ou suporte WebGPU estável.
 </p>
 </div>
 </div>

 <script type="module">
 import { pipeline } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.10";

 let pipe = null;
 let isStreaming = false;
 let audioContext = null;
 let processor = null;
 let input = null;
 let globalAudioBuffer = [];
 
 const VAD_THRESHOLD = 0.015;
 const CHUNK_SIZE = 16384;
 const MIN_STREAM_SECONDS = 1.5;

 const toggleBtn = document.getElementById('toggleBtn');
 const gpuStatus = document.getElementById('gpuStatus');
 const transcriptDiv = document.getElementById('transcript');
 const vadBar = document.getElementById('vadBar');
 const vadIndicator = document.getElementById('vadIndicator');
 const vadLabel = document.getElementById('vadLabel');

 async function initAI() {
 try {
 pipe = await pipeline("automatic-speech-recognition", "onnx-community/whisper-tiny", {
 device: "webgpu",
 dtype: { encoder_model: "fp32", decoder_model_merged: "q4" }
 });
 gpuStatus.textContent = "WebGPU: ATIVO";
 toggleBtn.disabled = false;
 } catch (e) {
 console.warn("Falha no WebGPU, a usar CPU", e);
 pipe = await pipeline("automatic-speech-recognition", "onnx-community/whisper-tiny", { device: "wasm" });
 gpuStatus.textContent = "WASM: CPU";
 toggleBtn.disabled = false;
 }
 }

 async function processAudioChunk() {
 if (!isStreaming || globalAudioBuffer.length < 16000 * MIN_STREAM_SECONDS) return;

 const float32Data = new Float32Array(globalAudioBuffer);
 
 try {
 const output = await pipe(float32Data, {
 language: "pt",
 task: "transcribe",
 chunk_length_s: 30,
 stride_length_s: 5,
 return_timestamps: false
 });

 if (output.text.trim()) {
 transcriptDiv.textContent = output.text;
 transcriptDiv.scrollTop = transcriptDiv.scrollHeight;
 }
 } catch (err) {
 console.error("Erro no processamento:", err);
 }
 }

 async function startStreaming() {
 audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
 const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
 input = audioContext.createMediaStreamSource(stream);
 
 processor = audioContext.createScriptProcessor(4096, 1, 1);

 processor.onaudioprocess = (e) => {
 const inputData = e.inputBuffer.getChannelData(0);
 
 let sum = 0;
 for (let i = 0; i < inputData.length; i++) {
 sum += inputData[i] * inputData[i];
 if (isStreaming) globalAudioBuffer.push(inputData[i]);
 }
 const rms = Math.sqrt(sum / inputData.length);
 
 const volumePercent = Math.min(100, rms * 500);
 vadBar.style.width = `${volumePercent}%`;

 if (rms > VAD_THRESHOLD) {
 vadIndicator.className = "vad-active border-2 rounded-2xl p-4 bg-white/5 transition-all duration-150";
 vadLabel.textContent = "A falar...";
 } else {
 vadIndicator.className = "vad-inactive border-2 rounded-2xl p-4 bg-white/5 transition-all duration-300";
 vadLabel.textContent = "Silêncio";
 
 if (globalAudioBuffer.length > 16000 * 10) {
 globalAudioBuffer = globalAudioBuffer.slice(-16000 * 2);
 }
 }
 };

 input.connect(processor);
 processor.connect(audioContext.destination);

 const intervalId = setInterval(() => {
 if (!isStreaming) clearInterval(intervalId);
 processAudioChunk();
 }, 1200);
 }

 toggleBtn.addEventListener('click', async () => {
 if (!isStreaming) {
 isStreaming = true;
 globalAudioBuffer = [];
 transcriptDiv.textContent = "...";
 await startStreaming();
 toggleBtn.querySelector('span').textContent = "Parar Stream";
 toggleBtn.classList.replace('bg-indigo-600', 'bg-red-600');
 document.getElementById('playIcon').innerHTML = '<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />';
 } else {
 isStreaming = false;
 if (audioContext) audioContext.close();
 toggleBtn.querySelector('span').textContent = "Iniciar Stream";
 toggleBtn.classList.replace('bg-red-600', 'bg-indigo-600');
 document.getElementById('playIcon').innerHTML = '<path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"></path>';
 }
 });

 document.getElementById('clearBtn').onclick = () => {
 transcriptDiv.textContent = "...";
 globalAudioBuffer = [];
 };

 window.onload = initAI;
 </script>
</body>
</html>

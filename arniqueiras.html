<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Arniqueira DF — Guia do Bairro</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    padding: 20px 24px 16px;
    border-bottom: 1px solid #1e293b;
    text-align: center;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    color: #f1f5f9;
    letter-spacing: 1px;
  }
  .header p {
    font-size: 13px;
    color: #94a3b8;
    margin-top: 4px;
  }

  .map-container {
    width: 100%;
    height: calc(100vh - 140px);
    position: relative;
  }
  #map {
    width: 100%;
    height: 100%;
  }

  .legend {
    position: absolute;
    bottom: 30px;
    left: 20px;
    z-index: 1000;
    background: rgba(15, 23, 42, 0.92);
    backdrop-filter: blur(8px);
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 14px 18px;
    min-width: 180px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .legend h3 {
    font-size: 13px;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
    font-size: 12px;
    color: #cbd5e1;
  }
  .legend-item:last-child { margin-bottom: 0; }
  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.2);
  }

  .footer {
    background: #1e293b;
    padding: 10px 24px;
    text-align: center;
    font-size: 11px;
    color: #64748b;
    border-top: 1px solid #334155;
  }

  @media (max-width: 600px) {
    .header h1 { font-size: 20px; }
    .legend { left: 10px; bottom: 20px; padding: 12px 14px; min-width: 150px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🏘️ Setor Habitacional Arniqueira</h1>
  <p>Brasília · DF · Comércio, farmácias e pontos de interesse</p>
</div>

<div class="map-container">
  <div id="map"></div>
  <div class="legend">
    <h3>📍 Legenda</h3>
    <div class="legend-item"><span class="legend-dot" style="background:#ef4444"></span> Farmácias</div>
    <div class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span> Comércio</div>
    <div class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span> Pontos de Interesse</div>
    <div class="legend-item"><span class="legend-dot" style="background:#22c55e"></span> Áreas Verdes</div>
    <div class="legend-item"><span class="legend-dot" style="background:#a855f7"></span> Educação / Saúde</div>
  </div>
</div>

<div class="footer">
  Dados: OpenStreetMap · Setor Habitacional Arniqueira · Brasília/DF · 2026
</div>

<script>
  const map = L.map('map', {
    center: [-15.830, -48.015],
    zoom: 15,
    zoomControl: true
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);

  // ---- Ícones customizados ----
  const iconPharmacy = L.divIcon({ className: '', html: '<div style="background:#ef4444;width:22px;height:22px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold">💊</div>', iconSize: [22,22], iconAnchor: [11,11] });
  const iconCommerce = L.divIcon({ className: '', html: '<div style="background:#f59e0b;width:22px;height:22px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:11px">🏪</div>', iconSize: [22,22], iconAnchor: [11,11] });
  const iconInterest = L.divIcon({ className: '', html: '<div style="background:#3b82f6;width:22px;height:22px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:11px">📍</div>', iconSize: [22,22], iconAnchor: [11,11] });
  const iconPark = L.divIcon({ className: '', html: '<div style="background:#22c55e;width:22px;height:22px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:11px">🌳</div>', iconSize: [22,22], iconAnchor: [11,11] });
  const iconEdu = L.divIcon({ className: '', html: '<div style="background:#a855f7;width:22px;height:22px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:11px">🏫</div>', iconSize: [22,22], iconAnchor: [11,11] });

  // ---- Farmácias ----
  const farmacias = [
    { name: 'Drogaria Rosário (Filial 466)', lat: -15.8285, lng: -48.0160, addr: 'SH Arniqueira QD 10, CJ 38, LT 1' },
    { name: 'Drogaria Rosário (Filial 345)', lat: -15.8295, lng: -48.0145, addr: 'SH Arniqueira' },
    { name: 'Drogasil Arniqueira', lat: -15.8302, lng: -48.0155, addr: 'SHA Conjunto 4' },
    { name: 'Drogaria Rina', lat: -15.8310, lng: -48.0170, addr: 'Av. Águas Claras, Arniqueira' },
    { name: 'Drogaria Unicom', lat: -15.8290, lng: -48.0180, addr: 'SH Arniqueira' },
  ];
  farmacias.forEach(f => {
    L.marker([f.lat, f.lng], { icon: iconPharmacy })
      .addTo(map)
      .bindPopup(`<b>💊 ${f.name}</b><br>${f.addr}`);
  });

  // ---- Comércio ----
  const comercios = [
    { name: 'Mercado Local', lat: -15.8292, lng: -48.0158, desc: 'Supermercado de bairro' },
    { name: 'Padaria Arniqueira', lat: -15.8305, lng: -48.0140, desc: 'Padaria e conveniência' },
    { name: 'Academia Fit', lat: -15.8288, lng: -48.0165, desc: 'Academia do bairro' },
    { name: 'Feira do Areal', lat: -15.8320, lng: -48.0130, desc: 'Feira permanente' },
  ];
  comercios.forEach(c => {
    L.marker([c.lat, c.lng], { icon: iconCommerce })
      .addTo(map)
      .bindPopup(`<b>🏪 ${c.name}</b><br>${c.desc}`);
  });

  // ---- Pontos de Interesse ----
  const pontos = [
    { name: 'Administração Regional', lat: -15.8275, lng: -48.0150, desc: 'RA XXXIII — Arniqueira' },
    { name: 'Delegacia de Polícia Civil', lat: -15.8280, lng: -48.0168, desc: 'Segurança pública' },
    { name: 'CRAS Arniqueira', lat: -15.8308, lng: -48.0148, desc: 'Centro de Referência de Assistência Social' },
    { name: 'Ponto de Encontro Comunitário', lat: -15.8315, lng: -48.0155, desc: 'PEC — Área de convivência' },
  ];
  pontos.forEach(p => {
    L.marker([p.lat, p.lng], { icon: iconInterest })
      .addTo(map)
      .bindPopup(`<b>📍 ${p.name}</b><br>${p.desc}`);
  });

  // ---- Áreas Verdes ----
  const parques = [
    { name: 'Praça Central Arniqueira', lat: -15.8298, lng: -48.0152, desc: 'Área de lazer do bairro' },
    { name: 'Parque Ecológico Areal', lat: -15.8330, lng: -48.0120, desc: 'Pista de caminhada e ciclovia' },
  ];
  parques.forEach(p => {
    L.marker([p.lat, p.lng], { icon: iconPark })
      .addTo(map)
      .bindPopup(`<b>🌳 ${p.name}</b><br>${p.desc}`);
  });

  // ---- Educação / Saúde ----
  const educacao = [
    { name: 'Escola Classe Vila Areal', lat: -15.8312, lng: -48.0135, desc: 'Escola pública' },
    { name: 'Centro de Educação Infantil', lat: -15.8300, lng: -48.0165, desc: 'CEI — QS 11' },
    { name: 'UBS Arniqueira', lat: -15.8306, lng: -48.0142, desc: 'Unidade Básica de Saúde' },
    { name: 'Clínica da Família', lat: -15.8295, lng: -48.0175, desc: 'Atendimento familiar — QS 05' },
  ];
  educacao.forEach(e => {
    L.marker([e.lat, e.lng], { icon: iconEdu })
      .addTo(map)
      .bindPopup(`<b>🏫 ${e.name}</b><br>${e.desc}`);
  });

  // ---- Limite aproximado do Setor Habitacional Arniqueira ----
  const bounds = [
    [-15.834, -48.020],
    [-15.826, -48.010]
  ];
  L.rectangle(bounds, {
    color: '#3b82f6',
    weight: 2,
    fill: false,
    dashArray: '6,6',
    opacity: 0.5
  }).addTo(map).bindPopup('Limite aproximado do Setor Habitacional Arniqueira');
</script>
</body>
</html>

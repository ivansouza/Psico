<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Arniqueira DF — Guia Local</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    padding: 20px 24px 16px;
    border-bottom: 1px solid #1e293b;
    text-align: center;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    color: #f1f5f9;
    letter-spacing: 1px;
  }
  .header p {
    font-size: 13px;
    color: #94a3b8;
    margin-top: 4px;
  }

  .map-container {
    width: 100%;
    height: calc(100vh - 140px);
    position: relative;
  }
  #map {
    width: 100%;
    height: 100%;
  }

  .legend {
    position: absolute;
    bottom: 30px;
    left: 20px;
    z-index: 1000;
    background: rgba(15, 23, 42, 0.92);
    backdrop-filter: blur(8px);
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 14px 18px;
    min-width: 180px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .legend h3 {
    font-size: 13px;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
    font-size: 12px;
    color: #cbd5e1;
  }
  .legend-item:last-child { margin-bottom: 0; }
  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.2);
  }

  .footer {
    background: #1e293b;
    padding: 10px 24px;
    text-align: center;
    font-size: 11px;
    color: #64748b;
    border-top: 1px solid #334155;
  }

  @media (max-width: 600px) {
    .header h1 { font-size: 20px; }
    .legend { left: 10px; bottom: 20px; padding: 12px 14px; min-width: 150px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🗺️ Arniqueira — Guia Local</h1>
  <p>RA XXXIII · Distrito Federal · Pontos de referência, comércio e serviços</p>
</div>

<div class="map-container">
  <div id="map"></div>
  <div class="legend">
    <h3>📍 Legenda</h3>
    <div class="legend-item"><span class="legend-dot" style="background:#ef4444"></span> Farmácias</div>
    <div class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span> Comércio</div>
    <div class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span> Pontos de Interesse</div>
    <div class="legend-item"><span class="legend-dot" style="background:#22c55e"></span> Áreas Verdes / Parques</div>
    <div class="legend-item"><span class="legend-dot" style="background:#a855f7"></span> Educação / Saúde</div>
  </div>
</div>

<div class="footer">
  Dados: OpenStreetMap · Mapa interativo · Arniqueira DF · 2026
</div>

<script>
  const map = L.map('map', {
    center: [-15.8367, -48.0171],
    zoom: 14,
    zoomControl: true
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);

  // ---- Ícones customizados ----
  const iconPharmacy = L.divIcon({ className: '', html: '<div style="background:#ef4444;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:bold">💊</div>', iconSize: [20,20], iconAnchor: [10,10] });
  const iconCommerce = L.divIcon({ className: '', html: '<div style="background:#f59e0b;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:10px">🏪</div>', iconSize: [20,20], iconAnchor: [10,10] });
  const iconInterest = L.divIcon({ className: '', html: '<div style="background:#3b82f6;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:10px">📍</div>', iconSize: [20,20], iconAnchor: [10,10] });
  const iconPark = L.divIcon({ className: '', html: '<div style="background:#22c55e;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:10px">🌳</div>', iconSize: [20,20], iconAnchor: [10,10] });
  const iconEdu = L.divIcon({ className: '', html: '<div style="background:#a855f7;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:10px">🏫</div>', iconSize: [20,20], iconAnchor: [10,10] });

  // ---- Farmácias ----
  const farmacias = [
    { name: 'Drogasil Arniqueira', lat: -15.8342, lng: -48.0195, addr: 'SHA Conjunto 4' },
    { name: 'Drogaria Rosário', lat: -15.8378, lng: -48.0152, addr: 'QD 10, CJ 38, LT 1' },
    { name: 'Drogaria Camac', lat: -15.8400, lng: -48.0130, addr: 'QS 11, Conjunto G' },
    { name: 'Drogaria Rina', lat: -15.8355, lng: -48.0205, addr: 'Av. Águas Claras' },
  ];
  farmacias.forEach(f => {
    L.marker([f.lat, f.lng], { icon: iconPharmacy })
      .addTo(map)
      .bindPopup(`<b>💊 ${f.name}</b><br>${f.addr}`);
  });

  // ---- Comércio ----
  const comercios = [
    { name: 'Areal — Centro Comercial', lat: -15.8385, lng: -48.0140, desc: 'Principal centro comercial da região' },
    { name: 'Feira Permanente Arniqueira', lat: -15.8360, lng: -48.0180, desc: 'Feira local com alimentos e artesanato' },
    { name: 'ADE — Indústrias', lat: -15.8420, lng: -48.0250, desc: 'Área de Desenvolvimento Econômico' },
    { name: 'Supermercado Local', lat: -15.8370, lng: -48.0165, desc: 'Comércio de alimentos e utilidades' },
  ];
  comercios.forEach(c => {
    L.marker([c.lat, c.lng], { icon: iconCommerce })
      .addTo(map)
      .bindPopup(`<b>🏪 ${c.name}</b><br>${c.desc}`);
  });

  // ---- Pontos de Interesse ----
  const pontos = [
    { name: 'Estação Arniqueiras (Metrô)', lat: -15.8367, lng: -48.0171, desc: 'Linhas Verde e Laranja' },
    { name: 'Administração Regional', lat: -15.8350, lng: -48.0190, desc: 'RA XXXIII — Arniqueira' },
    { name: 'Delegacia de Polícia Civil', lat: -15.8380, lng: -48.0155, desc: 'Segurança pública' },
    { name: 'CRAS Arniqueira', lat: -15.8390, lng: -48.0145, desc: 'Centro de Referência de Assistência Social — QS 09' },
  ];
  pontos.forEach(p => {
    L.marker([p.lat, p.lng], { icon: iconInterest })
      .addTo(map)
      .bindPopup(`<b>📍 ${p.name}</b><br>${p.desc}`);
  });

  // ---- Parques / Áreas Verdes ----
  const parques = [
    { name: 'Parque Ecológico Areal', lat: -15.8405, lng: -48.0120, desc: 'Pista de caminhada, ciclovia, campo society' },
    { name: 'Parque Urbano Pistão Sul', lat: -15.8430, lng: -48.0220, desc: 'Área de lazer e esportes' },
  ];
  parques.forEach(p => {
    L.marker([p.lat, p.lng], { icon: iconPark })
      .addTo(map)
      .bindPopup(`<b>🌳 ${p.name}</b><br>${p.desc}`);
  });

  // ---- Educação / Saúde ----
  const educacao = [
    { name: 'Escola Técnica de Brasília', lat: -15.8395, lng: -48.0135, desc: 'Única escola técnica pública do DF — QS 07' },
    { name: 'UBS QS 08', lat: -15.8408, lng: -48.0148, desc: 'Unidade Básica de Saúde' },
    { name: 'Clínica da Família', lat: -15.8375, lng: -48.0175, desc: 'QS 05 — Atendimento familiar' },
    { name: 'CAIC Arniqueira', lat: -15.8388, lng: -48.0160, desc: 'Escola pública' },
  ];
  educacao.forEach(e => {
    L.marker([e.lat, e.lng], { icon: iconEdu })
      .addTo(map)
      .bindPopup(`<b>🏫 ${e.name}</b><br>${e.desc}`);
  });

  // ---- Limites aproximados da região ----
  const bounds = [
    [-15.845, -48.028],
    [-15.830, -48.008]
  ];
  L.rectangle(bounds, {
    color: '#3b82f6',
    weight: 2,
    fill: false,
    dashArray: '6,6',
    opacity: 0.5
  }).addTo(map).bindPopup('Limite aproximado da RA Arniqueira');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vórtice de Partículas Three.js</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #ui-overlay {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.7);
      pointer-events: none;
      z-index: 10;
    }
    .instruction {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 5px;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="ui-overlay">
    <div style="font-size: 18px; font-weight: bold; color: #00d2ff;">Vortex Concêntrico</div>
    <div class="instruction">Arraste para girar • Scroll para zoom • Toque para interagir</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const vertexShader = `
      uniform float uTime;
      uniform float uSpeed;
      attribute float aSize;
      attribute vec3 aColor;
      varying vec3 vColor;
      varying float vDistance;

      void main() {
        vColor = aColor;

        vec3 newPos = position;

        // Vórtice: anéis internos giram mais rápido
        float dist = length(position.xz);
        float angle = uTime * (uSpeed / (dist * 0.2 + 0.5));
        float s = sin(angle);
        float c = cos(angle);

        float x = newPos.x * c - newPos.z * s;
        float z = newPos.x * s + newPos.z * c;
        newPos.x = x;
        newPos.z = z;

        // Ondulação vertical
        newPos.y += sin(dist * 0.5 - uTime * 1.5) * 0.8;

        vec4 mvPosition = modelViewMatrix * vec4(newPos, 1.0);
        gl_PointSize = aSize * (100.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;

        vDistance = dist;
      }
    `;

    const fragmentShader = `
      varying vec3 vColor;
      varying float vDistance;
      uniform float uTime;

      void main() {
        float dist = distance(gl_PointCoord, vec2(0.5));
        if (dist > 0.5) discard;

        float strength = 1.0 - (dist * 2.0);
        strength = pow(strength, 3.0);

        float pulse = sin(vDistance * 0.5 - uTime * 2.0) * 0.5 + 0.5;
        vec3 finalColor = mix(vColor, vec3(1.0), pulse * 0.3);

        gl_FragColor = vec4(finalColor, strength);
      }
    `;

    let scene, camera, renderer, points, clock;
    let isDragging = false;
    let lastX = 0, lastY = 0;
    let targetRotationX = 0.35;
    let targetRotationY = 0.15;

    function init() {
      scene = new THREE.Scene();
      clock = new THREE.Clock();

      const aspect = window.innerWidth / window.innerHeight;
      camera = new THREE.PerspectiveCamera(60, aspect, 0.1, 1000);
      camera.position.set(0, 15, 30);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      createVortex();
      bindEvents();
      animate();
    }

    function createVortex() {
      const particleCount = 28000;
      const numRings = 11;
      const maxRadius = 28;

      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);
      const colors = new Float32Array(particleCount * 3);
      const sizes = new Float32Array(particleCount);

      for (let i = 0; i < particleCount; i++) {
        const idx = i * 3;

        const ringIndex = Math.floor((i / particleCount) * numRings);
        const inner = (ringIndex / numRings) * maxRadius;
        const outer = ((ringIndex + 1) / numRings) * maxRadius;
        const radius = inner + Math.pow(Math.random(), 0.65) * (outer - inner);

        const theta = Math.random() * Math.PI * 2;
        positions[idx] = Math.cos(theta) * radius;
        positions[idx + 1] = (Math.random() - 0.5) * 0.2;
        positions[idx + 2] = Math.sin(theta) * radius;

        const hue = 0.55 + (ringIndex / numRings) * 0.25; // azul/ciano -> violeta
        const col = new THREE.Color().setHSL(hue, 0.95, 0.55);
        colors[idx] = col.r;
        colors[idx + 1] = col.g;
        colors[idx + 2] = col.b;

        sizes[i] = 2.0 + Math.random() * 2.8;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

      const material = new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms: {
          uTime: { value: 0 },
          uSpeed: { value: 1.25 }
        },
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });

      points = new THREE.Points(geometry, material);
      points.rotation.x = targetRotationX;
      points.rotation.y = targetRotationY;
      scene.add(points);
    }

    function bindEvents() {
      window.addEventListener('resize', onResize);

      renderer.domElement.addEventListener('mousedown', (e) => {
        isDragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
      });

      window.addEventListener('mouseup', () => { isDragging = false; });

      window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;
        lastX = e.clientX;
        lastY = e.clientY;
        targetRotationY += dx * 0.005;
        targetRotationX += dy * 0.005;
      });

      renderer.domElement.addEventListener('wheel', (e) => {
        e.preventDefault();
        camera.position.z += e.deltaY * 0.012;
        camera.position.z = Math.max(8, Math.min(110, camera.position.z));
      }, { passive: false });

      renderer.domElement.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        isDragging = true;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
      }, { passive: true });

      renderer.domElement.addEventListener('touchmove', (e) => {
        if (!isDragging || e.touches.length !== 1) return;
        const dx = e.touches[0].clientX - lastX;
        const dy = e.touches[0].clientY - lastY;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
        targetRotationY += dx * 0.005;
        targetRotationX += dy * 0.005;
      }, { passive: true });

      renderer.domElement.addEventListener('touchend', () => { isDragging = false; });
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    }

    function animate() {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();
      if (points && points.material && points.material.uniforms) {
        points.material.uniforms.uTime.value = t;
      }

      if (points) {
        points.rotation.x += (targetRotationX - points.rotation.x) * 0.08;
        points.rotation.y += (targetRotationY - points.rotation.y) * 0.08;
      }

      renderer.render(scene, camera);
    }

    init();
  </script>
</body>
</html>

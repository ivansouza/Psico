<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Laser no Triângulo • Ultra Fino</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      --primary: #ff3333;
      --bg: #050505;
      --card-bg: #0f0f0f;
      --accent: #ff0000;
    }

    body {
      background: var(--bg);
      color: var(--primary);
      font-family: 'Press Start 2P', cursive;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      touch-action: manipulation;
    }

    .app {
      text-align: center;
      background: var(--card-bg);
      padding: 15px;
      border: 2px solid #222;
      box-shadow: 0 0 40px rgba(255, 0, 0, 0.2);
      width: 95%;
      max-width: 820px;
      box-sizing: border-box;
      border-radius: 4px;
      margin: 10px;
    }

    h1 {
      font-size: clamp(10px, 3.5vw, 18px);
      margin: 10px 0;
      text-shadow: 0 0 5px var(--primary);
      letter-spacing: 1px;
      color: #888;
    }

    .led-display {
      display: inline-block;
      background: #000;
      color: var(--accent);
      font-size: clamp(20px, 5vw, 36px);
      font-family: monospace;
      padding: 8px 15px;
      border: 2px solid #222;
      box-shadow: inset 0 0 10px rgba(255, 0, 0, 0.3);
      margin-bottom: 15px;
      min-width: 140px;
      border-radius: 2px;
    }

    .canvas-container {
      width: 100%;
      position: relative;
      background: #000;
      border: 2px solid #1a1a1a;
      line-height: 0;
      overflow: hidden;
    }

    canvas {
      width: 100% !important;
      height: auto !important;
      touch-action: none;
      cursor: crosshair;
      image-rendering: pixelated;
    }

    .controls {
      margin-top: 15px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      background: #0a0a0a;
      padding: 15px;
      border: 1px solid #222;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    label {
      font-size: 9px;
      color: #555;
      text-transform: uppercase;
    }

    input[type="range"] {
      width: 100%;
      max-width: 250px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .buttons-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      background: #111;
      color: #666;
      border: 1px solid #333;
      padding: 8px 12px;
      font-family: 'Press Start 2P';
      font-size: 9px;
      cursor: pointer;
      transition: 0.1s;
    }

    button:active {
      background: var(--primary);
      color: #000;
      border-color: var(--primary);
    }

    @media (orientation: landscape) and (max-height: 500px) {
      .app { display: flex; flex-direction: row; gap: 15px; max-width: 98vw; }
      .canvas-container { width: 50%; }
      .side-panel { width: 50%; overflow-y: auto; max-height: 90vh; }
      h1, .info { display: none; }
    }

    @media (min-width: 768px) {
      .controls { grid-template-columns: 1fr 1fr; }
    }

    .info {
      margin-top: 10px;
      font-size: 8px;
      color: #444;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="side-panel">
      <h1>LASER DE PRECISÃO</h1>
      <div class="led-display" id="led">15.00°</div>
    </div>

    <div class="canvas-container">
      <canvas id="canvas" width="800" height="620"></canvas>
    </div>

    <div class="side-panel">
      <div class="controls">
        <div class="control-group">
          <label>ÂNGULO: <span id="angleVal">15.00</span>°</label>
          <input type="range" id="slider" min="0.01" max="45" step="0.01" value="15">
        </div>

        <div class="control-group">
          <label>VELOCIDADE: <span id="speedVal">0.05</span>x</label>
          <input type="range" id="speedSlider" min="0" max="2" step="0.05" value="0.05">
        </div>

        <div class="control-group">
          <label style="cursor:pointer">
            <input type="checkbox" id="auto" checked> AUTO-ANIMAÇÃO
          </label>
          <div class="buttons-row">
            <button id="random">ALEATÓRIO</button>
            <button id="reset">RESET</button>
          </div>
        </div>
      </div>

      <div class="info">
        VELOCIDADE INICIAL: 0.05x (ULTRA-LENTO PARA MÁXIMA PRECISÃO).
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const led = document.getElementById('led');
    const slider = document.getElementById('slider');
    const speedSlider = document.getElementById('speedSlider');
    const speedValDisplay = document.getElementById('speedVal');
    const angleValDisplay = document.getElementById('angleVal');
    const autoChk = document.getElementById('auto');
    const randomBtn = document.getElementById('random');
    const resetBtn = document.getElementById('reset');

    const tri = {
      top: { x: 400, y: 80 },
      left: { x: 120, y: 520 },
      right: { x: 680, y: 520 }
    };
    const laserPos = { x: 400, y: 490 };
    const walls = [
      { p1: tri.top, p2: tri.left, nx: 0.866, ny: 0.5 },
      { p1: tri.left, p2: tri.right, nx: 0, ny: -1 },
      { p1: tri.right, p2: tri.top, nx: -0.866, ny: 0.5 }
    ];

    let angle = 15.0;
    let animFrame = 0;
    let isDragging = false;
    let speedMult = 0.05;

    function getIntersection(rx, ry, dx, dy, x1, y1, x2, y2) {
      const ex = x2 - x1;
      const ey = y2 - y1;
      const denom = dx * ey - dy * ex;
      if (Math.abs(denom) < 1e-12) return null;
      const t = ((x1 - rx) * ey - (y1 - ry) * ex) / denom;
      const u = ((x1 - rx) * dy - (y1 - ry) * dx) / denom;
      return (t > 0.001 && u >= 0 && u <= 1) ? { t, ux: u } : null;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 10;
      ctx.beginPath();
      ctx.moveTo(tri.top.x, tri.top.y);
      ctx.lineTo(tri.left.x, tri.left.y);
      ctx.lineTo(tri.right.x, tri.right.y);
      ctx.closePath();
      ctx.stroke();

      let x = laserPos.x;
      let y = laserPos.y;
      let dx = Math.sin(angle * Math.PI / 180);
      let dy = -Math.cos(angle * Math.PI / 180);

      ctx.strokeStyle = '#ff0000';
      ctx.lineWidth = 0.5;
      ctx.shadowBlur = 2;
      ctx.shadowColor = '#ff0000';
      ctx.beginPath();
      ctx.moveTo(x, y);

      const MAX_BOUNCES = 450;
      for (let i = 0; i < MAX_BOUNCES; i++) {
        let minT = Infinity;
        let hitWall = null;
        for (const wall of walls) {
          const inter = getIntersection(x, y, dx, dy, wall.p1.x, wall.p1.y, wall.p2.x, wall.p2.y);
          if (inter && inter.t < minT) {
            minT = inter.t;
            hitWall = wall;
          }
        }
        if (!hitWall) break;
        x += minT * dx;
        y += minT * dy;
        ctx.lineTo(x, y);
        const dot = dx * hitWall.nx + dy * hitWall.ny;
        dx -= 2 * dot * hitWall.nx;
        dy -= 2 * dot * hitWall.ny;
        x += dx * 0.0001;
        y += dy * 0.0001;
      }
      ctx.stroke();
      ctx.shadowBlur = 0;

      ctx.save();
      ctx.translate(laserPos.x, laserPos.y);
      ctx.rotate((angle - 90) * Math.PI / 180);
      ctx.fillStyle = '#222';
      ctx.fillRect(-12, -8, 30, 16);
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(18, -4, 4, 8);
      ctx.restore();

      const formatted = angle.toFixed(2);
      led.textContent = `${formatted}°`;
      angleValDisplay.textContent = formatted;
    }

    function animate() {
      if (autoChk.checked) {
        animFrame += 0.15 * speedMult;
        angle = 20 + Math.sin(animFrame * 0.02) * 18;
        slider.value = angle;
      }
      draw();
      requestAnimationFrame(animate);
    }

    function handlePointer(e) {
      if (!isDragging) return;
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const mx = (clientX - rect.left) * scaleX;
      const my = (clientY - rect.top) * scaleY;
      const dx = mx - laserPos.x;
      const dy = my - laserPos.y;
      let newAngle = Math.atan2(dx, -dy) * 180 / Math.PI;
      if (newAngle < 0.01) newAngle = 0.01;
      if (newAngle > 45) newAngle = 45;
      angle = newAngle;
      slider.value = angle;
      autoChk.checked = false;
    }

    slider.addEventListener('input', () => {
      angle = parseFloat(slider.value);
      autoChk.checked = false;
    });

    speedSlider.addEventListener('input', () => {
      speedMult = parseFloat(speedSlider.value);
      speedValDisplay.textContent = speedMult.toFixed(2);
    });

    canvas.addEventListener('mousedown', () => isDragging = true);
    window.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mousemove', handlePointer);
    canvas.addEventListener('touchstart', (e) => {
      isDragging = true;
      handlePointer(e);
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchmove', (e) => {
      handlePointer(e);
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchend', () => isDragging = false);

    randomBtn.addEventListener('click', () => {
      angle = Math.random() * 42 + 1;
      slider.value = angle;
      autoChk.checked = false;
    });

    resetBtn.addEventListener('click', () => {
      angle = 15;
      speedMult = 0.05;
      speedSlider.value = 0.05;
      speedValDisplay.textContent = '0.05';
      slider.value = 15;
      autoChk.checked = true;
    });

    animate();
  </script>
</body>
</html>

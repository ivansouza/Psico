<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meus Bookmarks — Ivanzinho</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0a0a1a;
    color: #e0e0e0;
    line-height: 1.6;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
  .header { text-align: center; margin-bottom: 48px; }
  .header h1 {
    font-size: 2.2em; font-weight: 700;
    background: linear-gradient(135deg, #d4a017, #ffd700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p { color: #888; margin-top: 8px; font-size: 0.95em; }
  .header .date { color: #666; font-size: 0.85em; margin-top: 4px; }
  .stats {
    display: flex; justify-content: center; gap: 24px;
    margin-bottom: 32px; flex-wrap: wrap;
  }
  .stat {
    text-align: center;
    background: #12122a;
    border: 1px solid #1e1e3a;
    border-radius: 8px;
    padding: 12px 20px;
    min-width: 100px;
  }
  .stat .value { font-size: 1.4em; font-weight: 700; color: #d4a017; }
  .stat .label { font-size: 0.75em; color: #666; margin-top: 2px; }
  .category { margin-bottom: 32px; }
  .category h2 {
    font-size: 1.1em; font-weight: 600; color: #d4a017;
    margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid #1e1e3a;
  }
  .category .count { color: #666; font-weight: 400; font-size: 0.85em; }
  .bookmark {
    background: #12122a;
    border: 1px solid #1e1e3a;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    transition: all 0.2s;
  }
  .bookmark:hover { border-color: #d4a01733; background: #16163a; }
  .bookmark .num {
    display: inline-block;
    background: #d4a017;
    color: #0a0a1a;
    font-weight: 700;
    font-size: 0.75em;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .bookmark .author {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .bookmark .author .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #d4a01744, #ffd70044);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 0.9em; color: #d4a017;
  }
  .bookmark .author .info { flex: 1; }
  .bookmark .author .name { font-weight: 600; color: #fff; font-size: 0.9em; }
  .bookmark .author .handle { color: #888; font-size: 0.8em; }
  .bookmark .titulo {
    font-weight: 600; color: #ffd700; font-size: 0.95em;
    margin-bottom: 6px;
  }
  .bookmark .resumo { color: #ccc; font-size: 0.9em; margin-bottom: 10px; line-height: 1.5; white-space: pre-wrap; }
  .bookmark .meta {
    display: flex; gap: 16px; flex-wrap: wrap;
    color: #666; font-size: 0.8em;
  }
  .bookmark .meta span { display: flex; align-items: center; gap: 4px; }
  .bookmark .tweet-link {
    display: inline-block; margin-top: 8px;
    color: #d4a017; font-size: 0.8em; text-decoration: none;
  }
  .bookmark .tweet-link:hover { text-decoration: underline; }
  .footer {
    text-align: center; padding: 40px 0;
    color: #444; font-size: 0.8em;
  }
  @media (max-width: 600px) {
    .container { padding: 20px 12px; }
    .header h1 { font-size: 1.6em; }
    .bookmark { padding: 14px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📌 Meus Bookmarks</h1>
    <p>Os últimos 20 tweets que salvei no X — traduzidos para o português</p>
    <div class="date">23/05/2026 às 22:09</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="value">20</div><div class="label">Bookmarks</div></div>
    <div class="stat"><div class="value">7</div><div class="label">Categorias</div></div>
    <div class="stat"><div class="value">54790</div><div class="label">Total Likes</div></div>
  </div>

  <div class="footer">
    <p>🐶 Gerado por ZePequeno via Birdclaw + DeepSeek</p>
    <p style="margin-top:4px">github.com/ivansouza</p>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS Local — Edge TTS + Piper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@microsoft/fetch-event-source@2.0.1/lib/cjs/index.min.js"></script>
    <style>
        .loading-bar { transition: width 0.4s ease; }
        .voice-btn { transition: all 0.15s ease; }
        .voice-btn.active { box-shadow: 0 0 0 2px #3b82f6; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-slate-100 min-h-screen flex flex-col items-center p-4">

    <div class="max-w-xl w-full mt-6 space-y-5">
        <div class="text-center">
            <h1 class="text-3xl font-bold mb-1">🔊 TTS Local</h1>
            <p class="text-slate-400 text-sm">Vozes PT-BR — Edge TTS (API) / Kokoro (local)</p>
        </div>

        <div id="main-card" class="bg-slate-800/80 rounded-2xl p-5 border border-slate-700 backdrop-blur space-y-4">

            <!-- Method selector -->
            <div>
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 block">Método</label>
                <div id="method-grid" class="grid grid-cols-2 gap-2">
                    <button class="method-btn py-3 px-4 bg-slate-700 hover:bg-slate-600 rounded-xl text-sm font-medium flex items-center gap-2"
                            data-method="edge">
                        <span class="text-lg">☁️</span>
                        <div class="text-left">
                            <div class="font-semibold">Edge TTS</div>
                            <div class="text-[10px] text-slate-500">Vozes naturais, precisa internet</div>
                        </div>
                    </button>
                    <button class="method-btn py-3 px-4 bg-slate-700 hover:bg-slate-600 rounded-xl text-sm font-medium flex items-center gap-2"
                            data-method="kokoro">
                        <span class="text-lg">🏠</span>
                        <div class="text-left">
                            <div class="font-semibold">Kokoro</div>
                            <div class="text-[10px] text-slate-500">100% local, WebGPU</div>
                        </div>
                    </button>
                </div>
            </div>

            <div id="voice-select-area" class="space-y-2">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider block">Voz</label>
                <select id="voice-select" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:border-blue-500 focus:outline-none">
                    <option value="">Carregando vozes...</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1 block">Velocidade: <span id="speed-val">1.00</span>x</label>
                    <input id="speed-slider" type="range" min="0.5" max="2.0" step="0.05" value="1.00" class="w-full accent-blue-500">
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1 block">Pitch: <span id="pitch-val">0</span></label>
                    <input id="pitch-slider" type="range" min="-10" max="10" value="0" step="1" class="w-full accent-blue-500">
                </div>
            </div>

            <textarea id="text-input" rows="4" lang="pt-BR"
                class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 font-sans text-sm placeholder-slate-600 focus:border-blue-500 focus:outline-none"
                placeholder="Digite o texto em português..."></textarea>

            <!-- Progress -->
            <div id="progress-wrap" class="hidden space-y-2">
                <div class="w-full bg-slate-700 h-2 rounded-full overflow-hidden">
                    <div id="progress-bar" class="loading-bar bg-blue-500 h-full" style="width:0%"></div>
                </div>
                <div id="progress-text" class="text-xs text-slate-500 text-center">Gerando áudio...</div>
            </div>

            <div class="flex gap-3">
                <button id="generate-btn" class="flex-1 py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition disabled:opacity-40">🔊 Gerar</button>
                <button id="download-btn" class="hidden px-5 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-bold transition text-sm">⬇ Áudio</button>
            </div>

            <div id="player-wrap" class="hidden"><audio id="audio-player" controls class="w-full"></audio></div>
            <div id="stats" class="hidden text-xs font-mono text-slate-500 space-y-1 bg-slate-900/50 rounded-xl p-3"></div>
        </div>
    </div>

    <script type="module">
        // ─── STATE ───
        let selectedMethod = 'edge';
        let edgeVoices = [];
        let lastAudioUrl = null;

        const el = id => document.getElementById(id);

        // ─── METHOD SELECTION ───
        el('method-grid').addEventListener('click', e => {
            const btn = e.target.closest('.method-btn');
            if (!btn) return;
            document.querySelectorAll('.method-btn').forEach(b => {
                b.classList.remove('ring-2', 'ring-blue-500', 'bg-blue-600/20');
                b.classList.add('bg-slate-700');
            });
            btn.classList.add('ring-2', 'ring-blue-500', 'bg-blue-600/20');
            btn.classList.remove('bg-slate-700');
            selectedMethod = btn.dataset.method;
            loadVoices();
        });
        // Default: edge
        document.querySelector('[data-method="edge"]').classList.add('ring-2', 'ring-blue-500', 'bg-blue-600/20');

        el('speed-slider').addEventListener('input', e => el('speed-val').textContent = parseFloat(e.target.value).toFixed(2));
        el('pitch-slider').addEventListener('input', e => el('pitch-val').textContent = e.target.value);

        // ─── VOICES ───
        async function loadVoices() {
            const select = el('voice-select');
            select.innerHTML = '<option>Carregando...</option>';

            if (selectedMethod === 'edge') {
                await loadEdgeVoices();
            } else {
                await loadKokoroVoices();
            }
        }

        async function loadEdgeVoices() {
            try {
                const resp = await fetch('https://speech.platform.bing.com/consumer/speech/synthesize/readaloud/voices/list?trustedclienttoken=6A5AA1D4EAFF4E9FB37E23D68491D6F4');
                const voices = await resp.json();
                edgeVoices = voices
                    .filter(v => v.Locale?.startsWith('pt-BR'))
                    .map(v => ({
                        voiceName: v.ShortName,
                        friendlyName: v.FriendlyName || v.ShortName,
                        locale: v.Locale
                    }));

                const select = el('voice-select');
                select.innerHTML = '';
                for (const v of edgeVoices) {
                    const opt = document.createElement('option');
                    opt.value = v.voiceName;
                    opt.textContent = v.friendlyName;
                    select.appendChild(opt);
                }
                select.value = 'pt-BR-AntonioNeural';
            } catch (err) {
                el('voice-select').innerHTML = '<option>Erro ao carregar vozes</option>';
                console.error(err);
            }
        }

        async function loadKokoroVoices() {
            const select = el('voice-select');
            select.innerHTML = '<option>Copilot (pt-BR)</option><option>Kokoro (em desenvolvimento)</option>';
        }

        // ─── GENERATE ───
        el('generate-btn').addEventListener('click', async () => {
            const text = el('text-input').value.trim();
            if (!text) return;

            const selectedVoice = el('voice-select').value;
            const speed = el('speed-slider').value;
            const pitch = el('pitch-slider').value;

            if (selectedMethod === 'edge') {
                await generateEdgeTTS(text, selectedVoice, speed, pitch);
            } else {
                generatePiperTTS(text);
            }
        });

        // ─── EDGE TTS ───
        async function generateEdgeTTS(text, voiceName, speed, pitch) {
            const btn = el('generate-btn');
            btn.disabled = true;
            btn.textContent = '⏳ Gerando...';
            el('progress-wrap').classList.remove('hidden');
            el('progress-text').textContent = 'Conectando...';
            el('progress-bar').style.width = '20%';
            el('download-btn').classList.add('hidden');
            el('player-wrap').classList.add('hidden');
            el('stats').classList.add('hidden');

            const t0 = performance.now();

            try {
                // Edge TTS WebSocket approach
                const ssml = `
                    <speak version="1.0" xmlns="http://www.w3.org/2001/10/synthesis" xmlns:mstts="https://www.w3.org/2001/mstts" xml:lang="pt-BR">
                        <voice name="${voiceName}">
                            <prosody rate="${speed}" pitch="${pitch > 0 ? '+' + pitch : pitch}Hz">
                                ${escapeXml(text)}
                            </prosody>
                        </voice>
                    </speak>
                `;

                const requestId = crypto.randomUUID();
                const config = `
                {
                    "context": {
                        "synthesis": {
                            "audio": {
                                "metadataoptions": {
                                    "sentenceBoundaryEnabled": false,
                                    "wordBoundaryEnabled": false
                                },
                                "outputFormat": "audio-24khz-48kbitrate-mono-mp3"
                            }
                        }
                    }
                }
                `.trim();

                // Connect to Edge TTS
                const socket = new WebSocket(
                    'wss://speech.platform.bing.com/consumer/speech/synthesize/readaloud/edge/v1?' +
                    'ConnectionId=' + requestId
                );

                socket.binaryType = 'arraybuffer';

                const chunks = [];

                socket.onopen = () => {
                    el('progress-text').textContent = 'Enviando texto...';
                    el('progress-bar').style.width = '40%';

                    // Send config
                    const configMsg = 'X-Timestamp:' + new Date().toISOString() + '\r\n' +
                                     'Content-Type:application/json; charset=utf-8\r\n' +
                                     'Path:speech.config\r\n\r\n' + config;
                    socket.send(configMsg);

                    // Send SSML
                    const ssmlMsg = 'X-Timestamp:' + new Date().toISOString() + '\r\n' +
                                   'Content-Type:application/ssml+xml\r\n' +
                                   'Path:ssml\r\n' +
                                   'X-RequestId:' + requestId + '\r\n\r\n' + ssml;
                    socket.send(ssmlMsg);
                };

                let audioDone = false;
                socket.onmessage = (event) => {
                    if (!audioDone && event.data instanceof ArrayBuffer) {
                        const view = new DataView(event.data);
                        const header = new TextDecoder().decode(new Uint8Array(event.data, 0, Math.min(50, event.data.byteLength)));

                        if (header.includes('Path:audio')) {
                            // Find where audio data starts
                            const idx = header.indexOf('\r\n\r\n');
                            const separator = header.substring(0, idx + 4);
                            const audioStart = separator.length;
                            chunks.push(event.data.slice(audioStart));
                            el('progress-bar').style.width = '60%';
                        }
                    }
                };

                socket.onclose = async () => {
                    if (chunks.length === 0) {
                        throw new Error('Nenhum áudio gerado. Verifique o texto.');
                    }

                    el('progress-bar').style.width = '100%';
                    el('progress-text').textContent = 'Finalizando...';

                    // Combine chunks
                    const totalLen = chunks.reduce((a, b) => a + b.byteLength, 0);
                    const combined = new Uint8Array(totalLen);
                    let offset = 0;
                    for (const chunk of chunks) {
                        combined.set(new Uint8Array(chunk), offset);
                        offset += chunk.byteLength;
                    }

                    const elapsed = performance.now() - t0;
                    const blob = new Blob([combined], { type: 'audio/mpeg' });
                    const url = URL.createObjectURL(blob);
                    lastAudioUrl = url;

                    el('audio-player').src = url;
                    el('player-wrap').classList.remove('hidden');
                    el('audio-player').play();

                    el('stats').innerHTML = `
                        <div>Voz: <b>${voiceName}</b></div>
                        <div>Texto: <b>${text.length}</b> chars</div>
                        <div>Tempo: <b>${(elapsed/1000).toFixed(1)}s</b></div>
                        <div>Método: <b>Edge TTS</b></div>
                    `;
                    el('stats').classList.remove('hidden');
                    el('download-btn').classList.remove('hidden');

                    btn.textContent = '🔊 Gerar';
                    btn.disabled = false;
                    el('progress-wrap').classList.add('hidden');
                };

            } catch (err) {
                console.error('Edge TTS error:', err);
                btn.textContent = `❌ ${err.message.slice(0,50)}`;
                btn.disabled = false;
                el('progress-wrap').classList.add('hidden');

                // Fallback to Web Speech API
                btn.textContent = '⏳ Tentando Web Speech...';
                try {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'pt-BR';
                    utterance.rate = parseFloat(speed);
                    utterance.pitch = 1.0 + parseInt(pitch) / 20;

                    const voices = speechSynthesis.getVoices();
                    const ptVoice = voices.find(v => v.lang.startsWith('pt'));
                    if (ptVoice) utterance.voice = ptVoice;

                    speechSynthesis.speak(utterance);
                    btn.textContent = '🔊 Gerar (Web Speech)';

                    el('stats').innerHTML = `
                        <div>Método: <b>Web Speech API</b> (fallback)</div>
                        <div>Voz: <b>${utterance.voice ? utterance.voice.name : 'default'}</b></div>
                    `;
                    el('stats').classList.remove('hidden');
                } catch (e2) {
                    btn.textContent = '❌ Sem áudio disponível';
                }
            }
        }

        function generatePiperTTS(text) {
            // Web Speech API fallback for local
            const btn = el('generate-btn');
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pt-BR';
            utterance.rate = parseFloat(el('speed-slider').value);
            utterance.pitch = 1.0 + parseInt(el('pitch-slider').value) / 20;

            const voices = speechSynthesis.getVoices();
            const ptVoice = voices.find(v => v.lang.startsWith('pt'));
            if (ptVoice) utterance.voice = ptVoice;

            speechSynthesis.speak(utterance);
            btn.textContent = '🔊 Reproduzindo (Web Speech)';

            el('stats').innerHTML = `<div>Método: <b>Web Speech API</b></div>`;
            el('stats').classList.remove('hidden');
        }

        function escapeXml(text) {
            return text.replace(/[<>&'"]/g, c => ({
                '<': '&lt;', '>': '&gt;', '&': '&amp;', "'": '&apos;', '"': '&quot;'
            })[c]);
        }

        // ─── Download ───
        el('download-btn').addEventListener('click', () => {
            if (!lastAudioUrl) return;
            const voice = el('voice-select').value.replace('pt-BR-', '').replace(/Neural/g, '');
            const a = document.createElement('a');
            a.href = lastAudioUrl;
            a.download = `tts-${voice}-${Date.now()}.mp3`;
            a.click();
        });

        // ─── Init ───
        speechSynthesis.getVoices(); // Preload
        loadVoices();
    </script>

</body>
</html>

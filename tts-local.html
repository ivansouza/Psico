<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS Local — Supertonic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-bar { transition: width 0.4s ease; }
        textarea { resize: vertical; }
        .voice-btn { transition: all 0.15s ease; }
        .voice-btn.active { box-shadow: 0 0 0 2px #3b82f6; }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); }
            70% { box-shadow: 0 0 0 6px rgba(59,130,246,0); }
            100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
        }
        .synthesizing { animation: pulse-ring 1.2s infinite; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-slate-100 min-h-screen flex flex-col items-center p-4">

    <div class="max-w-xl w-full mt-6 space-y-5">
        <div class="text-center">
            <h1 class="text-3xl font-bold mb-1">🔊 TTS Local</h1>
            <p class="text-slate-400 text-sm">Supertonic TTS — pipeline oficial via Transformers.js</p>
        </div>

        <!-- Setup -->
        <div id="setup-card" class="bg-slate-800/80 rounded-2xl p-5 border border-slate-700 backdrop-blur space-y-4">
            <div id="phase-desc" class="text-sm text-slate-300">Baixa modelo do HuggingFace (~160MB). Primeira vez demora, depois fica em cache (IndexedDB).</div>
            <div class="w-full bg-slate-700 h-3 rounded-full overflow-hidden">
                <div id="progress-bar" class="loading-bar bg-blue-500 h-full" style="width:0%"></div>
            </div>
            <div id="progress-detail" class="text-xs text-slate-500 font-mono min-h-[1.2em]"></div>
            <button id="load-btn" class="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition text-sm">
                ▶ Carregar Modelo
            </button>
        </div>

        <!-- TTS -->
        <div id="tts-card" class="hidden bg-slate-800/80 rounded-2xl p-5 border border-slate-700 backdrop-blur space-y-4">
            <div id="backend-badge" class="text-[10px] font-mono bg-slate-900 inline-block px-3 py-1 rounded-full uppercase tracking-widest">—</div>

            <!-- Voices -->
            <div>
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 block">Voz</label>
                <div id="voice-grid" class="grid grid-cols-5 gap-2">
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="M1">M1</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="M2">M2</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="M3">M3</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="M4">M4</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="M5">M5</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="F1">F1</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="F2">F2</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="F3">F3</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="F4">F4</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="F5">F5</button>
                </div>
            </div>

            <!-- Sliders -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1 block">Steps: <span id="steps-val">5</span></label>
                    <input id="steps-slider" type="range" min="2" max="20" value="5" class="w-full accent-blue-500">
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1 block">Velocidade: <span id="speed-val">1.05</span>x</label>
                    <input id="speed-slider" type="range" min="0.8" max="1.5" step="0.05" value="1.05" class="w-full accent-blue-500">
                </div>
            </div>

            <!-- Input -->
            <textarea id="text-input" rows="3"
                class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 font-sans text-sm placeholder-slate-600 focus:border-blue-500 focus:outline-none"
                placeholder="Type some text here..."></textarea>

            <!-- Actions -->
            <div class="flex gap-3">
                <button id="generate-btn" class="flex-1 py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition disabled:opacity-40">🔊 Gerar</button>
                <button id="download-btn" class="hidden px-5 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-bold transition text-sm">⬇ WAV</button>
            </div>
            <div id="player-wrap" class="hidden"><audio id="audio-player" controls class="w-full"></audio></div>
            <div id="stats" class="hidden text-xs font-mono text-slate-500 space-y-1 bg-slate-900/50 rounded-xl p-3"></div>
        </div>
    </div>

    <script type="module">
        // ──────────────────────────────────────────────
        //  Supertonic TTS via Transformers.js (v1)
        //  This model works with transformers.js pipeline.
        //  Model: onnx-community/Supertonic-TTS-ONNX
        //  Voiced by: PR #1459 in transformers.js repo
        // ──────────────────────────────────────────────

        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.5.1';

        const MODEL_ID   = 'onnx-community/Supertonic-TTS-ONNX';
        const HF_BASE    = `https://huggingface.co/${MODEL_ID}/resolve/main`;
        const VOICES     = ['M1','M2','M3','M4','M5','F1','F2','F3','F4','F5'];

        let genPipeline;
        let lastBlob;
        let selectedVoice = 'M1';

        // ── Elements ──
        const loadBtn        = document.getElementById('load-btn');
        const phaseDesc      = document.getElementById('phase-desc');
        const progressBar    = document.getElementById('progress-bar');
        const progressDetail = document.getElementById('progress-detail');
        const ttsCard        = document.getElementById('tts-card');
        const setupCard      = document.getElementById('setup-card');
        const backendBadge   = document.getElementById('backend-badge');
        const textInput      = document.getElementById('text-input');
        const generateBtn    = document.getElementById('generate-btn');
        const downloadBtn    = document.getElementById('download-btn');
        const audioPlayer    = document.getElementById('audio-player');
        const playerWrap     = document.getElementById('player-wrap');
        const statsDiv       = document.getElementById('stats');
        const stepsSlider    = document.getElementById('steps-slider');
        const speedSlider    = document.getElementById('speed-slider');
        const stepsVal       = document.getElementById('steps-val');
        const speedVal       = document.getElementById('speed-val');
        const voiceGrid      = document.getElementById('voice-grid');

        function setProgress(pct, text) {
            progressBar.style.width = pct + '%';
            if (text !== undefined) progressDetail.textContent = text;
        }

        // ── Voice selection ──
        voiceGrid.addEventListener('click', e => {
            const btn = e.target.closest('.voice-btn');
            if (!btn) return;
            document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('active', 'ring-2', 'ring-blue-500'));
            btn.classList.add('active', 'ring-2', 'ring-blue-500');
            selectedVoice = btn.dataset.voice;
        });
        document.querySelector('[data-voice="M1"]').classList.add('active', 'ring-2', 'ring-blue-500');

        stepsSlider.addEventListener('input', e => stepsVal.textContent = e.target.value);
        speedSlider.addEventListener('input', e => speedVal.textContent = parseFloat(e.target.value).toFixed(2));

        // ── Load pipeline ──
        loadBtn.addEventListener('click', async () => {
            loadBtn.disabled = true;
            loadBtn.textContent = '⏳ Carregando...';
            phaseDesc.textContent = 'Iniciando...';
            setProgress(5);

            try {
                // Detect WebGPU
                let backend = 'wasm';
                if (navigator.gpu) {
                    try {
                        const adapter = await navigator.gpu.requestAdapter();
                        if (adapter) backend = 'webgpu';
                    } catch {}
                }
                setProgress(10, `Backend: ${backend.toUpperCase()}`);

                // Allow downloads from HF
                env.allowLocalModels = false;
                env.useBrowserCache  = true;

                phaseDesc.textContent = 'Baixando modelo onnx-community/Supertonic-TTS-ONNX (~160MB, cache)...';

                genPipeline = await pipeline('text-to-speech', MODEL_ID, {
                    dtype: 'fp32',
                    device: backend === 'webgpu' ? 'gpu' : 'wasm',
                    progress_callback: (info) => {
                        if (info.progress !== undefined) {
                            const pct = Math.round(15 + (info.progress || 0) * 75);
                            setProgress(pct, `${info.file || ''} – ${Math.round((info.progress||0)*100)}%`);
                            phaseDesc.textContent = `Baixando: ${info.file || 'modelo'}...`;
                        } else if (info.status) {
                            phaseDesc.textContent = info.status;
                        }
                    },
                });

                setProgress(100);
                phaseDesc.textContent = '✅ Pronto — Supertonic TTS carregado';

                setTimeout(() => {
                    setupCard.classList.add('hidden');
                    ttsCard.classList.remove('hidden');
                    backendBadge.innerHTML = `<span class="inline-block w-2 h-2 rounded-full mr-1" style="background:#22c55e"></span>${backend.toUpperCase()} · ${VOICES.length} vozes`;
                }, 500);

            } catch (err) {
                console.error('Erro:', err);
                phaseDesc.textContent = `❌ ${err.message.slice(0,100)}`;
                phaseDesc.classList.add('text-red-400');
                loadBtn.disabled = false;
                loadBtn.textContent = '🔄 Tentar novamente';
            }
        });

        // ── Generate ──
        generateBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (!text || !genPipeline) return;

            generateBtn.disabled = true;
            generateBtn.textContent = '⏳ Gerando...';
            generateBtn.classList.add('synthesizing');
            statsDiv.classList.add('hidden');
            downloadBtn.classList.add('hidden');
            playerWrap.classList.add('hidden');

            const steps = parseInt(stepsSlider.value);
            const speed = parseFloat(speedSlider.value);
            const t0    = performance.now();

            try {
                const output = await genPipeline(text, {
                    speaker_embeddings: `${HF_BASE}/voices/${selectedVoice}.bin`,
                    num_inference_steps: steps,
                    speed,
                });

                const elapsed  = performance.now() - t0;
                lastBlob       = await output.toBlob();
                const samples   = output.audio[0];
                const audioLen = samples.length / 24000; // sample rate 24kHz for Supertonic v1
                const url      = URL.createObjectURL(lastBlob);

                audioPlayer.src = url;
                playerWrap.classList.remove('hidden');
                audioPlayer.play();

                statsDiv.innerHTML = `
                    <div>Voz: <b>${selectedVoice}</b> | Steps: <b>${steps}</b> | Speed: <b>${speed}</b></div>
                    <div>Texto: <b>${text.length}</b> chars | Áudio: <b>${audioLen.toFixed(1)}s</b></div>
                    <div>Tempo: <b>${(elapsed/1000).toFixed(1)}s</b></div>
                `;
                statsDiv.classList.remove('hidden');
                downloadBtn.classList.remove('hidden');

                generateBtn.textContent = '🔊 Gerar';
            } catch (err) {
                console.error(err);
                generateBtn.textContent = `❌ ${err.message.slice(0,50)}`;
            }

            generateBtn.disabled = false;
            generateBtn.classList.remove('synthesizing');
        });

        // ── Download ──
        downloadBtn.addEventListener('click', () => {
            if (!lastBlob) return;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(lastBlob);
            a.download = `tts-${selectedVoice}-${Date.now()}.wav`;
            a.click();
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS Local — Supertonic 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-bar { transition: width 0.5s ease; }
        textarea { resize: vertical; }
        .voice-btn { transition: all 0.15s ease; }
        .voice-btn.active { ring: 2px; }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); }
            70% { box-shadow: 0 0 0 6px rgba(59,130,246,0); }
            100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
        }
        .synthesizing { animation: pulse-ring 1.2s infinite; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-slate-100 min-h-screen flex flex-col items-center p-4">

    <div class="max-w-xl w-full mt-6 space-y-5">

        <!-- Header -->
        <div class="text-center">
            <h1 class="text-3xl font-bold mb-1">🔊 TTS Local</h1>
            <p class="text-slate-400 text-sm">Supertonic 2 — roda 100% no seu dispositivo via ONNX WebGPU</p>
        </div>

        <!-- Setup Card -->
        <div id="setup-card" class="bg-slate-800/80 rounded-2xl p-5 border border-slate-700 backdrop-blur">
            <div id="phase-desc" class="text-sm text-slate-300 mb-4">
                Preparando para carregar o modelo...
            </div>

            <div class="w-full bg-slate-700 h-3 rounded-full overflow-hidden mb-3">
                <div id="progress-bar" class="loading-bar bg-blue-500 h-full w-0" style="width:0%"></div>
            </div>

            <div id="progress-detail" class="text-xs text-slate-500 font-mono mb-3 min-h-[1.25rem]"></div>

            <button id="load-btn" class="hidden w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition text-sm">
                Carregar Modelo (~260 MB — 1ª vez)
            </button>
        </div>

        <!-- TTS Card (hidden until model loads) -->
        <div id="tts-card" class="hidden bg-slate-800/80 rounded-2xl p-5 border border-slate-700 backdrop-blur space-y-4">

            <!-- Backend Badge -->
            <div id="backend-badge" class="text-[10px] font-mono bg-slate-900 inline-block px-3 py-1 rounded-full text-emerald-400 uppercase tracking-widest">
                ● Carregando...
            </div>

            <!-- Voice Selection -->
            <div>
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 block">Voz</label>
                <div id="voice-grid" class="grid grid-cols-5 gap-2">
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="M1">M1</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="M2">M2</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="M3">M3</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="M4">M4</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="M5">M5</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="F1">F1</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="F2">F2</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="F3">F3</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="F4">F4</button>
                    <button class="voice-btn py-2 px-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium" data-voice="F5">F5</button>
                </div>
            </div>

            <!-- Steps & Speed -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1 block">
                        Qualidade (steps): <span id="steps-val">5</span>
                    </label>
                    <input id="steps-slider" type="range" min="2" max="20" value="5" class="w-full accent-blue-500">
                    <div class="text-[10px] text-slate-500">2=faster ~20=better</div>
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1 block">
                        Velocidade: <span id="speed-val">1.05</span>x
                    </label>
                    <input id="speed-slider" type="range" min="0.8" max="1.5" step="0.05" value="1.05" class="w-full accent-blue-500">
                    <div class="text-[10px] text-slate-500">0.8=slow ~1.5=fast</div>
                </div>
            </div>

            <!-- Text Input -->
            <textarea id="text-input" rows="4"
                class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 font-sans text-sm placeholder-slate-600 focus:border-blue-500 focus:outline-none transition"
                placeholder="Digite o texto aqui... Ex: Olá, este é um teste de voz local com Supertonic 2!"></textarea>

            <!-- Buttons -->
            <div class="flex gap-3">
                <button id="generate-btn" class="flex-1 py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition disabled:opacity-40 disabled:cursor-not-allowed">
                    🔊 Gerar Áudio
                </button>
                <button id="download-btn" class="hidden px-5 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-bold transition text-sm">
                    ⬇ WAV
                </button>
            </div>

            <!-- Player -->
            <div id="player-wrap" class="hidden">
                <audio id="audio-player" controls class="w-full"></audio>
            </div>

            <!-- Stats -->
            <div id="stats" class="hidden text-xs font-mono text-slate-500 space-y-1 bg-slate-900/50 rounded-xl p-3"></div>
        </div>

    </div>

    <script type="module">
        import {
            env,
            TextToSpeechPipeline,
            Progress,
        } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.6.0';

        // ─────────────────────────────────
        //  State
        // ─────────────────────────────────
        let pipeline = null;
        let lastBlob = null;
        let selectedVoice = 'M1';

        // ─────────────────────────────────
        //  Elements
        // ─────────────────────────────────
        const loadBtn       = document.getElementById('load-btn');
        const phaseDesc     = document.getElementById('phase-desc');
        const progressBar   = document.getElementById('progress-bar');
        const progressDetail= document.getElementById('progress-detail');
        const ttsCard       = document.getElementById('tts-card');
        const setupCard     = document.getElementById('setup-card');
        const backendBadge  = document.getElementById('backend-badge');
        const textInput     = document.getElementById('text-input');
        const generateBtn   = document.getElementById('generate-btn');
        const downloadBtn   = document.getElementById('download-btn');
        const audioPlayer   = document.getElementById('audio-player');
        const playerWrap    = document.getElementById('player-wrap');
        const statsDiv      = document.getElementById('stats');
        const stepsSlider   = document.getElementById('steps-slider');
        const speedSlider   = document.getElementById('speed-slider');
        const stepsVal      = document.getElementById('steps-val');
        const speedVal      = document.getElementById('speed-val');
        const voiceGrid     = document.getElementById('voice-grid');

        // ─────────────────────────────────
        //  Helpers
        // ─────────────────────────────────
        const HF = 'https://huggingface.co/onnx-community/Supertonic-TTS-2-ONNX/resolve/main';

        function setProgress(pct, detail) {
            progressBar.style.width = pct + '%';
            if (detail) progressDetail.textContent = detail;
        }

        // ─────────────────────────────────
        //  Voice selection
        // ─────────────────────────────────
        voiceGrid.addEventListener('click', e => {
            const btn = e.target.closest('.voice-btn');
            if (!btn) return;
            document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('active', 'bg-blue-600'));
            btn.classList.add('active', 'bg-blue-600');
            selectedVoice = btn.dataset.voice;
        });
        // Default M1
        voiceGrid.querySelector('[data-voice="M1"]').classList.add('active', 'bg-blue-600');

        // ─────────────────────────────────
        //  Sliders
        // ─────────────────────────────────
        stepsSlider.addEventListener('input', () => stepsVal.textContent = stepsSlider.value);
        speedSlider.addEventListener('input', () => speedVal.textContent = parseFloat(speedSlider.value).toFixed(2));

        // ─────────────────────────────────
        //  Load Model
        // ─────────────────────────────────
        async function loadModel() {
            loadBtn.classList.add('hidden');
            phaseDesc.textContent = 'Baixando modelo ONNX (~260 MB — cacheado pelo browser)...';
            progressBar.style.width = '0%';

            // Use cache (store models in IndexedDB so they persist)
            env.useBrowserCache = true;

            const t0 = Date.now();

            try {
                pipeline = await TextToSpeechPipeline.from_pretrained(
                    'onnx-community/Supertonic-TTS-2-ONNX',
                    {
                        dtype: 'fp32',
                        device: 'wasm',  // will auto-detect WebGPU if available
                        progress_callback: (msg) => {
                            if (msg instanceof Progress) {
                                const pct = Math.round(msg.progress ?? 0);
                                const file = msg.file ? msg.file.split('/').pop() : '';
                                phaseDesc.textContent = `Baixando: ${file} (${pct}%)`;
                                setProgress(pct, `${msg.loaded ? (msg.loaded / 1e6).toFixed(1) : '?'} MB`);
                            } else if (typeof msg === 'object' && msg.status) {
                                phaseDesc.textContent = msg.status;
                            }
                        }
                    }
                );

                const elapsed = ((Date.now() - t0) / 1000).toFixed(0);
                
                // Show TTS card
                setupCard.classList.add('hidden');
                ttsCard.classList.remove('hidden');

                // Determine backend
                if (typeof navigator !== 'undefined' && navigator.gpu) {
                    backendBadge.textContent = '● WebGPU Ready';
                    backendBadge.classList.add('text-emerald-400');
                } else {
                    backendBadge.textContent = '● WebAssembly (no WebGPU)';
                    backendBadge.classList.add('text-yellow-400');
                }

                console.log(`Model loaded in ${elapsed}s`);
            } catch (err) {
                console.error(err);
                phaseDesc.textContent = `❌ Erro ao carregar: ${err.message}`;
                phaseDesc.classList.add('text-red-400');
                loadBtn.classList.remove('hidden');
                loadBtn.textContent = 'Tentar Novamente';
            }
        }

        loadBtn.addEventListener('click', loadModel);
        // Auto-load attempt
        loadModel();

        // ─────────────────────────────────
        //  Generate Speech
        // ─────────────────────────────────
        generateBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (!text || !pipeline) return;

            generateBtn.disabled = true;
            generateBtn.textContent = '⏳ Gerando...';
            generateBtn.classList.add('synthesizing');
            statsDiv.classList.add('hidden');
            downloadBtn.classList.add('hidden');
            playerWrap.classList.add('hidden');

            const steps = parseInt(stepsSlider.value);
            const speed = parseFloat(speedSlider.value);

            const t0 = Date.now();

            try {
                // Tag text with language
                const taggedText = `<pt>${text}</pt>`;

                const output = await pipeline(taggedText, {
                    speaker_embeddings: `${HF}/voices/${selectedVoice}.bin`,
                    num_inference_steps: steps,
                    speed: speed,
                    progress_callback: (msg) => {
                        if (msg instanceof Progress && msg.progress !== undefined) {
                            generateBtn.textContent = `⏳ ${Math.round(msg.progress)}%`;
                        }
                    }
                });

                const elapsed = ((Date.now() - t0) / 1000);
                const blob = await output.toBlob();
                lastBlob = blob;
                const url = URL.createObjectURL(blob);

                // Audio player
                audioPlayer.src = url;
                playerWrap.classList.remove('hidden');
                audioPlayer.play();

                // Stats
                const audioDuration = output.audio[0].length / 16000; // sample rate
                const rtf = elapsed / audioDuration;
                statsDiv.innerHTML = `
                    <div>Voz: <b>${selectedVoice}</b> | Steps: <b>${steps}</b> | Speed: <b>${speed.toFixed(2)}</b></div>
                    <div>Texto: <b>${text.length}</b> chars</div>
                    <div>Tempo: <b>${elapsed.toFixed(1)}s</b> | Áudio: <b>${audioDuration.toFixed(1)}s</b></div>
                    <div>RTF: <b>${rtf.toFixed(3)}</b> | ~<b>${Math.round(text.length/elapsed)}</b> chars/s</div>
                `;
                statsDiv.classList.remove('hidden');

                downloadBtn.classList.remove('hidden');
                generateBtn.textContent = '🔊 Gerar Áudio';
            } catch (err) {
                console.error(err);
                generateBtn.textContent = `❌ Erro: ${err.message.slice(0,60)}`;
            }

            generateBtn.disabled = false;
            generateBtn.classList.remove('synthesizing');
        });

        // ─────────────────────────────────
        //  Download
        // ─────────────────────────────────
        downloadBtn.addEventListener('click', () => {
            if (!lastBlob) return;
            const a = document.createElement('a');
            const ts = new Date().toISOString().slice(0,19).replace(/[T:]/g, '-');
            a.href = URL.createObjectURL(lastBlob);
            a.download = `supertonic-${selectedVoice}-${ts}.wav`;
            a.click();
            URL.revokeObjectURL(a.href);
        });
    </script>

</body>
</html>

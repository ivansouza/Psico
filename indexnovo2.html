<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSICO LAB // Neural Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --card-bg: #12121a;
            --accent: #00ff88;
            --accent-sec: #ff00ff;
            --accent-tri: #00d4ff;
            --border: #2a2a3a;
            --text: #e0e0e0;
            --muted: #6b7280;
        }

        /* Scanline Texture Overlay */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            opacity: 0.2;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            overflow-x: hidden;
        }

        h1, h2, h3, .orbitron { font-family: 'Orbitron', sans-serif; text-transform: uppercase; }

        /* Chamfered Edges Adaptáveis */
        .cyber-panel {
            clip-path: polygon(0 10px, 10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
            background: var(--card-bg);
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (min-width: 768px) {
            .cyber-panel {
                clip-path: polygon(0 15px, 15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
            }
        }

        .cyber-card {
            clip-path: polygon(0 8px, 8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px));
            background: var(--card-bg);
            border: 1px solid var(--border);
            position: relative;
        }

        .cyber-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--accent);
            opacity: 0.3;
        }

        .cyber-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            transform: translateY(-2px);
        }

        /* Glitch Animation */
        @keyframes glitch {
            0% { transform: translate(0); text-shadow: -2px 0 var(--accent-sec), 2px 0 var(--accent-tri); }
            20% { transform: translate(-1px, 1px); }
            40% { transform: translate(-1px, -1px); }
            60% { transform: translate(1px, 1px); }
            80% { transform: translate(1px, -1px); }
            100% { transform: translate(0); }
        }

        .glitch-text:hover { animation: glitch 0.3s infinite; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .btn-cyber {
            font-family: 'Share Tech Mono', monospace;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 12px;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 0.75rem;
            white-space: nowrap;
        }

        @media (min-width: 640px) {
            .btn-cyber { padding: 8px 16px; font-size: 0.875rem; }
        }

        .btn-cyber:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 10px var(--accent);
        }

        .btn-cyber.active {
            background: var(--accent);
            color: var(--bg);
        }

        /* Filters Shell Adaptável */
        .filters-shell {
            position: fixed;
            top: 0; left: 0; height: 100vh;
            width: 100%;
            max-width: 380px;
            z-index: 1000;
            background: rgba(10, 10, 15, 0.98);
            border-right: 1px solid var(--accent);
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(15px);
        }
        .filters-shell.open { transform: translateX(0); }

        .search-input {
            background: #000;
            border: 1px solid var(--border);
            color: var(--accent);
            font-family: 'Share Tech Mono', monospace;
            padding: 12px;
            width: 100%;
            outline: none;
            font-size: 14px;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 255, 136, 0.3); }

        .tag-pill {
            font-size: 9px;
            text-transform: uppercase;
            padding: 1px 6px;
            border: 1px solid currentColor;
            font-family: 'Share Tech Mono', monospace;
        }
    </style>
</head>
<body class="p-4 sm:p-6 md:p-8">
    <div class="max-w-[1600px] mx-auto">
        <!-- Header HUD -->
        <header id="hero" class="cyber-panel p-4 sm:p-6 mb-6 sm:mb-8 border-accent/30 bg-accent/5">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-6">
                <div class="flex items-center gap-4 sm:gap-6 w-full sm:w-auto">
                    <img src="psico-logo-final.png" alt="Logo" class="h-10 sm:h-12 w-auto filter drop-shadow-[0_0_8px_var(--accent)]">
                    <div class="overflow-hidden">
                        <div class="text-[9px] text-accent font-bold tracking-[0.3em] uppercase mb-1 truncate">Neural Network Lab // Live</div>
                        <h1 class="text-xl sm:text-2xl md:text-4xl font-black text-white glitch-text truncate">IVAN SOUZA LAB</h1>
                    </div>
                </div>
                
                <div class="flex items-center justify-between sm:justify-end gap-4 w-full sm:w-auto border-t sm:border-t-0 border-border pt-4 sm:pt-0">
                    <div class="flex gap-4 md:gap-6 border-r sm:border-x border-border pr-4 sm:px-6">
                        <div class="text-center">
                            <div id="cards-total" class="text-lg sm:text-2xl font-black text-accent-tri leading-none">0</div>
                            <div class="text-[8px] uppercase tracking-widest opacity-50">Files</div>
                        </div>
                        <div class="text-center">
                            <div id="visible-total" class="text-lg sm:text-2xl font-black text-accent leading-none">0</div>
                            <div class="text-[8px] uppercase tracking-widest opacity-50">Nodes</div>
                        </div>
                    </div>
                    
                    <button id="filters-open" class="btn-cyber flex items-center gap-2">
                        <i class="fas fa-terminal text-[10px]"></i> <span class="hidden xs:inline">CONFIG</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Sidebar / Filters -->
        <div id="filters-backdrop" class="fixed inset-0 bg-black/80 z-[999] opacity-0 pointer-events-none transition-opacity duration-300"></div>
        <aside id="filters-shell" class="filters-shell p-6 sm:p-8 overflow-y-auto">
            <div class="flex items-center justify-between mb-8 border-b border-border pb-4">
                <span class="orbitron text-accent text-xs sm:text-sm tracking-widest">System Control</span>
                <button id="filters-close" class="text-2xl text-accent-sec hover:scale-125 transition-transform px-2">&times;</button>
            </div>

            <div class="space-y-8 sm:space-y-10">
                <section>
                    <label class="text-[9px] uppercase tracking-[0.2em] text-muted mb-3 block">Search Query</label>
                    <div class="relative">
                        <input id="search-input" class="search-input" type="text" placeholder="Scanning data streams...">
                        <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 opacity-30 text-accent"></i>
                    </div>
                </section>

                <section>
                    <label class="text-[9px] uppercase tracking-[0.2em] text-muted mb-3 block">Presets</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button class="btn-cyber !text-[9px]" onclick="scrollToSection('hero')">Root</button>
                        <button class="btn-cyber !text-[9px]" onclick="applyPreset('ai')">AI_Protocols</button>
                    </div>
                </section>

                <section>
                    <label class="text-[9px] uppercase tracking-[0.2em] text-muted mb-3 block">Categorical Filters</label>
                    <div id="filters-cat" class="flex flex-wrap gap-2"></div>
                </section>

                <section class="grid grid-cols-1 xs:grid-cols-2 gap-6">
                    <div>
                        <label class="text-[9px] uppercase tracking-[0.2em] text-muted mb-3 block">Temporal Year</label>
                        <div id="filters-year" class="flex flex-wrap gap-2"></div>
                    </div>
                    <div>
                        <label class="text-[9px] uppercase tracking-[0.2em] text-muted mb-3 block">Status</label>
                        <button id="mock-toggle" onclick="toggleMockCards()" class="w-full text-[9px] font-bold uppercase p-2 border border-dashed border-accent-sec/40 hover:bg-accent-sec/10 text-accent-sec">
                            Mode: <span id="mode-label">PRD</span>
                        </button>
                    </div>
                </section>
            </div>
        </aside>

        <!-- Main Gallery -->
        <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
            <!-- Cards injected by JS -->
        </div>
    </div>

    <script>
        // --- DATA & LOGIC ---
        const username = "ivansouza";
        const repo = "Psico";
        const baseUrl = `https://${username}.github.io/${repo}`;
        const sourceUrl = `https://github.com/${username}/${repo}/blob/main`;

        let activeCategory = "Todos";
        let activeYear = "Todos";
        let searchQuery = "";
        let showMockCards = false;

        const categoryPalette = {
            'IA': '#ff00ff', 'Física': '#00d4ff', 'Matemática': '#00ff88', 'Geometria': '#f59e0b', 
            'Arte': '#fb7185', 'Áudio': '#22c55e', 'Shaders': '#60a5fa', 'Fractal': '#a78bfa', 
            'Util': '#94a3b8', 'Animação': '#f97316'
        };

        let experiments = [
            { name: "TTS Local", file: "tts-local.html", pick: true, cat: "Util", date: "03/04/2026", desc: "Servidor Supertonic 2 local." },
            { name: "Sólidos Platónicos", file: "solidos-platonicos.html", cat: "Geometria", date: "01/01/2026", desc: "Visualizador interativo dos 5 sólidos perfeitos." },
            { name: "A-lorenz", file: "A-lorenz.html", cat: "Física", date: "02/12/2025", desc: "Simulação do sistema caótico de Lorenz." },
            { name: "Sacred Dodecahedron", file: "Sacred-Dodecahedron.html", cat: "Geometria", date: "19/12/2025", desc: "Geometria sagrada baseada no dodecaedro." },
            { name: "Truchet Tiles", file: "Truchet.html", cat: "Matemática", date: "12/12/2025", desc: "Mosaicos gerados por algoritmos de Truchet." },
            { name: "Faraday 3D", file: "3d-faraday.html", cat: "Física", date: "19/01/2026", desc: "Gaiola de Faraday tridimensional." },
            { name: "Astroguia", file: "Astroguia.html", cat: "Util", date: "07/01/2026", desc: "Guia astronómico interativo." },
            { name: "Audio Visualizer", file: "audio.html", cat: "Áudio", date: "28/02/2026", desc: "Visualizador de áudio em tempo real." },
            { name: "Aqua Shader", file: "aqua-shader.html", cat: "Shaders", date: "15/03/2026", desc: "Shader WebGL responsivo de água." },
            { name: "Aizawa Neon", file: "aizawa-neon.html", cat: "Física", date: "17/03/2026", desc: "Atrator de Aizawa neon em Three.js." },
            { name: "Tusi Minimal", file: "tusi-minimal.html", cat: "Geometria", date: "21/03/2026", desc: "Versão neon da ilusão de Tusi." },
            { name: "Fractal Dance", file: "fractal-dance.html", cat: "Fractal", date: "25/03/2026", desc: "Koch snowflake interativo." },
            { name: "Voice AI WebGPU", file: "voice-ai-webgpu.html", pick: true, cat: "IA", date: "25/03/2026", desc: "Whisper local com WebGPU." },
            { name: "AI Explorer v4", file: "ai-explorer-v4.html", pick: true, cat: "IA", date: "30/03/2026", desc: "Chat local WebGPU." },
            { name: "Sistema Solar 3D", file: "sistema-solar-3d.html", pick: true, cat: "Física", date: "02/04/2026", desc: "Simulador 3D completo." }
        ];

        function parseDateBR(dateStr) {
            if (!dateStr) return new Date(0);
            const parts = dateStr.split(' ')[0].split('/');
            const [d, m, y] = parts.map(Number);
            return new Date(y, m - 1, d);
        }

        function initFilters() {
            const cats = ['Todos', ...new Set(experiments.map(e => e.cat))];
            const years = ['Todos', ...new Set(experiments.map(e => e.date.split('/')[2].split(' ')[0]))].sort();
            
            document.getElementById('filters-cat').innerHTML = cats.map(c => 
                `<button onclick="applyFilter('cat', '${c}', this)" class="btn-cyber !text-[9px] ${c === activeCategory ? 'active' : ''}">${c}</button>`
            ).join('');
            
            document.getElementById('filters-year').innerHTML = years.map(y => 
                `<button onclick="applyFilter('year', '${y}', this)" class="btn-cyber !text-[9px] ${y === activeYear ? 'active' : ''}">${y}</button>`
            ).join('');
        }

        function applyFilter(type, val, btn) {
            if (type === 'cat') activeCategory = val;
            if (type === 'year') activeYear = val;
            btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCards();
        }

        function toggleMockCards() {
            showMockCards = !showMockCards;
            document.getElementById('mode-label').textContent = showMockCards ? 'LAB' : 'PRD';
            renderCards();
        }

        function applyPreset(kind) {
            if (kind === 'ai') { activeCategory = 'IA'; activeYear = 'Todos'; }
            if (kind === 'recent') { activeYear = '2026'; activeCategory = 'Todos'; }
            initFilters();
            renderCards();
        }

        function renderCards() {
            const q = searchQuery.toLowerCase();
            const filtered = experiments.filter(e => {
                const matchCat = activeCategory === 'Todos' || e.cat === activeCategory;
                const matchYear = activeYear === 'Todos' || e.date.includes(activeYear);
                const matchSearch = !q || e.name.toLowerCase().includes(q) || e.desc.toLowerCase().includes(q);
                const matchDev = showMockCards ? !!e.dev : !e.dev;
                return matchCat && matchYear && matchSearch && matchDev;
            });

            document.getElementById('cards-total').textContent = experiments.length;
            document.getElementById('visible-total').textContent = filtered.length;

            const gallery = document.getElementById('gallery');
            if (!filtered.length) {
                gallery.innerHTML = `<div class="col-span-full py-20 text-center opacity-30 orbitron text-[10px] tracking-widest">NO_DATA_FOUND_IN_SECTOR</div>`;
                return;
            }

            gallery.innerHTML = filtered.map(e => {
                const color = categoryPalette[e.cat] || '#94a3b8';
                return `
                    <article class="cyber-card p-5 flex flex-col justify-between group h-full">
                        <div>
                            <div class="flex justify-between items-center mb-3">
                                <span class="tag-pill" style="color:${color}; border-color:${color}40">${e.cat}</span>
                                <span class="text-[8px] font-mono opacity-30 tracking-tighter">${e.date}</span>
                            </div>
                            <h3 class="text-base sm:text-lg font-bold mb-2 group-hover:text-accent transition-colors break-words">${e.name}</h3>
                            <p class="text-[10px] sm:text-[11px] text-muted leading-relaxed mb-4">${e.desc}</p>
                            <div class="text-[8px] font-mono opacity-20 truncate border-t border-border pt-2">/${e.file}</div>
                        </div>
                        <div class="flex gap-2 mt-5">
                            <a href="${baseUrl}/${e.file}" target="_blank" class="btn-cyber flex-1 text-center !py-2">Execute</a>
                            <a href="${sourceUrl}/${e.file}" target="_blank" class="btn-cyber !px-4 !py-2"><i class="fas fa-code"></i></a>
                        </div>
                    </article>
                `;
            }).join('');
        }

        // --- GITHUB SYNC ---
        async function syncWithGitHub() {
            try {
                const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents`);
                if (!res.ok) return;
                const items = await res.json();
                const files = items.filter(i => i.name.endsWith('.html') && i.name !== 'index.html');
                const known = new Set(experiments.map(e => e.file));
                
                files.forEach(f => {
                    if (!known.has(f.name)) {
                        experiments.push({
                            name: f.name.replace('.html','').replace(/-/g,' ').toUpperCase(),
                            file: f.name,
                            cat: "Util",
                            date: "01/01/2026",
                            desc: "Sincronizado automaticamente via uplink GitHub."
                        });
                    }
                });
                initFilters();
                renderCards();
            } catch (e) { console.error("Uplink Failure", e); }
        }

        // UI Controls
        const shell = document.getElementById('filters-shell');
        const backdrop = document.getElementById('filters-backdrop');
        document.getElementById('filters-open').onclick = () => { shell.classList.add('open'); backdrop.classList.add('opacity-100', 'pointer-events-auto'); };
        document.getElementById('filters-close').onclick = () => { shell.classList.remove('open'); backdrop.classList.remove('opacity-100', 'pointer-events-auto'); };
        backdrop.onclick = () => { shell.classList.remove('open'); backdrop.classList.remove('opacity-100', 'pointer-events-auto'); };
        document.getElementById('search-input').oninput = (e) => { searchQuery = e.target.value; renderCards(); };

        function scrollToSection(id) { document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' }); }

        // Start
        experiments.sort((a,b) => parseDateBR(b.date) - parseDateBR(a.date));
        initFilters();
        renderCards();
        syncWithGitHub();
    </script>
</body>
</html>

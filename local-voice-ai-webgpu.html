<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>Local Voice AI - WebGPU</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <style>
 @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
 body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e5e7eb; }
 .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
 .progress-fill { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
 #output::-webkit-scrollbar, #aiResponse::-webkit-scrollbar { width: 4px; }
 #output::-webkit-scrollbar-thumb, #aiResponse::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
 .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
 @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
 </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

 <div class="w-full max-w-2xl space-y-6 pb-12">
 <header class="text-center py-6">
 <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400 bg-clip-text text-transparent">
 Local AI Studio <span class="text-xs border border-blue-500/50 text-blue-400 px-2 py-0.5 rounded-full ml-2">WebGPU</span>
 </h1>
 <p class="text-gray-500 text-sm mt-2 uppercase tracking-widest font-semibold">Voz e Cérebro 100% Offline</p>
 </header>

 <div id="loaderPanel" class="glass-card p-6 rounded-3xl space-y-6">
 <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider text-center">Configuração de Hardware</h2>
 
 <div class="space-y-2">
 <div class="flex justify-between text-xs font-mono">
 <span id="whisperLabel">Motor de Voz (Whisper Tiny)</span>
 <span id="whisperPercent">0%</span>
 </div>
 <div class="h-1.5 bg-white/5 rounded-full overflow-hidden">
 <div id="whisperBar" class="progress-fill h-full bg-blue-500 w-0"></div>
 </div>
 </div>

 <div class="space-y-2">
 <div class="flex justify-between text-xs font-mono">
 <span id="gemmaLabel">Cérebro Local (Gemma 2B)</span>
 <span id="gemmaPercent">0%</span>
 </div>
 <div class="h-1.5 bg-white/5 rounded-full overflow-hidden">
 <div id="gemmaBar" class="progress-fill h-full bg-purple-500 w-0"></div>
 </div>
 </div>

 <button id="startLoadBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold transition-all shadow-lg shadow-indigo-600/20">
 Baixar e Iniciar Modelos (WebGPU)
 </button>
 <p class="text-[10px] text-gray-600 text-center italic">Aviso: O Gemma requer ~1.5GB de download inicial.</p>
 </div>

 <div id="mainApp" class="hidden space-y-4">
 <div class="glass-card p-6 rounded-3xl relative border-l-4 border-l-blue-500">
 <div class="flex justify-between items-center mb-3">
 <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Transcrição ao vivo</span>
 <button id="clearBtn" class="text-[10px] text-gray-600 hover:text-white uppercase font-bold transition-colors">Limpar</button>
 </div>
 <div id="output" class="text-lg leading-relaxed text-gray-200 h-32 overflow-y-auto pr-2 italic text-gray-600">
 Clique no microfone e fale...
 </div>
 <div class="absolute bottom-4 right-6 flex items-center gap-2">
 <span id="volNum" class="text-[10px] font-mono text-gray-700">00</span>
 <div id="vadCircle" class="w-2.5 h-2.5 rounded-full bg-gray-800 transition-colors"></div>
 </div>
 </div>

 <div class="glass-card p-6 rounded-3xl border-l-4 border-l-purple-500 min-h-[200px] flex flex-col">
 <div class="flex justify-between items-center mb-3">
 <span class="text-[10px] font-bold text-purple-400 uppercase tracking-widest">IA Local (Gemma)</span>
 <span id="aiStatus" class="text-[10px] text-gray-600 uppercase font-mono">Ocioso</span>
 </div>
 <div id="aiResponse" class="flex-1 text-md leading-relaxed text-purple-50/90 overflow-y-auto">
 Aguardando sua pergunta...
 </div>
 </div>

 <div class="flex items-center justify-center gap-6 pt-4">
 <button id="micBtn" class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center shadow-xl shadow-blue-900/20 transition-all active:scale-95">
 <svg id="micIcon" class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a 3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
 </button>

 <button id="thinkBtn" class="bg-purple-600 hover:bg-purple-500 disabled:bg-zinc-800 px-8 py-5 rounded-2xl font-bold text-white shadow-lg transition-all flex items-center gap-2">
 <span>🧠</span> Processar Pergunta
 </button>
 </div>
 </div>
 </div>

 <div id="toast" class="fixed bottom-8 px-6 py-3 bg-white text-black text-sm font-bold rounded-full shadow-2xl opacity-0 transition-opacity pointer-events-none"></div>

 <script type="module">
 import { pipeline } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.10";

 let sttPipe = null;
 let llmPipe = null;
 let audioCtx = null;
 let isRecording = false;
 let mediaRecorder = null;
 let isProcessing = false;

 const startLoadBtn = document.getElementById('startLoadBtn');
 const whisperBar = document.getElementById('whisperBar');
 const whisperPercent = document.getElementById('whisperPercent');
 const gemmaBar = document.getElementById('gemmaBar');
 const gemmaPercent = document.getElementById('gemmaPercent');
 const gemmaLabel = document.getElementById('gemmaLabel');
 
 const mainApp = document.getElementById('mainApp');
 const loaderPanel = document.getElementById('loaderPanel');
 const output = document.getElementById('output');
 const aiResponse = document.getElementById('aiResponse');
 const aiStatus = document.getElementById('aiStatus');
 const micBtn = document.getElementById('micBtn');
 const thinkBtn = document.getElementById('thinkBtn');
 const volNum = document.getElementById('volNum');
 const vadCircle = document.getElementById('vadCircle');

 const showToast = (m) => {
 const t = document.getElementById('toast');
 t.textContent = m; t.classList.remove('opacity-0');
 setTimeout(() => t.classList.add('opacity-0'), 2500);
 };

 async function loadAllModels() {
 startLoadBtn.disabled = true;
 startLoadBtn.textContent = "⚙️ Inicializando WebGPU...";

 try {
 sttPipe = await pipeline("automatic-speech-recognition", "onnx-community/whisper-tiny", {
 device: "webgpu",
 dtype: { encoder_model: "fp32", decoder_model_merged: "q4" },
 progress_callback: (p) => {
 if (p.status === 'progress') {
 whisperBar.style.width = `${Math.round(p.progress)}%`;
 whisperPercent.textContent = `${Math.round(p.progress)}%`;
 }
 }
 });

 gemmaLabel.textContent = "Cérebro (Gemma 2B - IT)";
 llmPipe = await pipeline("text-generation", "onnx-community/gemma-2-2b-it", {
 device: "webgpu",
 dtype: "q4f16",
 progress_callback: (p) => {
 if (p.status === 'progress') {
 gemmaBar.style.width = `${Math.round(p.progress)}%`;
 gemmaPercent.textContent = `${Math.round(p.progress)}%`;
 }
 }
 });

 showToast("Sistemas Ativos!");
 loaderPanel.classList.add('hidden');
 mainApp.classList.remove('hidden');

 } catch (err) {
 console.error(err);
 alert("Falha ao carregar WebGPU. Verifique se seu navegador suporta WebGPU.");
 startLoadBtn.disabled = false;
 startLoadBtn.textContent = "Tentar novamente";
 }
 }

 async function processAudio(blob) {
 if (isProcessing || blob.size < 1000) return;
 isProcessing = true;
 try {
 const buffer = await blob.arrayBuffer();
 const decoded = await audioCtx.decodeAudioData(buffer);
 const audioData = decoded.getChannelData(0);

 const result = await sttPipe(audioData, { language: "pt", task: "transcribe" });

 if (result.text.trim()) {
 if (output.classList.contains('italic')) {
 output.textContent = "";
 output.classList.remove('italic', 'text-gray-500');
 }
 output.textContent += (output.textContent ? " " : "") + result.text.trim();
 output.scrollTop = output.scrollHeight;
 }
 } catch (e) {} finally { isProcessing = false; }
 }

 async function startMic() {
 audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
 const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
 
 const source = audioCtx.createMediaStreamSource(stream);
 const analyzer = audioCtx.createAnalyser();
 source.connect(analyzer);
 const dataArr = new Uint8Array(analyzer.frequencyBinCount);

 const updateVAD = () => {
 if (!isRecording) return;
 analyzer.getByteFrequencyData(dataArr);
 let sum = 0;
 for(let i=0; i<dataArr.length; i++) sum += dataArr[i];
 let v = Math.round(sum/dataArr.length);
 volNum.textContent = v.toString().padStart(2, '0');
 vadCircle.style.backgroundColor = v > 5 ? '#3b82f6' : '#1f2937';
 requestAnimationFrame(updateVAD);
 };
 updateVAD();

 const cycle = () => {
 if (!isRecording) return;
 mediaRecorder = new MediaRecorder(stream);
 mediaRecorder.ondataavailable = (e) => processAudio(e.data);
 mediaRecorder.onstop = () => { if(isRecording) cycle(); };
 mediaRecorder.start();
 setTimeout(() => { if(mediaRecorder.state === "recording") mediaRecorder.stop(); }, 3000);
 };
 cycle();
 }

 async function runInference() {
 const prompt = output.textContent.trim();
 if (!prompt || output.classList.contains('italic')) return;

 thinkBtn.disabled = true;
 aiStatus.textContent = "Pensando...";
 aiStatus.classList.add('loading-pulse', 'text-purple-400');
 aiResponse.textContent = "Gerando resposta local...";

 try {
 const chatPrompt = `<start_of_turn>user\n${prompt}<end_of_turn>\n<start_of_turn>model\n`;
 
 const startTime = performance.now();
 const result = await llmPipe(chatPrompt, {
 max_new_tokens: 128,
 temperature: 0.7,
 do_sample: true,
 top_k: 50,
 });
 const endTime = performance.now();

 const fullText = result[0].generated_text;
 const answer = fullText.split('<start_of_turn>model\n')[1] || fullText;

 aiResponse.textContent = answer.trim();
 aiStatus.textContent = `Respondido em ${((endTime - startTime)/1000).toFixed(1)}s`;
 aiStatus.classList.remove('loading-pulse');

 } catch (err) {
 console.error(err);
 aiResponse.textContent = "Erro na inferência local. Possível falta de VRAM.";
 aiStatus.textContent = "Erro";
 } finally {
 thinkBtn.disabled = false;
 }
 }

 startLoadBtn.onclick = loadAllModels;

 micBtn.onclick = async () => {
 if (!isRecording) {
 isRecording = true;
 micBtn.classList.replace('bg-blue-600', 'bg-red-600');
 if (output.classList.contains('italic')) output.textContent = "Ouvindo...";
 await startMic();
 } else {
 isRecording = false;
 micBtn.classList.replace('bg-red-600', 'bg-blue-600');
 if (mediaRecorder) mediaRecorder.stop();
 showToast("Pausado");
 }
 };

 thinkBtn.onclick = runInference;

 document.getElementById('clearBtn').onclick = () => {
 output.textContent = "Clique no microfone e fale...";
 output.classList.add('italic', 'text-gray-500');
 aiResponse.textContent = "Aguardando sua pergunta...";
 aiStatus.textContent = "Ocioso";
 };
 </script>
</body>
</html>

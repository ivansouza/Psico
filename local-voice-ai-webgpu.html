<!DOCTYPE html>
<html lang="pt-PT">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>AI Studio - Mobile Edition</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <style>
 @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
 body { font-family: 'Inter', sans-serif; background-color: #030305; color: #e2e8f0; }
 .glass-card { background: rgba(15, 15, 25, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
 .progress-bar { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
 #output::-webkit-scrollbar { width: 4px; }
 #output::-webkit-scrollbar-thumb { background: #2d2d39; border-radius: 10px; }
 .btn-glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
 @keyframes pulse-ring { 0% { transform: scale(0.95); opacity: 0.5; } 50% { transform: scale(1.05); opacity: 0.2; } 100% { transform: scale(0.95); opacity: 0.5; } }
 .recording-ring { animation: pulse-ring 2s infinite; }
 </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

 <div class="w-full max-w-lg space-y-6">
 <header class="text-center py-6">
 <h1 class="text-3xl font-bold tracking-tighter text-white">
 Studio <span class="text-indigo-500 italic">V5</span>
 </h1>
 <p class="text-gray-500 text-[10px] uppercase tracking-[0.2em] font-bold">Hardware Accelerated • Mobile Stable</p>
 </header>

 <div id="loaderPanel" class="glass-card p-6 rounded-[2rem] space-y-5">
 <div class="space-y-4">
 <div class="space-y-2">
 <div class="flex justify-between text-[10px] font-mono text-indigo-400">
 <span>STT (Whisper Tiny)</span>
 <span id="whisperPercent">0%</span>
 </div>
 <div class="h-1 bg-white/5 rounded-full overflow-hidden">
 <div id="whisperBar" class="progress-bar h-full bg-indigo-500 w-0"></div>
 </div>
 </div>
 <div class="space-y-2">
 <div class="flex justify-between text-[10px] font-mono text-emerald-400">
 <span>LLM (Qwen 0.5B Mobile)</span>
 <span id="llmPercent">0%</span>
 </div>
 <div class="h-1 bg-white/5 rounded-full overflow-hidden">
 <div id="llmBar" class="progress-bar h-full bg-emerald-500 w-0"></div>
 </div>
 </div>
 </div>
 <button id="initBtn" class="w-full bg-white text-black py-4 rounded-2xl font-bold btn-glow active:scale-95 transition-all">
 Ativar Estúdio Local
 </button>
 <p class="text-[9px] text-center text-gray-600">Modelos leves selecionados para estabilidade em Android/iOS.</p>
 </div>

 <div id="mainUI" class="hidden space-y-4 animate-in fade-in duration-700">
 <div class="glass-card p-6 rounded-[2rem] relative">
 <div id="output" class="text-lg leading-relaxed h-32 overflow-y-auto italic text-gray-500 pr-2">
 Toque no microfone para falar...
 </div>
 <div class="absolute bottom-4 right-6 flex items-center gap-2">
 <span id="volNum" class="text-[10px] font-mono text-gray-700">00</span>
 <div id="vadCircle" class="w-2 h-2 rounded-full bg-zinc-800"></div>
 </div>
 </div>

 <div class="glass-card p-6 rounded-[2rem] min-h-[180px] border-t border-white/5">
 <div class="flex justify-between mb-4">
 <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Resposta Local</span>
 <span id="aiStatus" class="text-[10px] font-mono text-gray-600 italic tracking-tighter">Standby</span>
 </div>
 <div id="aiResponse" class="text-md leading-relaxed text-gray-300">
 Sua resposta aparecerá aqui.
 </div>
 </div>

 <div class="flex justify-center items-center gap-8 py-4">
 <button id="micBtn" class="w-20 h-20 bg-indigo-600 rounded-full flex items-center justify-center relative z-10">
 <div id="micRing" class="absolute inset-0 rounded-full border-4 border-indigo-400 hidden recording-ring"></div>
 <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
 </button>
 <button id="thinkBtn" class="bg-emerald-600 px-8 py-4 rounded-2xl font-bold text-white shadow-lg active:scale-95 transition-all">
 Processar
 </button>
 </div>
 </div>
 </div>

 <script type="module">
 import { pipeline } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.10";

 let stt = null;
 let llm = null;
 let audioCtx = null;
 let isRecording = false;

 const initBtn = document.getElementById('initBtn');
 const whisperBar = document.getElementById('whisperBar');
 const llmBar = document.getElementById('llmBar');
 const whisperPercent = document.getElementById('whisperPercent');
 const llmPercent = document.getElementById('llmPercent');
 const output = document.getElementById('output');
 const aiResponse = document.getElementById('aiResponse');
 const aiStatus = document.getElementById('aiStatus');

 async function startSystem() {
 initBtn.disabled = true;
 initBtn.textContent = "⚙️ Configurando WebGPU...";

 try {
 stt = await pipeline("automatic-speech-recognition", "onnx-community/whisper-tiny", {
 device: "webgpu",
 dtype: { encoder_model: "fp32", decoder_model_merged: "q4" },
 progress_callback: (p) => {
 if (p.status === 'progress') {
 whisperBar.style.width = `${Math.round(p.progress)}%`;
 whisperPercent.textContent = `${Math.round(p.progress)}%`;
 }
 }
 });

 llm = await pipeline("text-generation", "onnx-community/Qwen2.5-0.5B-Instruct", {
 device: "webgpu",
 dtype: "q4",
 progress_callback: (p) => {
 if (p.status === 'progress') {
 llmBar.style.width = `${Math.round(p.progress)}%`;
 llmPercent.textContent = `${Math.round(p.progress)}%`;
 }
 }
 });

 document.getElementById('loaderPanel').classList.add('hidden');
 document.getElementById('mainUI').classList.remove('hidden');

 } catch (err) {
 console.error(err);
 alert("Ocorreu um erro. Tente fechar outras abas do navegador para libertar RAM.");
 initBtn.disabled = false;
 initBtn.textContent = "Reiniciar";
 }
 }

 async function runMic() {
 audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
 const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
 const source = audioCtx.createMediaStreamSource(stream);
 const analyzer = audioCtx.createAnalyser();
 source.connect(analyzer);
 const data = new Uint8Array(analyzer.frequencyBinCount);

 const updateVAD = () => {
 if (!isRecording) return;
 analyzer.getByteFrequencyData(data);
 let sum = 0;
 for(let i=0; i<data.length; i++) sum += data[i];
 let v = Math.round(sum/data.length);
 document.getElementById('volNum').textContent = v.toString().padStart(2, '0');
 document.getElementById('vadCircle').style.backgroundColor = v > 5 ? '#6366f1' : '#27272a';
 requestAnimationFrame(updateVAD);
 };
 updateVAD();

 const loop = () => {
 if (!isRecording) return;
 const rec = new MediaRecorder(stream);
 rec.ondataavailable = async (e) => {
 const buf = await e.data.arrayBuffer();
 const decoded = await audioCtx.decodeAudioData(buf);
 const res = await stt(decoded.getChannelData(0), { language: "pt", task: "transcribe" });
 if (res.text.trim()) {
 if (output.classList.contains('italic')) output.textContent = "";
 output.textContent += (output.textContent ? " " : "") + res.text.trim();
 output.classList.remove('italic', 'text-gray-500');
 output.scrollTop = output.scrollHeight;
 }
 };
 rec.onstop = () => { if(isRecording) loop(); };
 rec.start();
 setTimeout(() => { if(rec.state === "recording") rec.stop(); }, 3000);
 };
 loop();
 }

 async function think() {
 const prompt = output.textContent.trim();
 if (!prompt || output.classList.contains('italic')) return;

 document.getElementById('thinkBtn').disabled = true;
 aiStatus.textContent = "PENSANDO...";
 aiResponse.textContent = "A IA local está a gerar uma resposta...";

 try {
 const formattedPrompt = `<|im_start|>system\nResponda de forma concisa em português.<|im_end|>\n<|im_start|>user\n${prompt}<|im_end|>\n<|im_start|>assistant\n`;
 const startTime = performance.now();
 const result = await llm(formattedPrompt, { 
 max_new_tokens: 100, 
 temperature: 0.6,
 do_sample: true 
 });
 const duration = ((performance.now() - startTime)/1000).toFixed(1);

 const fullText = result[0].generated_text;
 const answer = fullText.split('assistant\n')[1] || fullText;
 
 aiResponse.textContent = answer.trim();
 aiStatus.textContent = `OK (${duration}s)`;
 } catch (err) {
 aiResponse.textContent = "Erro: A GPU mobile esgotou a memória. Tente limpar o texto e falar frases menores.";
 aiStatus.textContent = "ERRO";
 } finally {
 document.getElementById('thinkBtn').disabled = false;
 }
 }

 initBtn.onclick = startSystem;
 document.getElementById('micBtn').onclick = async () => {
 if (!isRecording) {
 isRecording = true;
 document.getElementById('micBtn').classList.replace('bg-indigo-600', 'bg-red-600');
 document.getElementById('micRing').classList.remove('hidden');
 output.textContent = "A ouvir...";
 await runMic();
 } else {
 isRecording = false;
 document.getElementById('micBtn').classList.replace('bg-red-600', 'bg-indigo-600');
 document.getElementById('micRing').classList.add('hidden');
 }
 };
 document.getElementById('thinkBtn').onclick = think;
 </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mágica Binária — Vou adivinhar o número</title>
  <style>
    :root {
      --bg: #0f0f13;
      --card-bg: #1a1a24;
      --accent: #7c5cff;
      --accent-hover: #9b82ff;
      --yes: #22c55e;
      --yes-hover: #16a34a;
      --no: #ef4444;
      --no-hover: #dc2626;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --border: #2a2a3a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow-x: hidden;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 480px;
      animation: fadeIn 0.35s ease;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Intro */
    .intro-title {
      font-size: clamp(1.6rem, 6vw, 2.1rem);
      font-weight: 800;
      text-align: center;
      line-height: 1.25;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #c4b5fd, #7c5cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .intro-sub {
      color: var(--muted);
      text-align: center;
      font-size: 1.05rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .magic-icon {
      font-size: 3.5rem;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 12px rgba(124, 92, 255, 0.5));
    }

    /* Buttons */
    .btn {
      border: none;
      border-radius: 14px;
      font-size: 1.15rem;
      font-weight: 700;
      padding: 16px 28px;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
      width: 100%;
      max-width: 280px;
      color: white;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: var(--accent);
      box-shadow: 0 4px 20px rgba(124, 92, 255, 0.35);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-yes {
      background: var(--yes);
      box-shadow: 0 4px 16px rgba(34, 197, 94, 0.3);
    }

    .btn-yes:hover { background: var(--yes-hover); }

    .btn-no {
      background: var(--no);
      box-shadow: 0 4px 16px rgba(239, 68, 68, 0.3);
    }

    .btn-no:hover { background: var(--no-hover); }

    .btn-row {
      display: flex;
      gap: 14px;
      width: 100%;
      max-width: 340px;
      margin-top: 8px;
    }

    .btn-row .btn {
      flex: 1;
      max-width: none;
    }

    /* Progress */
    .progress {
      width: 100%;
      max-width: 340px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c5cff, #a78bfa);
      border-radius: 99px;
      transition: width 0.35s ease;
    }

    .progress-text {
      font-size: 0.85rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Card header */
    .card-header {
      text-align: center;
      margin-bottom: 16px;
    }

    .card-header h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card-header p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* Numbers grid */
    .numbers-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 14px;
      width: 100%;
      margin-bottom: 22px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }

    .numbers-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px 4px;
      justify-items: center;
    }

    .num {
      font-variant-numeric: tabular-nums;
      font-size: clamp(0.85rem, 3.6vw, 1.05rem);
      font-weight: 600;
      color: #e4e4e7;
      padding: 4px 2px;
      min-width: 2.1em;
      text-align: center;
    }

    /* Result */
    .result-box {
      background: linear-gradient(145deg, #1e1b4b, #2e1065);
      border: 1px solid #4c1d95;
      border-radius: 24px;
      padding: 36px 24px;
      text-align: center;
      width: 100%;
      margin-bottom: 28px;
      box-shadow: 0 0 40px rgba(124, 92, 255, 0.25);
      position: relative;
      overflow: hidden;
    }

    .result-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(167, 139, 250, 0.15), transparent 60%);
      pointer-events: none;
    }

    .result-label {
      font-size: 1.1rem;
      color: #c4b5fd;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .result-number {
      font-size: clamp(3.5rem, 15vw, 5rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #f5f3ff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(167, 139, 250, 0.4);
    }

    .result-sub {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .sparkle {
      position: absolute;
      font-size: 1.4rem;
      opacity: 0.7;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    footer {
      margin-top: 40px;
      font-size: 0.75rem;
      color: #52525b;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- INTRO -->
  <div id="screen-intro" class="screen active">
    <div class="magic-icon">✨</div>
    <h1 class="intro-title">Vou adivinhar o número que você pensou</h1>
    <p class="intro-sub">
      Pense em um número inteiro<br>de <strong>1 a 100</strong>.<br><br>
      Depois diga se ele aparece (ou não) em cada uma das 7 cartas.
    </p>
    <button class="btn btn-primary" onclick="startMagic()">Começar a mágica</button>
  </div>

  <!-- CARD SCREENS (generated by JS) -->
  <div id="screen-card" class="screen">
    <div class="progress">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="progress-text" id="progress-text">1 / 7</span>
    </div>

    <div class="card-header">
      <h2 id="card-title">Carta 1</h2>
      <p>O seu número aparece nesta carta?</p>
    </div>

    <div class="numbers-card">
      <div class="numbers-grid" id="numbers-grid"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-no" onclick="answer(false)">Não</button>
      <button class="btn btn-yes" onclick="answer(true)">Sim</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen">
    <div class="result-box">
      <span class="sparkle" style="top:18px;left:22px;">✨</span>
      <span class="sparkle" style="top:28px;right:26px;animation-delay:0.6s;">✨</span>
      <span class="sparkle" style="bottom:24px;left:30px;animation-delay:1.2s;">✨</span>
      <div class="result-label">O número que você pensou foi</div>
      <div class="result-number" id="result-number">?</div>
      <div class="result-sub">Mágica binária ✨</div>
    </div>
    <button class="btn btn-primary" onclick="restart()">Jogar de novo</button>
  </div>

  <footer></footer>

  <script>
    // Os 7 conjuntos de números do PDF (Binary Magic)
    // O valor de cada carta é o primeiro número (potência de 2)
    const cards = [
      {
        value: 1,
        numbers: [
          1,11,21,31,41,51,61,71,81,91,
          3,13,23,33,43,53,63,73,83,93,
          5,15,25,35,45,55,65,75,85,95,
          7,17,27,37,47,57,67,77,87,97,
          9,19,29,39,49,59,69,79,89,99
        ]
      },
      {
        value: 2,
        numbers: [
          2,11,22,31,42,51,62,71,82,91,
          3,14,23,34,43,54,63,74,83,94,
          6,15,26,35,46,55,66,75,86,95,
          7,18,27,38,47,58,67,78,87,98,
          10,19,30,39,50,59,70,79,90,99
        ]
      },
      {
        value: 4,
        numbers: [
          4,13,22,31,44,53,62,71,84,93,
          5,14,23,36,45,54,63,76,85,94,
          6,15,28,37,46,55,68,77,86,95,
          7,20,29,38,47,60,69,78,87,100,
          12,21,30,39,52,61,70,79,92
        ]
      },
      {
        value: 8,
        numbers: [
          8,13,26,31,44,57,62,75,88,93,
          9,14,27,40,45,58,63,76,89,94,
          10,15,28,41,46,59,72,77,90,95,
          11,24,29,42,47,60,73,78,91,12,
          25,30,43,56,61,74,79,92
        ]
      },
      {
        value: 16,
        numbers: [
          16,21,26,31,52,57,62,83,88,93,
          17,22,27,48,53,58,63,84,89,94,
          18,23,28,49,54,59,80,85,90,95,
          19,24,29,50,55,60,81,86,91,20,
          25,30,51,56,61,82,87,92
        ]
      },
      {
        value: 32,
        numbers: [
          32,37,42,47,52,57,62,99,33,38,
          43,48,53,58,63,100,34,39,44,49,
          54,59,96,35,40,45,50,55,60,97,
          36,41,46,51,56,61,98
        ]
      },
      {
        value: 64,
        numbers: [
          64,69,74,79,84,89,94,99,65,70,
          75,80,85,90,95,100,66,71,76,81,
          86,91,96,67,72,77,82,87,92,97,
          68,73,78,83,88,93,98
        ]
      }
    ];

    let current = 0;
    let sum = 0;

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function startMagic() {
      current = 0;
      sum = 0;
      renderCard();
      showScreen('screen-card');
    }

    function renderCard() {
      const card = cards[current];
      document.getElementById('card-title').textContent = `Carta ${current + 1}`;
      document.getElementById('progress-text').textContent = `${current + 1} / 7`;
      document.getElementById('progress-fill').style.width = `${((current + 1) / 7) * 100}%`;

      const grid = document.getElementById('numbers-grid');
      grid.innerHTML = '';
      card.numbers.forEach(n => {
        const span = document.createElement('span');
        span.className = 'num';
        span.textContent = n;
        grid.appendChild(span);
      });
    }

    function answer(yes) {
      if (yes) {
        sum += cards[current].value;
      }
      current++;

      if (current >= cards.length) {
        // Atualiza a barra para 100%
        document.getElementById('progress-fill').style.width = '100%';
        setTimeout(() => {
          document.getElementById('result-number').textContent = sum;
          showScreen('screen-result');
        }, 250);
      } else {
        // Pequena animação de saída
        const screen = document.getElementById('screen-card');
        screen.style.opacity = '0';
        screen.style.transform = 'translateY(8px)';
        setTimeout(() => {
          renderCard();
          screen.style.opacity = '1';
          screen.style.transform = 'translateY(0)';
        }, 180);
      }
    }

    function restart() {
      showScreen('screen-intro');
    }
  </script>
</body>
</html>

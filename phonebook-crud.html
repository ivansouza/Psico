<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agenda Telefônica CRUD</title>
<style>
:root { --bg: #0b1020; --card: #111827; --muted: #6b7280; --accent: #3b82f6; }
body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; background: var(--bg); color: #e5e7eb; }
.container { max-width: 1100px; margin: 0 auto; padding: 20px; }
.card { background: rgba(2,6,23,.8); border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
h1 { font-size: 1.25rem; margin: 0 0 8px; }
label { font-size: 12px; color: var(--muted); display: block; margin-top: 8px; }
input[type="text"], input[type="tel"] { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #e5e7eb; }
button { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
.btn { background: var(--accent); color: white; font-weight: 700; }
.btn.secondary { background: #374151; color: white; }
table { width: 100%; border-collapse: collapse; margin-top: 6px; }
th, td { padding: 8px; border-bottom: 1px solid #1f2937; font-size: 14px; }
.actions { display: flex; gap: 8px; justify-content: center; }
.empty { text-align: center; color: var(--muted); padding: 16px 0; }
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>Agenda Telefônica</h1>
<form id="contactForm" autocomplete="off">
<div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
<div>
<label for="name">Nome</label>
<input id="name" type="text" placeholder="Digite o nome" required />
</div>
<div>
<label for="phone">Telefone</label>
<input id="phone" type="tel" placeholder="(99) 99999-9999" required />
</div>
</div>
<input type="hidden" id="idx" value="">
<div style="margin-top:12px; display:flex; gap:8px;">
<button type="submit" class="btn" id="saveBtn">Salvar Contato</button>
<button type="button" class="btn secondary" id="clearBtn">Limpar</button>
</div>
</form>
</div>

<div class="card">
<h2 style="margin:0 0 8px;">Contatos</h2>
<table id="table">
<thead>
<tr><th>Nome</th><th>Telefone</th><th>Ações</th></tr>
</thead>
<tbody id="tbody">
<!-- linhas geradas dinamicamente -->
</tbody>
</table>
<div id="empty" class="empty" style="display:none;">Nenhum contato cadastrado.</div>
</div>
</div>

<script>
// Chave de storage
const STORAGE_KEY = "phonebookContacts";

// Estado
let contacts = [];
let editingIndex = -1;

// DOM
const form = document.getElementById("contactForm");
const nameInput = document.getElementById("name");
const phoneInput = document.getElementById("phone");
const idxInput = document.getElementById("idx");
const saveBtn = document.getElementById("saveBtn");
const clearBtn = document.getElementById("clearBtn");
const tbody = document.getElementById("tbody");
const emptyMsg = document.getElementById("empty");

// Init
function load() {
try {
const raw = localStorage.getItem(STORAGE_KEY);
contacts = raw ? JSON.parse(raw) : [];
} catch (e) {
contacts = [];
}
render();
}

function save() {
localStorage.setItem(STORAGE_KEY, JSON.stringify(contacts));
}

// CRUD
function addContact(name, phone) {
contacts.push({ name, phone });
save();
render();
}

function updateContact(index, name, phone) {
contacts[index] = { name, phone };
save();
render();
}

function deleteContact(index) {
contacts.splice(index, 1);
save();
render();
}

// UI
function render() {
tbody.innerHTML = "";
if (contacts.length === 0) {
emptyMsg.style.display = "block";
} else {
emptyMsg.style.display = "none";
contacts.forEach((c, i) => {
const tr = document.createElement("tr");
tr.innerHTML = `
<td>${escapeHTML(c.name)}</td>
<td>${escapeHTML(c.phone)}</td>
<td class="actions">
<button aria-label="Editar" data-i="${i}">✏️</button>
<button aria-label="Excluir" data-i="${i}">🗑️</button>
</td>
`;
// Ações
tr.querySelectorAll("button").forEach(btn => {
btn.addEventListener("click", (e) => {
const idx = Number(btn.dataset.i);
if (btn.textContent.includes("✏️") || btn.getAttribute("aria-label") === "Editar") {
// Editar
editingIndex = idx;
nameInput.value = contacts[idx].name;
phoneInput.value = contacts[idx].phone;
idxInput.value = idx;
saveBtn.textContent = "Atualizar Contato";
} else {
// Excluir
if (confirm("Excluir contato?")) deleteContact(idx);
}
});
});
tbody.appendChild(tr);
});
}
}

function escapeHTML(s) {
const div = document.createElement("div");
div.appendChild(document.createTextNode(s));
return div.innerHTML;
}

// Form submit (criar/atualizar)
form.addEventListener("submit", (e) => {
e.preventDefault();
const nome = nameInput.value.trim();
const telefone = phoneInput.value.trim();
if (!nome || !telefone) return;
const idx = Number(idxInput.value);
if (Number.isFinite(idx) && idx >= 0) {
updateContact(idx, nome, telefone);
} else {
addContact(nome, telefone);
}
form.reset();
idxInput.value = "";
editingIndex = -1;
saveBtn.textContent = "Salvar Contato";
});

clearBtn.addEventListener("click", () => {
form.reset();
idxInput.value = "";
editingIndex = -1;
saveBtn.textContent = "Salvar Contato";
});

// Inicialização
load();
</script>
</body>
</html>

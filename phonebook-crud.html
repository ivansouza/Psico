<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Telefônica CRUD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap');
    body { background-color: #05070a; color: #e2e8f0; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% 50%, #111827 0%, #05070a 100%); }
    .card { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.03); transition: all 0.3s; }
    .card:hover { transform: translateY(-8px); border-color: #38bdf8; box-shadow: 0 20px 40px -20px rgba(56,189,248,0.4); background: rgba(30,41,59,0.6); }
    .gradient-text { background: linear-gradient(135deg, #38bdf8, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .filter-btn { transition: all 0.2s ease; border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); }
    .filter-btn.active { background-color: #38bdf8; color: #0b0f1a; border-color: #38bdf8; box-shadow: 0 0 15px rgba(56,189,248,0.4); }
    .badge-cat { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 800; }
    .file-date { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: #64748b; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #05070a; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #38bdf8; }
  </style>
</head>
<body class="min-h-screen selection:bg-sky-500/30">
  <header class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-2xl border-b border-white/5 p-4 mb-8">
    <div class="max-w-[1600px] mx-auto flex flex-col gap-4">
      <div class="flex flex-col lg:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center shadow-lg shadow-sky-500/20">
            <i class="fas fa-brain text-white text-xl"></i>
          </div>
          <div>
            <h1 class="text-2xl font-black gradient-text tracking-tighter uppercase leading-none">Psico Portfolio</h1>
            <p class="text-slate-500 text-[10px] font-medium uppercase tracking-widest mt-1">Ivan Souza • Laboratório de Código • <span id="cards-total">0</span> cards</p>
          </div>
        </div>
        <div class="flex flex-wrap justify-center gap-1.5" id="filters-cat"></div>
      </div>
      <div class="flex flex-col lg:flex-row gap-4 py-2 border-t border-white/5">
        <div class="flex items-center gap-3">
          <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Ano:</span>
          <div class="flex gap-1.5" id="filters-year"></div>
        </div>
        <div class="flex items-center gap-3 lg:border-l lg:border-white/5 lg:pl-4">
          <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Mês:</span>
          <div class="flex flex-wrap gap-1.5" id="filters-month"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-[1600px] mx-auto px-6 pb-32">
    <div id="stats" class="mb-6 text-slate-500 text-[10px] font-bold uppercase tracking-widest"></div>
    <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6"></div>
  </main>

  <footer class="border-t border-white/5 bg-slate-950/50 py-12 text-center">
    <div class="max-w-7xl mx-auto px-6">
      <p class="text-slate-500 text-sm mb-4 font-medium">Repositório de exploração visual e física computacional.</p>
      <div class="flex justify-center gap-6 text-slate-400">
        <a href="https://github.com/ivansouza/Psico" target="_blank" class="hover:text-sky-400 transition-colors"><i class="fab fa-github text-xl"></i></a>
      </div>
      <p class="text-slate-700 text-[10px] mt-8 uppercase tracking-widest font-bold">&copy; 2026 ivansouza - Creative Coding Lab</p>
    </div>
  </footer>

  <script>
    const username = "ivansouza";
    const repo = "Psico";
    const baseUrl = `https://${username}.github.io/${repo}`;
    const sourceUrl = `https://github.com/${username}/${repo}/blob/main`;

    let activeCategory = "Todos";
    let activeMonth = "Todos";
    let activeYear = "Todos";

    const monthNames = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

    let experiments = [
      { name: "Sólidos Platónicos", file: "solidos-platonicos.html", cat: "Geometria", date: "01/01/2026", desc: "Visualizador interativo dos 5 sólidos perfeitos." },
      // ... existing items will be preserved when you refresh the actual file; this is a static placeholder for the patch
      { name: "Palheta Vibrante", file: "palheta-site.html", cat: "Util", date: "09/03/2026", desc: "Escolha paletas criativas para site com preview ao vivo, presets e cópia de variáveis CSS." }
    ];

    function getYearFromDate(dateStr) { return dateStr.split('/')[2]; }
    function getMonthFromDate(dateStr) { return monthNames[parseInt(dateStr.split('/')[1]) - 1]; }

    function initFilters() {
      const cats = ["Todos", ...new Set(experiments.map(e => e.cat))];
      const filtersCat = document.getElementById('filters-cat');
      filtersCat.innerHTML = cats.map(cat => `
        <button onclick="applyFilter('cat', '${cat}', this)" class="filter-btn px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest ${cat === activeCategory ? 'active' : ''}
        ">${cat}
        </button>
      `).join('');

      const years = ["Todos", ...new Set(experiments.map(e => getYearFromDate(e.date)))].sort();
      const filtersYear = document.getElementById('filters-year');
      filtersYear.innerHTML = years.map(y => `
        <button onclick="applyFilter('year', '${y}', this)" class="filter-btn px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest ${y === activeYear ? 'active' : ''}
        ">${y}
        </button>
      `).join('');

      const availableMonths = [...new Set(experiments.map(e => getMonthFromDate(e.date)))];
      availableMonths.sort((a,b)=> monthNames.indexOf(a)-monthNames.indexOf(b));
      const filtersMonth = document.getElementById('filters-month');
      const monthList = ["Todos", ...availableMonths];
      filtersMonth.innerHTML = monthList.map(m => `
        <button onclick="applyFilter('month', '${m}', this)" class="filter-btn px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest ${m === activeMonth ? 'active' : ''}
        ">${m}
        </button>
      `).join('');
    }

    function applyFilter(type, value, btn) {
      if (type === 'cat') activeCategory = value;
      else if (type === 'month') activeMonth = value;
      else if (type === 'year') activeYear = value;
      btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCards();
    }

    function renderCards() {
      const gallery = document.getElementById('gallery');
      const stats = document.getElementById('stats');
      const filtered = experiments.filter(exp => {
        const matchCat = activeCategory === "Todos" || exp.cat === activeCategory;
        const matchMonth = activeMonth === "Todos" || getMonthFromDate(exp.date) === activeMonth;
        const matchYear = activeYear === "Todos" || getYearFromDate(exp.date) === activeYear;
        return matchCat && matchMonth && matchYear;
      });
      stats.innerHTML = `Resultados: ${filtered.length} de ${experiments.length} experiências`;
      gallery.innerHTML = filtered.map(exp => `
        <div class="card p-6 rounded-[2rem] flex flex-col justify-between h-full group">
          <div>
            <div class="flex justify-between items-start mb-4">
              <div class="flex flex-col">
                <span class="badge-cat text-sky-400 opacity-60">${exp.cat}</span>
                <span class="file-date mt-1">${exp.date}</span>
              </div>
              <div class="flex gap-1">
                <span class="w-1.5 h-1.5 rounded-full bg-slate-700"></span>
                <span class="w-1.5 h-1.5 rounded-full bg-slate-700"></span>
              </div>
            </div>
            <h3 class="text-lg font-extrabold text-white mb-2 leading-tight group-hover:text-sky-400 transition-colors">${exp.name}</h3>
            <p class="text-[11px] text-slate-500 leading-relaxed mb-6 font-medium">${exp.desc}</p>
          </div>
          <div class="flex flex-col gap-2 mt-auto">
            <a href="${baseUrl}/${exp.file}" target="_blank" class="w-full bg-sky-600 hover:bg-sky-500 text-white text-[10px] font-black py-3 rounded-2xl text-center transition-all uppercase tracking-widest flex items-center justify-center gap-2">
              <i class="fas fa-play"></i> Ver Demo
            </a>
            <a href="${sourceUrl}/${exp.file}" target="_blank" class="w-full bg-slate-800/50 hover:bg-slate-700 text-slate-400 hover:text-white text-[9px] font-bold py-2 rounded-xl text-center transition-all flex items-center justify-center gap-2 border border-white/5">
              <i class="fas fa-code"></i> Source Code
            </a>
          </div>
        </div>
      `).join('');
    }

    function parseDateBR(dateStr) { const [day, month, year] = dateStr.split('/').map(Number); return new Date(year, month - 1, day); }

    function sortExperiments() { experiments.sort((a,b)=> { const diff = parseDateBR(b.date) - parseDateBR(a.date); return diff !== 0 ? diff : a.name.localeCompare(b.name); }); }

    function formatDateBR(date = new Date()) {
      const day = String(date.getDate()).padStart(2,'0');
      const month = String(date.getMonth()+1).padStart(2,'0');
      const year = date.getFullYear();
      return `${day}/${month}/${year}`;
    }

    function prettyNameFromFile(file) {
      return file.replace(/\\.html$/i,'').replace(/[-_]+/g,' ').replace(/\s+/g,' ').trim().replace(/\b\w/g, c => c.toUpperCase());
    }

    function classifyByFileName(file) {
      // Simplified classification for demo; could be extended
      const f = file.toLowerCase();
      if (/shader|glsl|sdf/.test(f)) return 'Shaders';
      if (/fractal|mandelbrot|julia|nebulabrot|samambaia/.test(f)) return 'Fractal';
      if (/audio|binaur|tts|player|stereo/.test(f)) return 'Áudio';
      if (/lorenz|gravity|faraday|water|pendulum|orbiter|resson|molas|roldanas|pulley|blackhole|vortex|sp|springs/.test(f)) return 'Física';
      if (/(n1089|prime|kaprekar|fibonacci|lissajous|riemann|har

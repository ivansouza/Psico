<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8">
 <title>Shader Render - WebGL2</title>
 <style>
 body {
 margin: 0;
 overflow: hidden;
 background: #000;
 }
 canvas {
 display: block;
 width: 100vw;
 height: 100vh;
 }
 </style>
</head>
<body>

 <canvas id="canvas"></canvas>

 <!-- Vertex Shader -->
 <script id="vertex-shader" type="x-shader/x-vertex">#version 300 es
 in vec2 position;
 void main() {
 gl_Position = vec4(position, 0.0, 1.0);
 }
 </script>

 <!-- Fragment Shader -->
 <script id="fragment-shader" type="x-shader/x-fragment">#version 300 es
 precision highp float;
 uniform vec2 u_resolution;
 uniform float u_time;
 out vec4 fragColor;

 // Mapeamento de codificação curta do modo geekest do Twigl
 #define t u_time
 #define r vec3(u_resolution, 1.0)
 #define FC vec4(gl_FragCoord.xy, 0.0, 1.0)

 void main() {
 vec4 o = vec4(0.0);
 float z = 0.0, d = 0.0, j = 0.0;

 // Loop original do Twigl
 for (float i = 0.0; i < 50.0; i++) {
 vec3 p = z * normalize(FC.rgb * 2.0 - r.xyy);
 p.z += 5.0 + cos(t);
 p.xz *= mat2(cos(t + p.y * 0.5 + vec4(0, 33, 11, 0))) / max(p.y * 0.1 + 1.0, 0.1);

 for (j = 2.0; j < 15.0; j /= 0.6) {
 p += cos((p.yzx - vec3(t, 0.0, 0.0) / 0.1) * j + t) / j;
 }
 z += d = 0.01 + abs(length(p.xz) + p.y * 0.3 - 0.5) / 7.0;
 o += (sin(z / 3.0 + vec4(7, 2, 3, 0)) + 1.1) / d;
 }
 fragColor = tanh(o / 1000.0);
 }
 </script>

 <!-- Boilerplate JavaScript para rodar o WebGL2 -->
 <script>
 const canvas = document.getElementById('canvas');
 const gl = canvas.getContext('webgl2');

 if (!gl) {
 console.error('WebGL 2 não suportado neste navegador.');
 }

 // Função auxiliar para compilar shaders
 function createShader(gl, type, source) {
 const shader = gl.createShader(type);
 gl.shaderSource(shader, source);
 gl.compileShader(shader);
 if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
 console.error(gl.getShaderInfoLog(shader));
 gl.deleteShader(shader);
 return null;
 }
 return shader;
 }

 // Configuração do Programa WebGL
 const program = gl.createProgram();
 gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, document.getElementById('vertex-shader').text));
 gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, document.getElementById('fragment-shader').text));
 gl.linkProgram(program);
 gl.useProgram(program);

 // Geometria básica: 1 quad encobrindo a tela inteira (2 triângulos)
 const positionBuffer = gl.createBuffer();
 gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
 -1, -1,
 1, -1,
 -1, 1,
 1, 1
 ]), gl.STATIC_DRAW);

 const positionLocation = gl.getAttribLocation(program, 'position');
 gl.enableVertexAttribArray(positionLocation);
 gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

 // Captura das localizações das Uniforms
 const resLocation = gl.getUniformLocation(program, 'u_resolution');
 const timeLocation = gl.getUniformLocation(program, 'u_time');

 // Loop de Renderização Contínua
 function resize() {
 canvas.width = window.innerWidth;
 canvas.height = window.innerHeight;
 gl.viewport(0, 0, canvas.width, canvas.height);
 }
 window.addEventListener('resize', resize);
 resize();

 let start = Date.now();

 function render() {
 const time = (Date.now() - start) * 0.001;
 gl.uniform2f(resLocation, canvas.width, canvas.height);
 gl.uniform1f(timeLocation, time);
 gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
 requestAnimationFrame(render);
 }

 render();
 </script>
</body>
</html>

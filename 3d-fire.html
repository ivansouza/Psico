<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
 <title>3D Fire</title>
 <style>
 body { margin:0; padding:0; overflow:hidden; background:#000; }
 canvas { display:block; width:100vw; height:100vh; }
 </style>
</head>
<body>
 <canvas id="c"></canvas>
 <script>
 // "3D Fire" by @XorDev
 const c = document.getElementById('c');
 const gl = c.getContext('webgl2', { antialias: true, alpha: false, preserveDrawingBuffer: true });
 if (!gl) { document.body.innerHTML = '<h1 style="color:red;text-align:center;margin-top:40vh">WebGL2 não suportado</h1>'; throw 'no webgl2'; }

 const vs = `#version 300 es
 in vec2 p;
 void main() { gl_Position = vec4(p, 0, 1); }`;

 const fs = `#version 300 es
 precision highp float;
 uniform vec2 iResolution;
 uniform float iTime;
 out vec4 fragColor;

 void mainImage(out vec4 o, vec2 FC) {
 float z = 0.0;
 o = vec4(0);
 for(float i = 0.0; i < 50.0; i++) {
 vec3 p = z * normalize(vec3(FC * 2.0 - iResolution, 1.0));
 p.z += 5.0 + cos(iTime);
 float ca = cos(iTime + p.y * 0.5);
 float sa = sin(iTime + p.y * 0.5);
 p.xz = mat2(ca, -sa, sa, ca) * p.xz / max(p.y * 0.1 + 1.0, 0.1);
 for(float j = 2.0; j < 15.0; j /= 0.6) {
 p += cos((p.yzx - vec3(iTime, 0, 0) / 0.1) * j + iTime) / j;
 }
 float d = 0.01 + abs(length(p.xz) + p.y * 0.3 - 0.5) / 7.0;
 z += d;
 o += (sin(z / 3.0 + vec4(7, 2, 3, 0)) + 1.1) / d;
 }
 o = tanh(o / 1000.0);
 }

 void main() {
 mainImage(fragColor, gl_FragCoord.xy);
 }`;

 function resize() {
 c.width = window.innerWidth * devicePixelRatio;
 c.height = window.innerHeight * devicePixelRatio;
 gl.viewport(0, 0, c.width, c.height);
 }

 function compileShader(src, type) {
 const s = gl.createShader(type);
 gl.shaderSource(s, src);
 gl.compileShader(s);
 if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
 throw gl.getShaderInfoLog(s);
 }
 return s;
 }

 try {
 const prog = gl.createProgram();
 gl.attachShader(prog, compileShader(vs, gl.VERTEX_SHADER));
 gl.attachShader(prog, compileShader(fs, gl.FRAGMENT_SHADER));
 gl.linkProgram(prog);
 if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
 throw gl.getProgramInfoLog(prog);
 }
 gl.useProgram(prog);

 const buf = gl.createBuffer();
 gl.bindBuffer(gl.ARRAY_BUFFER, buf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
 const loc = gl.getAttribLocation(prog, 'p');
 gl.enableVertexAttribArray(loc);
 gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

 const rLoc = gl.getUniformLocation(prog, 'iResolution');
 const tLoc = gl.getUniformLocation(prog, 'iTime');

 let start = performance.now();
 function frame() {
 gl.uniform2f(rLoc, c.width, c.height);
 gl.uniform1f(tLoc, (performance.now() - start) / 1000);
 gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
 requestAnimationFrame(frame);
 }

 window.addEventListener('resize', resize);
 resize();
 frame();
 } catch(e) {
 document.body.innerHTML = '<h1 style="color:red;text-align:center;margin-top:40vh">Erro: ' + e + '</h1>';
 }
 </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
 <title>3D Fire</title>
 <style>
 body { margin:0; padding:0; overflow:hidden; background:#000; }
 canvas { display:block; width:100vw; height:100vh; }
 </style>
</head>
<body>
 <canvas id="c"></canvas>
 <script>
 // "3D Fire" by @XorDev — ported from FragCoord
 const c = document.getElementById('c');
 const gl = c.getContext('webgl2', { antialias: true, alpha: false, preserveDrawingBuffer: true });
 if (!gl) { document.body.innerHTML = '<h1 style="color:red;text-align:center;margin-top:40vh">WebGL2 não suportado</h1>'; throw 'no webgl2'; }

 const vs = `#version 300 es
 in vec2 p;
 void main() { gl_Position = vec4(p, 0, 1); }`;

 const fs = `#version 300 es
 precision highp float;
 uniform vec2 r;
 uniform float t;
 out vec4 o;
 void main() {
 vec2 FC = gl_FragCoord.xy;
 for(float i,z,d,j;i++<5e1;o+=(sin(z/3.+vec4(7,2,3,0))+1.1)/d){
 vec3 p=z*normalize(FC.rgb*2.-r.xyy);
 p.z+=5.+cos(t);
 p.xz*=mat2(cos(t+p.y*.5+vec4(0,33,11,0)))/max(p.y*.1+1.,.1);
 for(j=2.;j<15.;j/=.6)p+=cos((p.yzx-vec3(t,0,0)/.1)*j+t)/j;
 z+=d=.01+abs(length(p.xz)+p.y*.3-.5)/7.;
 }
 o=tanh(o/1e3);
 }`;

 function resize() {
 c.width = window.innerWidth * devicePixelRatio;
 c.height = window.innerHeight * devicePixelRatio;
 gl.viewport(0, 0, c.width, c.height);
 }

 const prog = gl.createProgram();
 const vsh = gl.createShader(gl.VERTEX_SHADER);
 gl.shaderSource(vsh, vs); gl.compileShader(vsh);
 const fsh = gl.createShader(gl.FRAGMENT_SHADER);
 gl.shaderSource(fsh, fs); gl.compileShader(fsh);
 gl.attachShader(prog, vsh); gl.attachShader(prog, fsh);
 gl.linkProgram(prog); gl.useProgram(prog);

 const buf = gl.createBuffer();
 gl.bindBuffer(gl.ARRAY_BUFFER, buf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
 const loc = gl.getAttribLocation(prog, 'p');
 gl.enableVertexAttribArray(loc);
 gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

 const rLoc = gl.getUniformLocation(prog, 'r');
 const tLoc = gl.getUniformLocation(prog, 't');

 let start = performance.now();

 function frame() {
 const time = (performance.now() - start) / 1000;
 gl.uniform2f(rLoc, c.width, c.height);
 gl.uniform1f(tLoc, time);
 gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
 requestAnimationFrame(frame);
 }

 window.addEventListener('resize', resize);
 resize();
 frame();
 </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinyCoder v3 - Float16 Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Polyfill para Float16Array - ESSENCIAL para evitar o erro do Tensor -->
    <script src="https://cdn.jsdelivr.net/npm/@petamoriken/float16@3.8.6/dist/float16.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050507; color: #cbd5e1; -webkit-tap-highlight-color: transparent; }
        .font-mono { font-family: 'Fira Code', monospace; }
        .glass { background: rgba(15, 15, 18, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hidden-state { display: none; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-md space-y-5">
        
        <header class="flex items-center justify-between py-4 border-b border-white/10">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-900/40">
                    <i data-lucide="zap" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-black text-white tracking-tighter italic uppercase">
                    TinyCoder <span class="text-blue-500 font-mono">PRO</span>
                </h1>
            </div>
            <div id="device-tag" class="text-[10px] font-bold text-slate-500 bg-white/5 px-2 py-1 rounded border border-white/5">
                AUTO-DETECT
            </div>
        </header>

        <!-- Debug / Logs -->
        <div id="debug-console" class="bg-black/60 border border-white/5 rounded-xl p-3 font-mono text-[10px] h-32 overflow-y-auto shadow-inner">
            <div class="text-blue-500 font-bold mb-1 border-b border-white/5 pb-1 uppercase flex items-center gap-1">
                <i data-lucide="activity" class="w-3 h-3"></i> Monitor de Sistema
            </div>
            <div id="logs" class="opacity-70 space-y-1 text-slate-400">
                <div>> Float16Array Polyfill carregado.</div>
                <div>> Pronto para iniciar.</div>
            </div>
        </div>

        <!-- View: Inicial -->
        <div id="view-start" class="space-y-4">
            <div class="glass rounded-3xl p-8 text-center space-y-6 shadow-2xl">
                <div class="space-y-2">
                    <h2 class="text-xl font-bold text-white tracking-tight">Qwen 2.5 Coder</h2>
                    <p class="text-slate-400 text-xs leading-relaxed max-w-xs mx-auto">
                        Versão optimizada para WebGPU móvel com correção de tensores fp16.
                    </p>
                </div>
                
                <button id="btn-load" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 shadow-xl shadow-blue-900/40 active:scale-[0.97]">
                    Iniciar Motor IA
                    <i data-lucide="play" class="w-4 h-4 fill-current"></i>
                </button>
            </div>
        </div>

        <!-- View: Loading -->
        <div id="view-loading" class="hidden-state glass rounded-3xl p-8 space-y-6">
            <div class="flex justify-between items-end">
                <div class="space-y-1">
                    <span class="text-[10px] font-black uppercase text-blue-500 flex items-center gap-2">
                        <i data-lucide="refresh-cw" class="w-3 h-3 animate-spin"></i> A Carregar
                    </span>
                    <p id="loading-file" class="text-[10px] text-slate-500 font-mono truncate max-w-[150px]">
                        Preparando GPU...
                    </p>
                </div>
                <span id="progress-text" class="font-black text-2xl text-white font-mono">0%</span>
            </div>
            <div class="w-full bg-white/5 rounded-full h-1.5 overflow-hidden">
                <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <!-- View: Editor -->
        <div id="view-editor" class="hidden-state space-y-4">
            <div class="glass rounded-2xl overflow-hidden shadow-2xl">
                <textarea id="input-area" spellcheck="false" class="w-full bg-transparent p-5 h-40 outline-none resize-none font-mono text-sm text-blue-100 placeholder:text-slate-800" placeholder="Insira o código inicial..."></textarea>
                <div class="p-4 bg-black/40 border-t border-white/5 flex justify-between items-center">
                    <button id="btn-clear" class="p-2 text-slate-700 hover:text-red-500 transition-colors">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                    <button id="btn-generate" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest flex items-center gap-3 active:scale-95 transition-all shadow-lg">
                        <i data-lucide="sparkles" class="w-4 h-4"></i>
                        <span>Gerar</span>
                    </button>
                </div>
            </div>
            <div id="output-area" class="bg-[#020203] border border-white/5 rounded-2xl p-6 font-mono text-xs leading-relaxed text-emerald-400 whitespace-pre-wrap min-h-[250px] shadow-inner border-l-2 border-l-emerald-500/30 overflow-auto max-h-[400px]">
                <span class="opacity-20 italic">A aguardar input...</span>
            </div>
        </div>

        <!-- View: Error -->
        <div id="view-error" class="hidden-state bg-red-950/20 border border-red-500/30 rounded-2xl p-6 space-y-4">
            <div class="flex items-start gap-4 text-red-400">
                <i data-lucide="alert-triangle" class="w-6 h-6 shrink-0 mt-0.5"></i>
                <div class="space-y-1">
                    <p class="font-black uppercase text-xs tracking-tight">Falha Técnica</p>
                    <p id="error-message" class="text-[10px] leading-relaxed opacity-80"></p>
                </div>
            </div>
            <button onclick="window.location.reload()" class="w-full bg-white/5 py-3 rounded-xl font-bold text-[10px] uppercase border border-white/5">
                Reiniciar Aplicação
            </button>
        </div>

    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.1';

        // Aplicar Polyfill se não existir nativamente
        if (typeof window.Float16Array === 'undefined') {
            window.Float16Array = float16.Float16Array;
            console.log("Float16Array Polyfill aplicado manualmente.");
        }

        const views = {
            start: document.getElementById('view-start'),
            loading: document.getElementById('view-loading'),
            editor: document.getElementById('view-editor'),
            error: document.getElementById('view-error')
        };
        const logsContainer = document.getElementById('logs');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const loadingFile = document.getElementById('loading-file');
        const outputArea = document.getElementById('output-area');
        const inputArea = document.getElementById('input-area');
        const errorMsg = document.getElementById('error-message');

        let generator = null;
        lucide.createIcons();

        // Configurações de Ambiente
        env.allowLocalModels = false;
        env.allowRemoteModels = true;
        env.useBrowserCache = true;

        const addLog = (msg) => {
            const div = document.createElement('div');
            div.innerText = `> ${msg}`;
            logsContainer.appendChild(div);
            document.getElementById('debug-console').scrollTop = logsContainer.scrollHeight;
        };

        const showView = (target) => {
            Object.keys(views).forEach(key => {
                views[key].classList.toggle('hidden-state', key !== target);
            });
        };

        const initEngine = async () => {
            showView('loading');
            const modelId = 'onnx-community/Qwen2.5-Coder-0.5B-Instruct';
            addLog(`Ligando ao Hugging Face...`);
            
            try {
                // Tentar WebGPU, se falhar, avisar
                const hasGPU = !!navigator.gpu;
                const device = hasGPU ? 'webgpu' : 'cpu';
                document.getElementById('device-tag').innerText = `${device.toUpperCase()} MODE`;
                addLog(`Dispositivo detectado: ${device.toUpperCase()}`);

                generator = await pipeline('text-generation', modelId, {
                    device: device,
                    // Se for WebGPU, tentamos fp16. Se for CPU, usamos quantização q8
                    dtype: device === 'webgpu' ? 'fp16' : 'q8',
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            const prog = Math.round(p.progress);
                            progressBar.style.width = `${prog}%`;
                            progressText.innerText = `${prog}%`;
                        }
                        if (p.status === 'init') {
                            loadingFile.innerText = p.file.split('/').pop();
                        }
                    }
                });

                addLog("Motor IA carregado e estável.");
                showView('editor');
                inputArea.value = "// Exemplo de função de ordenação\nfunction bubbleSort(arr) {";
            } catch (err) {
                console.error(err);
                addLog(`ERRO: ${err.message}`);
                errorMsg.innerText = `Erro de Hardware: ${err.message}. Isto ocorre frequentemente quando o navegador móvel não suporta totalmente o construtor Float16Array ou falta memória GPU.`;
                showView('error');
            }
        };

        document.getElementById('btn-load').onclick = initEngine;
        document.getElementById('btn-clear').onclick = () => {
            inputArea.value = "";
            outputArea.innerHTML = '<span class="opacity-20 italic">A aguardar input...</span>';
        };

        document.getElementById('btn-generate').onclick = async () => {
            if (!generator || !inputArea.value.trim()) return;
            const btn = document.getElementById('btn-generate');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i><span>A Gerar...</span>`;
            lucide.createIcons();
            
            outputArea.innerText = "A processar tensores...";

            try {
                const result = await generator(inputArea.value, {
                    max_new_tokens: 120,
                    temperature: 0.1,
                    do_sample: false,
                    callback_function: (beams) => {
                        const decoded = generator.tokenizer.decode(beams[0].output_token_ids, { skip_special_tokens: true });
                        outputArea.innerText = decoded;
                    }
                });
                outputArea.innerText = result[0].generated_text;
            } catch (err) {
                addLog(`Erro na Inferência: ${err.message}`);
                outputArea.innerHTML = `<span class="text-red-500">Erro: ${err.message}</span>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="sparkles" class="w-4 h-4"></i><span>Gerar</span>`;
                lucide.createIcons();
            }
        };
    </script>
</body>
</html>

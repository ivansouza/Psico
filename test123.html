<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinyCoder v3 - Fix Repo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050507; color: #cbd5e1; -webkit-tap-highlight-color: transparent; }
        .font-mono { font-family: 'Fira Code', monospace; }
        .glass { background: rgba(15, 15, 18, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hidden-state { display: none; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-md space-y-5">
        
        <header class="flex items-center justify-between py-4 border-b border-white/10">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-900/40">
                    <i data-lucide="code-2" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-extrabold text-white tracking-tighter italic uppercase">
                    TinyCoder <span class="text-blue-500 font-mono">FIX</span>
                </h1>
            </div>
            <div id="device-indicator" class="text-[10px] font-bold text-slate-500 bg-white/5 px-2 py-1 rounded border border-white/5 uppercase">
                CPU Mode
            </div>
        </header>

        <!-- Debug Console -->
        <div id="debug-console" class="bg-black/60 border border-white/5 rounded-xl p-3 font-mono text-[10px] space-y-1 h-32 overflow-y-auto shadow-inner">
            <div class="text-blue-500 font-bold flex items-center gap-1 mb-1 border-b border-white/5 pb-1 uppercase tracking-widest">
                <i data-lucide="terminal" class="w-3 h-3"></i> Network_Logs
            </div>
            <div id="logs" class="opacity-70 space-y-1 text-slate-400">
                <div>> Pronto. O ID do repositório foi corrigido.</div>
            </div>
        </div>

        <!-- Start View -->
        <div id="view-start" class="space-y-4">
            <div class="glass rounded-3xl p-8 text-center space-y-6 shadow-2xl">
                <div class="space-y-2">
                    <h2 class="text-xl font-bold text-white tracking-tight">Qwen 2.5 Coder</h2>
                    <p class="text-slate-500 text-xs leading-relaxed max-w-xs mx-auto">
                        Corrigido para o repositório oficial da comunidade (0.5B Instruct).
                    </p>
                </div>
                
                <button id="btn-load-main" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 shadow-xl shadow-blue-900/40 active:scale-[0.97]">
                    Carregar IA
                    <i data-lucide="chevron-right" class="w-5 h-5"></i>
                </button>

                <p class="text-[9px] text-slate-600 font-medium italic">
                    Repositório: onnx-community/Qwen2.5-Coder-0.5B-Instruct
                </p>
            </div>
        </div>

        <!-- Loading View -->
        <div id="view-loading" class="hidden-state glass rounded-3xl p-8 space-y-6">
            <div class="flex justify-between items-end">
                <div class="space-y-1">
                    <span class="text-[10px] font-black uppercase text-blue-500 flex items-center gap-2">
                        <i data-lucide="refresh-cw" class="w-3 h-3 animate-spin"></i> Descarregando
                    </span>
                    <p id="loading-file" class="text-[10px] text-slate-500 font-mono truncate max-w-[180px]">
                        A verificar ficheiros...
                    </p>
                </div>
                <span id="progress-text" class="font-black text-2xl text-white font-mono">0%</span>
            </div>
            <div class="w-full bg-white/5 rounded-full h-2 overflow-hidden">
                <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <!-- Editor View -->
        <div id="view-editor" class="hidden-state space-y-4">
            <div class="glass rounded-2xl overflow-hidden shadow-2xl">
                <textarea id="input-area" spellcheck="false" class="w-full bg-transparent p-5 h-40 outline-none resize-none font-mono text-sm text-blue-100 placeholder:text-slate-800" placeholder="Escreva código aqui..."></textarea>
                <div class="p-4 bg-black/40 border-t border-white/5 flex justify-between items-center">
                    <button id="btn-clear" class="p-2 text-slate-700 hover:text-red-500">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                    <button id="btn-generate" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest flex items-center gap-3 active:scale-95">
                        <i data-lucide="send" class="w-4 h-4"></i>
                        <span>Gerar</span>
                    </button>
                </div>
            </div>
            <div id="output-area" class="bg-black/60 border border-white/5 rounded-2xl p-6 font-mono text-xs leading-relaxed text-emerald-400 whitespace-pre-wrap min-h-[200px] shadow-inner border-l-2 border-l-emerald-500/30">
                Resultado...
            </div>
        </div>

        <!-- Error View -->
        <div id="view-error" class="hidden-state bg-red-950/20 border border-red-500/30 rounded-2xl p-6 space-y-4">
            <div class="flex items-start gap-4 text-red-400">
                <i data-lucide="alert-circle" class="w-6 h-6 shrink-0 mt-0.5"></i>
                <div class="space-y-1">
                    <p class="font-black uppercase text-xs">Erro Detectado</p>
                    <p id="error-message" class="text-[10px] leading-relaxed opacity-80"></p>
                </div>
            </div>
            <button id="btn-retry" class="w-full bg-white/5 py-3 rounded-xl font-bold text-[10px] uppercase border border-white/5">
                Limpar Cache e Tentar CPU
            </button>
        </div>

    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.1';

        const views = {
            start: document.getElementById('view-start'),
            loading: document.getElementById('view-loading'),
            editor: document.getElementById('view-editor'),
            error: document.getElementById('view-error')
        };
        const logsContainer = document.getElementById('logs');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const loadingFile = document.getElementById('loading-file');
        const outputArea = document.getElementById('output-area');
        const inputArea = document.getElementById('input-area');
        const errorMsg = document.getElementById('error-message');

        let generator = null;
        lucide.createIcons();

        // Configuração segura
        env.allowLocalModels = false;
        env.allowRemoteModels = true;
        env.useBrowserCache = true;

        const addLog = (msg) => {
            const div = document.createElement('div');
            div.innerText = `> ${msg}`;
            logsContainer.appendChild(div);
            document.getElementById('debug-console').scrollTop = logsContainer.scrollHeight;
        };

        const showView = (target) => {
            Object.keys(views).forEach(key => {
                views[key].classList.toggle('hidden-state', key !== target);
            });
        };

        const initEngine = async () => {
            showView('loading');
            // NOVO ID CORRIGIDO
            const modelId = 'onnx-community/Qwen2.5-Coder-0.5B-Instruct';
            addLog(`Conectando ao repositório oficial...`);
            
            try {
                const device = navigator.gpu ? 'webgpu' : 'cpu';
                document.getElementById('device-indicator').innerText = `${device} Mode`;

                generator = await pipeline('text-generation', modelId, {
                    device: device,
                    dtype: device === 'webgpu' ? 'fp16' : 'q8',
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            const prog = Math.round(p.progress);
                            progressBar.style.width = `${prog}%`;
                            progressText.innerText = `${prog}%`;
                        }
                        if (p.status === 'init') {
                            addLog(`A ler: ${p.file.split('/').pop()}`);
                            loadingFile.innerText = p.file.split('/').pop();
                        }
                    }
                });

                addLog("Tudo pronto!");
                showView('editor');
                inputArea.value = "// Exemplo: Função de soma\nfunction sum(a, b) {";
            } catch (err) {
                console.error(err);
                addLog(`ERRO CRÍTICO: ${err.message}`);
                errorMsg.innerText = `O erro '${err.message}' costuma acontecer quando o browser bloqueia o download de ficheiros grandes por segurança. Tente mudar de rede (Wi-Fi/4G).`;
                showView('error');
            }
        };

        document.getElementById('btn-load-main').onclick = initEngine;
        document.getElementById('btn-retry').onclick = () => window.location.reload();

        document.getElementById('btn-generate').onclick = async () => {
            if (!generator || !inputArea.value.trim()) return;
            const btn = document.getElementById('btn-generate');
            btn.disabled = true;
            outputArea.innerText = "Gerando...";

            try {
                const result = await generator(inputArea.value, {
                    max_new_tokens: 100,
                    temperature: 0.1,
                    do_sample: false,
                    callback_function: (beams) => {
                        const decoded = generator.tokenizer.decode(beams[0].output_token_ids, { skip_special_tokens: true });
                        outputArea.innerText = decoded;
                    }
                });
                outputArea.innerText = result[0].generated_text;
            } catch (err) {
                addLog(`Erro na geração: ${err.message}`);
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinyCoder v3 - Stable Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050507; color: #cbd5e1; -webkit-tap-highlight-color: transparent; }
        .font-mono { font-family: 'Fira Code', monospace; }
        .glass { background: rgba(15, 15, 18, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hidden-state { display: none; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-md space-y-5">
        
        <!-- Header -->
        <header class="flex items-center justify-between py-4 border-b border-white/10">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg">
                    <i data-lucide="terminal" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-black text-white tracking-tighter italic uppercase">
                    TinyCoder <span class="text-blue-500 font-mono text-sm">STABLE</span>
                </h1>
            </div>
            <div id="device-tag" class="text-[9px] font-bold text-slate-500 bg-white/5 px-2 py-1 rounded border border-white/5">
                STATUS: OFF
            </div>
        </header>

        <!-- Monitor -->
        <div id="debug-console" class="bg-black/60 border border-white/5 rounded-xl p-3 font-mono text-[10px] h-24 overflow-y-auto">
            <div id="logs" class="opacity-70 space-y-1 text-slate-400">
                <div>> Pronto para iniciar o motor estável.</div>
            </div>
        </div>

        <!-- Vista Inicial -->
        <div id="view-start">
            <div class="glass rounded-3xl p-8 text-center space-y-6 shadow-2xl">
                <div class="space-y-2">
                    <h2 class="text-xl font-bold text-white">Qwen 2.5 Coder (q8)</h2>
                    <p class="text-slate-400 text-xs leading-relaxed max-w-xs mx-auto">
                        Actualizado para 8-bit. Maior estabilidade e precisão para evitar erros de repetição.
                    </p>
                </div>
                <button id="btn-load" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 active:scale-95 shadow-xl shadow-blue-500/20">
                    Ligar Motor Estável
                    <i data-lucide="zap" class="w-4 h-4 fill-current"></i>
                </button>
            </div>
        </div>

        <!-- Vista Loading -->
        <div id="view-loading" class="hidden-state glass rounded-3xl p-8 space-y-6">
            <div class="flex justify-between items-end">
                <span class="text-[10px] font-black uppercase text-blue-500 flex items-center gap-2">
                    <i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i> A Sincronizar IA
                </span>
                <span id="progress-text" class="font-black text-2xl text-white font-mono">0%</span>
            </div>
            <div class="w-full bg-white/5 rounded-full h-1.5 overflow-hidden">
                <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p id="loading-file" class="text-[9px] text-slate-600 font-mono text-center uppercase tracking-widest italic"></p>
        </div>

        <!-- Vista Editor -->
        <div id="view-editor" class="hidden-state space-y-4 animate-in fade-in zoom-in-95 duration-500">
            <div class="glass rounded-2xl overflow-hidden border border-white/5">
                <div class="bg-white/5 px-4 py-2 border-b border-white/5 flex items-center justify-between">
                    <span class="text-[10px] font-bold text-slate-500 uppercase">Input de Código</span>
                    <button id="btn-clear" class="text-slate-600 hover:text-red-500 transition-colors">
                        <i data-lucide="trash-2" class="w-3 h-3"></i>
                    </button>
                </div>
                <textarea id="input-area" spellcheck="false" class="w-full bg-transparent p-5 h-40 outline-none resize-none font-mono text-sm text-blue-100 placeholder:text-slate-800" placeholder="Escreva aqui (ex: function hello() { )"></textarea>
                <div class="p-4 bg-black/40 border-t border-white/5">
                    <button id="btn-generate" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-3 active:scale-95 transition-all shadow-lg shadow-blue-500/20">
                        <i data-lucide="sparkles" class="w-4 h-4"></i>
                        <span>Gerar Solução</span>
                    </button>
                </div>
            </div>
            <div id="output-area" class="bg-black border border-white/10 rounded-2xl p-6 font-mono text-xs leading-relaxed text-emerald-400 whitespace-pre-wrap min-h-[200px] shadow-inner border-l-2 border-l-emerald-500/40">
                <span class="opacity-20">O resultado aparecerá aqui...</span>
            </div>
        </div>

        <!-- Vista Erro -->
        <div id="view-error" class="hidden-state bg-red-950/20 border border-red-500/30 rounded-2xl p-6 text-center">
            <i data-lucide="alert-circle" class="w-8 h-8 text-red-500 mx-auto mb-3"></i>
            <p id="error-message" class="text-[10px] text-red-300 opacity-80 mb-4"></p>
            <button onclick="window.location.reload()" class="bg-white/5 px-6 py-2 rounded-lg text-[10px] font-bold uppercase text-white border border-white/10">Reiniciar</button>
        </div>

    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.1';

        const views = {
            start: document.getElementById('view-start'),
            loading: document.getElementById('view-loading'),
            editor: document.getElementById('view-editor'),
            error: document.getElementById('view-error')
        };
        const logsContainer = document.getElementById('logs');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const loadingFile = document.getElementById('loading-file');
        const outputArea = document.getElementById('output-area');
        const inputArea = document.getElementById('input-area');
        const errorMsg = document.getElementById('error-message');

        let generator = null;
        lucide.createIcons();

        env.allowLocalModels = false;
        env.allowRemoteModels = true;
        env.useBrowserCache = true;

        const addLog = (msg) => {
            const div = document.createElement('div');
            div.innerText = `> ${msg}`;
            logsContainer.appendChild(div);
            document.getElementById('debug-console').scrollTop = logsContainer.scrollHeight;
        };

        const showView = (target) => {
            Object.keys(views).forEach(key => {
                views[key].classList.toggle('hidden-state', key !== target);
            });
        };

        const initEngine = async () => {
            showView('loading');
            // Usamos a versão oficial da Xenova ou a da onnx-community com q8 para estabilidade
            const modelId = 'onnx-community/Qwen2.5-Coder-0.5B-Instruct';
            
            try {
                const device = navigator.gpu ? 'webgpu' : 'cpu';
                document.getElementById('device-tag').innerText = `MODE: ${device.toUpperCase()}`;
                addLog(`Iniciando motor em ${device.toUpperCase()}...`);

                generator = await pipeline('text-generation', modelId, {
                    device: device,
                    dtype: 'q8', // MUITO MAIS ESTÁVEL QUE Q4 EM MOBILE
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            const prog = Math.round(p.progress);
                            progressBar.style.width = `${prog}%`;
                            progressText.innerText = `${prog}%`;
                        }
                        if (p.status === 'init') {
                            loadingFile.innerText = `Lendo: ${p.file.split('/').pop()}`;
                        }
                    }
                });

                addLog("Motor IA estável carregado.");
                showView('editor');
                inputArea.value = "// Exemplo: Função para filtrar números pares\nfunction filterEven(arr) {";
            } catch (err) {
                addLog(`ERRO: ${err.message}`);
                errorMsg.innerText = err.message;
                showView('error');
            }
        };

        document.getElementById('btn-load').onclick = initEngine;
        document.getElementById('btn-clear').onclick = () => inputArea.value = "";

        document.getElementById('btn-generate').onclick = async () => {
            if (!generator || !inputArea.value.trim()) return;
            const btn = document.getElementById('btn-generate');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i><span>A Processar...</span>`;
            lucide.createIcons();
            
            outputArea.innerText = "A pensar...";

            try {
                // CORREÇÃO CRÍTICA: Usar Chat Template para o modelo Instruct
                // Se escreveres código direto, ele alucina. Com o template, ele sabe o que fazer.
                const prompt = `<|user|>\nCompleta o seguinte código: \n${inputArea.value}\n<|assistant|>\n`;

                const result = await generator(prompt, {
                    max_new_tokens: 150,
                    temperature: 0.1, // Quase sem aleatoriedade para evitar erros
                    do_sample: false, // Greedy search para máxima estabilidade
                    repetition_penalty: 1.2, // Evita que ele se repita (ex: !!!!!!!!)
                    callback_function: (beams) => {
                        const decoded = generator.tokenizer.decode(beams[0].output_token_ids, { skip_special_tokens: true });
                        // Limpar o prefixo do prompt da resposta se necessário
                        const cleanOutput = decoded.split('<|assistant|>').pop().trim();
                        outputArea.innerText = cleanOutput;
                    }
                });

                const finalClean = result[0].generated_text.split('<|assistant|>').pop().trim();
                outputArea.innerText = finalClean;
            } catch (err) {
                addLog(`Erro: ${err.message}`);
                outputArea.innerText = "Erro ao gerar código.";
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
                lucide.createIcons();
            }
        };
    </script>
</body>
</html>

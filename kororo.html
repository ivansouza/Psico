<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kokoro TTS 82M - Voz Dora (Português Brasileiro)</title>
  <style>
    body { font-family: system-ui; padding: 20px; max-width: 800px; margin: auto; }
    button { padding: 16px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 12px; width: 100%; }
    #status { min-height: 70px; font-weight: bold; padding: 12px; border-radius: 8px; margin: 15px 0; }
    textarea { width: 100%; height: 140px; padding: 14px; font-size: 17px; border: 2px solid #ddd; border-radius: 12px; }
  </style>
</head>
<body>
  <h1>Kokoro TTS 82M - Voz Dora (Português Brasileiro)</h1>
  <p><strong>Texto em português:</strong></p>
  <textarea id="input">Olá! Isso é um teste de voz em português brasileiro com o Kokoro TTS 82M usando a voz Dora.</textarea>
  <br><br>
  <button id="btn" onclick="generateAudio()">▶ Gerar Áudio com Voz Dora</button>
  <div id="status"></div>
  <audio id="player" controls style="width:100%; margin-top: 10px; display:none;"></audio>

  <script>
    async function generateAudio() {
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      const player = document.getElementById('player');
      const text = document.getElementById('input').value.trim();

      if (!text) return alert("Digite algum texto!");

      btn.disabled = true;
      btn.textContent = "⏳ Gerando...";
      status.style.background = "#e6f7ff";
      status.style.color = "#0066cc";
      status.textContent = "Enviando para a API do Kokoro...";

      try {
        const response = await fetch("https://voice-generator.pages.dev/api/v1/text-to-speech", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer http"   // ← Token que você autorizou
          },
          body: JSON.stringify({
            text: text,
            voice: "pf_dora",
            speed: 1.0
          })
        });

        if (!response.ok) throw new Error("Erro na API: " + response.status);

        const audioBlob = await response.blob();
        const url = URL.createObjectURL(audioBlob);

        player.src = url;
        player.style.display = "block";
        player.play();

        status.style.background = "#d4edda";
        status.style.color = "#155724";
        status.textContent = "✅ Áudio gerado com sucesso! (Voz Dora)";
      } catch (err) {
        console.error(err);
        status.style.background = "#f8d7da";
        status.style.color = "#721c24";
        status.textContent = "❌ Erro: " + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "▶ Gerar Áudio com Voz Dora";
      }
    }
  </script>
</body>
</html>

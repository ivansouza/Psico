<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Kokoro TTS 82M - Voz Dora (PT-BR)</title>
  <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2"></script>
  <style>
    body { font-family: system-ui; padding: 20px; max-width: 800px; margin: auto; }
    button { padding: 15px 30px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 8px; width: 100%; }
    #status { margin: 20px 0; font-weight: bold; min-height: 80px; font-size: 17px; }
    textarea { width: 100%; height: 130px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>Kokoro TTS 82M - Voz Dora (Português Brasileiro)</h1>
  <p><strong>Texto em português:</strong></p>
  <textarea id="input">Olá! Isso é um teste de voz em português brasileiro com o Kokoro TTS 82M usando a voz Dora, rodando direto no navegador com WebGPU.</textarea>
  <br><br>
  <button id="btn" onclick="generateSpeech()">▶ Gerar Áudio com Voz Dora</button>
  <div id="status"></div>
  <audio id="player" controls style="width:100%; margin-top: 20px;"></audio>

  <script type="module">
    async function generateSpeech() {
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      
      // Feedback imediato (antes de qualquer coisa)
      btn.textContent = '⏳ Carregando...';
      btn.disabled = true;
      status.style.color = 'blue';
      status.textContent = '✅ Botão clicado!\nIniciando Kokoro TTS com voz pf_dora...';

      try {
        const { KokoroTTS } = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2');

        status.textContent = '📥 Baixando modelo Kokoro 82M (≈300 MB)...';

        const tts = await KokoroTTS.from_pretrained('onnx-community/Kokoro-82M-v1.0-ONNX', {
          device: 'webgpu',
          dtype: 'q4'
        });

        status.textContent = '🎙️ Gerando áudio com voz Dora...';

        const result = await tts(document.getElementById('input').value.trim(), { voice: 'pf_dora' });

        const player = document.getElementById('player');
        player.src = URL.createObjectURL(result.audio);
        player.play();

        status.style.color = 'green';
        status.textContent = '🎉 Áudio gerado com sucesso!\n(Voz Dora - Português Brasileiro)';
      } catch (err) {
        console.error(err);
        status.style.color = 'red';
        status.textContent = '❌ Erro: ' + err.message;
      } finally {
        btn.textContent = '▶ Gerar Áudio com Voz Dora';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>

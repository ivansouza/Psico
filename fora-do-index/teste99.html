<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosa 🌹 - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
    <!-- Incluir a biblioteca Three.js (você precisará de um servidor local ou CDN para isso funcionar) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<script>
    // --- Configuração Básica do Three.js ---
    let scene, camera, renderer;

    function init() {
        // 1. Cena
        scene = new THREE.Scene();

        // 2. Câmera
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        // 3. Renderizador
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 4. Adicionar a Rosa (Representação Geométrica)
        // Vamos usar uma esfera como representação inicial da rosa.
        const geometry = new THREE.SphereGeometry(1, 32, 32);
        const material = new THREE.MeshPhongMaterial({ color: 0xFF69B4 }); // Rosa claro
        const rose = new THREE.Mesh(geometry, material);
        scene.add(rose);

        // Adicionar luzes para que o objeto seja visível
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // Event Listener para redimensionamento da janela
        window.addEventListener('resize', onWindowResize, false);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.上が(window.innerHeight / 2);
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // --- Loop de Renderização ---
    function animate() {
        requestAnimationFrame(animate);

        // Exemplo de animação: girar a rosa lentamente
        scene.children[2].rotation.x += 0.005;
        scene.children[2].rotation.y += 0.005;

        renderer.render(scene, camera);
    }

    // Iniciar tudo
    init();
    animate();

</script>
</body>
</html>

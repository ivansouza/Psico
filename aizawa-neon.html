<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atrator de Aizawa | Estilo Órbita Neon</title>
  <style>
    :root {
      --accent: #00ffff;
      --bg: #000000;
    }
    body {
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      pointer-events: none;
      z-index: 10;
    }
    h1 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }
    p {
      margin: 5px 0 0;
      font-size: 0.8rem;
      opacity: 0.6;
    }
    canvas { display: block; }

    .dg.main { margin-right: 10px !important; }
  </style>
</head>
<body>

<div id="info">
  <h1>Aizawa: Órbita Neon</h1>
  <p>Inspirado no visual de trajetórias de partículas</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>

<script>
const config = {
  a: 0.95,
  b: 0.7,
  c: 0.6,
  d: 3.5,
  e: 0.25,
  f: 0.1,
  dt: 0.012,
  scale: 8.5,
  numPoints: 80000,
  lineOpacity: 0.4,
  pointSize: 3.5,
  autoRotate: true,
  rotationSpeed: 0.003
};

let scene, camera, renderer, lineMesh, pointCloud, gui;
let isDragging = false;
let prevMouse = { x: 0, y: 0 };

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 5, 50);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  createAizawa();
  setupGUI();
  setupControls();

  window.addEventListener('resize', onResize);
  animate();
}

function createAizawa() {
  if (lineMesh) scene.remove(lineMesh);
  if (pointCloud) scene.remove(pointCloud);

  const positions = [];
  const pointPositions = [];
  const pointColors = [];

  let x = 0.1, y = 0.1, z = 0.1;
  const colorObj = new THREE.Color();

  for (let i = 0; i < config.numPoints; i++) {
    const dx = (z - config.b) * x - config.d * y;
    const dy = config.d * x + (z - config.b) * y;
    const dz = config.c + config.a * z - (z * z * z) / 3.0
      - (x * x + y * y) * (1.0 + config.e * z)
      + config.f * z * (x * x * x);

    x += dx * config.dt;
    y += dy * config.dt;
    z += dz * config.dt;

    const px = x * config.scale;
    const py = y * config.scale;
    const pz = z * config.scale;

    positions.push(px, py, pz);

    if (i % 15 === 0) {
      pointPositions.push(px, py, pz);
      const rand = Math.random();
      if (rand > 0.8) colorObj.setHSL(0.95, 1, 0.7);
      else if (rand > 0.6) colorObj.setHSL(0.15, 1, 0.6);
      else if (rand > 0.4) colorObj.setHSL(0.55, 1, 0.7);
      else colorObj.setHSL(0, 0, 1);
      pointColors.push(colorObj.r, colorObj.g, colorObj.b);
    }
  }

  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  const lineMat = new THREE.LineBasicMaterial({
    color: 0x00e5ff,
    transparent: true,
    opacity: config.lineOpacity,
    blending: THREE.AdditiveBlending
  });
  lineMesh = new THREE.Line(lineGeo, lineMat);
  scene.add(lineMesh);

  const pointGeo = new THREE.BufferGeometry();
  pointGeo.setAttribute('position', new THREE.Float32BufferAttribute(pointPositions, 3));
  pointGeo.setAttribute('color', new THREE.Float32BufferAttribute(pointColors, 3));

  const pointMat = new THREE.ShaderMaterial({
    uniforms: { uSize: { value: config.pointSize } },
    vertexShader: `
      attribute vec3 color;
      varying vec3 vColor;
      uniform float uSize;
      void main() {
        vColor = color;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = uSize * (300.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      void main() {
        float r = distance(gl_PointCoord, vec2(0.5));
        if (r > 0.5) discard;
        float glow = pow(1.0 - r * 2.0, 2.0);
        gl_FragColor = vec4(vColor, glow);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthTest: false
  });

  pointCloud = new THREE.Points(pointGeo, pointMat);
  scene.add(pointCloud);
}

function setupGUI() {
  gui = new dat.GUI({ width: 260 });
  const f1 = gui.addFolder('Matemática');
  ['a', 'b', 'c', 'd', 'e', 'f'].forEach(p => f1.add(config, p, 0, 5).onChange(createAizawa));

  const f2 = gui.addFolder('Estética');
  f2.add(config, 'lineOpacity', 0, 1).name('Opacidade Linha').onChange(v => lineMesh.material.opacity = v);
  f2.add(config, 'pointSize', 1, 10).name('Brilho Pontos').onChange(v => pointCloud.material.uniforms.uSize.value = v);
  f2.add(config, 'scale', 2, 20).name('Escala').onChange(createAizawa);
  f2.add(config, 'dt', 0.001, 0.03).name('Fluidez').onChange(createAizawa);

  const f3 = gui.addFolder('Câmara');
  f3.add(config, 'autoRotate').name('Rodar automático');
  f3.add(config, 'rotationSpeed', 0, 0.05).name('Velocidade');

  f1.open();
  f2.open();
}

function setupControls() {
  const handleMove = (x, y) => {
    if (!isDragging) return;
    const dx = (x - prevMouse.x) * 0.005;
    const dy = (y - prevMouse.y) * 0.005;
    lineMesh.rotation.y += dx;
    lineMesh.rotation.x += dy;
    pointCloud.rotation.y += dx;
    pointCloud.rotation.x += dy;
    prevMouse.x = x;
    prevMouse.y = y;
  };

  window.addEventListener('mousedown', e => { isDragging = true; prevMouse.x = e.clientX; prevMouse.y = e.clientY; });
  window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', () => isDragging = false);

  window.addEventListener('touchstart', e => { isDragging = true; prevMouse.x = e.touches[0].clientX; prevMouse.y = e.touches[0].clientY; });
  window.addEventListener('touchmove', e => handleMove(e.touches[0].clientX, e.touches[0].clientY));
  window.addEventListener('touchend', () => isDragging = false);

  window.addEventListener('wheel', e => {
    camera.position.z += e.deltaY * 0.05;
    camera.position.z = Math.max(5, Math.min(300, camera.position.z));
  }, { passive: true });
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  if (config.autoRotate && !isDragging) {
    lineMesh.rotation.y += config.rotationSpeed;
    pointCloud.rotation.y += config.rotationSpeed;
  }
  renderer.render(scene, camera);
}

window.onload = init;
</script>
</body>
</html>

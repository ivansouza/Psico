<title>AsciiArch — Templates ASCII</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  min-height: 100vh;
  padding: 40px 20px;
}
h1 { text-align: center; font-size: 32px; color: #58a6ff; margin-bottom: 8px; }
.sub { text-align: center; color: #8b949e; margin-bottom: 32px; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
  max-width: 1100px;
  margin: 0 auto;
}
.card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 20px;
  cursor: pointer;
  transition: all .15s;
}
.card:hover { border-color: #58a6ff; transform: translateY(-2px); }
.card h3 { font-size: 16px; color: #c9d1d9; margin-bottom: 4px; }
.card p { font-size: 12px; color: #8b949e; margin-bottom: 12px; }
.card pre {
  background: #0d1117;
  border: 1px solid #21262d;
  border-radius: 6px;
  padding: 12px;
  font-size: 9px;
  line-height: 1.2;
  color: #8b949e;
  overflow: hidden;
  max-height: 200px;
  font-family: 'Consolas', 'Courier New', monospace;
}
.card .tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.card .tag {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  background: #1c2333;
  color: #58a6ff;
  border: 1px solid #30363d;
}
footer { text-align: center; padding: 32px; color: #484f58; font-size: 12px; }
footer a { color: #58a6ff; }
</style>
</head>

<p class="sub">Templates de diagramas ASCII para copiar e colar no <a href="https://asciiflow.com" style="color:#58a6ff">ASCIIFlow</a></p>

<div class="grid" id="grid"></div>

<footer>
  Baseado no <a href="https://github.com/lewish/asciiflow">ASCIIFlow</a> · Use o botão "Copy" no ASCIIFlow para colar

const grid = document.getElementById('grid');

for (const [key, tpl] of Object.entries(TEMPLATES)) {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => {
    navigator.clipboard.writeText(tpl.content.trim()).then(() => {
      // Abre o ASCIIFlow
      window.open('https://asciiflow.com', '_blank');
      alert('✅ Template copiado!\n\nCole no ASCIIFlow com Ctrl+V');
    });
  };
  
  let tagsHtml = tpl.tags.map(t => `<span class="tag">${t}</span>`).join('');
  
  card.innerHTML = `
    <h3>${tpl.title}</h3>
    <p>${tpl.desc}</p>
    <pre>${tpl.content.trim().split('\n').slice(0, 12).join('\n')}</pre>
    <div class="tags">${tagsHtml}</div>
  `;
  
  grid.appendChild(card);
}

<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>AsciiArch — Templates ASCII</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  min-height: 100vh;
  padding: 40px 20px;
}
h1 { text-align: center; font-size: 32px; color: #58a6ff; margin-bottom: 8px; }
.sub { text-align: center; color: #8b949e; margin-bottom: 32px; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
  max-width: 1100px;
  margin: 0 auto;
}
.card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 20px;
  cursor: pointer;
  transition: all .15s;
}
.card:hover { border-color: #58a6ff; transform: translateY(-2px); }
.card h3 { font-size: 16px; color: #c9d1d9; margin-bottom: 4px; }
.card p { font-size: 12px; color: #8b949e; margin-bottom: 12px; }
.card pre {
  background: #0d1117;
  border: 1px solid #21262d;
  border-radius: 6px;
  padding: 12px;
  font-size: 9px;
  line-height: 1.2;
  color: #8b949e;
  overflow: hidden;
  max-height: 200px;
  font-family: 'Consolas', 'Courier New', monospace;
}
.card .tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.card .tag {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  background: #1c2333;
  color: #58a6ff;
  border: 1px solid #30363d;
}
footer { text-align: center; padding: 32px; color: #484f58; font-size: 12px; }
footer a { color: #58a6ff; }
</style>
</head>
<body>
<h1>⌨️ AsciiArch</h1>
<p class="sub">Templates de diagramas ASCII para copiar e colar no <a href="https://asciiflow.com" style="color:#58a6ff">ASCIIFlow</a></p>

<div class="grid" id="grid"></div>


<!-- Fullscreen Modal -->
<div id="fullscreenModal" style="display:none;position:fixed;inset:0;background:#0d1117;z-index:1000;flex-direction:column;">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#161b22;border-bottom:1px solid #30363d;">
    <h2 id="modalTitle" style="font-size:16px;color:#58a6ff;font-weight:700;"></h2>
    <div style="display:flex;gap:8px;">
      <button onclick="copyAndEdit()" style="padding:6px 16px;border:1px solid #2ea043;border-radius:6px;background:#238636;color:#fff;cursor:pointer;font-size:12px;font-weight:600;">✏️ Editar no ASCIIFlow</button>
      <button onclick="closeFullscreen()" style="padding:6px 16px;border:1px solid #30363d;border-radius:6px;background:#21262d;color:#c9d1d9;cursor:pointer;font-size:12px;">✕ Fechar</button>
    </div>
  </div>
  <div style="flex:1;overflow:auto;padding:20px;display:flex;justify-content:center;">
    <pre id="modalContent" style="background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:24px;font-size:11px;line-height:1.3;color:#c9d1d9;font-family:'Consolas','Courier New',monospace;white-space:pre;overflow:auto;"></pre>
  </div>
</div>

<script>
let currentKey = null;

function showFullscreen(key) {
  currentKey = key;
  const tpl = TEMPLATES[key];
  if (!tpl) return;
  document.getElementById('modalTitle').textContent = tpl.title;
  document.getElementById('modalContent').textContent = tpl.content.trim();
  document.getElementById('fullscreenModal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeFullscreen() {
  document.getElementById('fullscreenModal').style.display = 'none';
  document.body.style.overflow = '';
}

function copyAndEdit() {
  if (!currentKey) return;
  const tpl = TEMPLATES[currentKey];
  navigator.clipboard.writeText(tpl.content.trim()).then(() => {
    window.open('https://asciiflow.com', '_blank');
  });
}

// Fechar com ESC
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeFullscreen();
});
</script>

<footer>
  Baseado no <a href="https://github.com/lewish/asciiflow">ASCIIFlow</a> · Use o botão "Copy" no ASCIIFlow para colar

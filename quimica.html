<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabela Periódica Interativa — Química</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a1a; --surface: #12122a; --card: #1a1a3a;
    --text: #e8e8f0; --text-muted: #8888aa; --border: #2a2a4a; --accent: #4488ff;
    --metal-alcalino: #ff6b6b; --alcalino-terroso: #ffa94d;
    --metal-transicao: #ffd43b; --metal-pobre: #69db7c;
    --semimetal: #38d9a9; --nao-metal: #4dabf7;
    --halogenio: #9775fa; --gas-nobre: #da77f2;
    --lantanideo: #f783ac; --actinideo: #e599f7;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  nav {
    padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;
    background: rgba(10,10,26,0.8); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
  }
  nav .logo { font-weight: 800; font-size: 18px; color: var(--accent); }
  nav .logo span { color: var(--text); }
  nav .stats { display: flex; gap: 20px; font-size: 12px; color: var(--text-muted); }
  nav .stats strong { color: var(--text); }
  .hero { text-align: center; padding: 50px 20px 20px; }
  .hero h1 { font-size: clamp(28px,4vw,48px); font-weight: 800; }
  .hero h1 span { color: var(--accent); }
  .hero p { color: var(--text-muted); margin-top: 8px; font-size: 14px; }
  .legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px 14px; padding: 8px 20px 16px; max-width: 1200px; margin: 0 auto; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-muted); }
  .legend-item .dot { width: 10px; height: 10px; border-radius: 3px; }
  .table-wrapper { max-width: 1200px; margin: 0 auto; padding: 0 10px 10px; overflow-x: auto; }
  .periodic-table { display: grid; grid-template-columns: repeat(18,1fr); gap: 3px; min-width: 900px; }
  .element {
    aspect-ratio: 1; border-radius: 6px; padding: 3px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; border: 1px solid transparent; position: relative; min-height: 52px;
  }
  .element:hover { transform: scale(1.15); z-index: 10; border-color: rgba(255,255,255,0.3); box-shadow: 0 0 20px rgba(68,136,255,0.3); }
  .element .number { font-size: 7px; color: rgba(255,255,255,0.5); position: absolute; top: 2px; left: 3px; }
  .element .symbol { font-size: clamp(11px,1.1vw,16px); font-weight: 700; line-height: 1; }
  .element .name { font-size: 5.5px; color: rgba(255,255,255,0.7); margin-top: 1px; white-space: nowrap; }
  .element .mass { font-size: 5.5px; color: rgba(255,255,255,0.4); position: absolute; bottom: 2px; right: 3px; }
  .cat-metal-alcalino { background: var(--metal-alcalino); color: #1a1a1a; }
  .cat-alcalino-terroso { background: var(--alcalino-terroso); color: #1a1a1a; }
  .cat-metal-transicao { background: var(--metal-transicao); color: #1a1a1a; }
  .cat-metal-pobre { background: var(--metal-pobre); color: #1a1a1a; }
  .cat-semimetal { background: var(--semimetal); color: #1a1a1a; }
  .cat-nao-metal { background: var(--nao-metal); color: #1a1a1a; }
  .cat-halogenio { background: var(--halogenio); color: #1a1a1a; }
  .cat-gas-nobre { background: var(--gas-nobre); color: #1a1a1a; }
  .cat-lantanideo { background: var(--lantanideo); color: #1a1a1a; }
  .cat-actinideo { background: var(--actinideo); color: #1a1a1a; }
  .element.empty { background: transparent; cursor: default; }
  .element.empty:hover { transform: none; box-shadow: none; border-color: transparent; }
  .series-section { max-width: 1200px; margin: 8px auto 30px; padding: 0 10px; }
  .series-section .label { font-size: 10px; color: var(--text-muted); text-align: center; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 2px; }
  .series-grid { display: grid; grid-template-columns: repeat(15,1fr); gap: 3px; min-width: 700px; }
  .series-grid .element { min-height: 45px; }
  .modal-overlay { display: none; position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; max-width: 380px; width: 90%; position: relative; animation: modalIn 0.3s ease; }
  @keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal .close { position: absolute; top: 10px; right: 14px; background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }
  .modal .close:hover { color: var(--text); }
  .modal .modal-symbol { font-size: 42px; font-weight: 800; margin-bottom: 2px; }
  .modal .modal-name { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
  .modal .modal-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
  .modal .modal-info { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .modal .modal-info .item { background: var(--card); border-radius: 8px; padding: 8px 10px; }
  .modal .modal-info .item .label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .modal .modal-info .item .value { font-size: 13px; font-weight: 600; margin-top: 2px; }
  footer { text-align: center; padding: 24px 20px; font-size: 11px; color: var(--text-muted); border-top: 1px solid var(--border); }
  @media (max-width: 700px) {
    .periodic-table { gap: 2px; min-width: unset; }
    .element { min-height: 36px; padding: 2px; }
    .element .symbol { font-size: 9px; }
    .element .name, .element .mass, .element .number { display: none; }
    .series-grid { gap: 2px; }
    .series-grid .element { min-height: 30px; }
    .series-grid .element .name { display: none; }
  }
</style>
</head>

  const grid={};
  ELEMENTS.forEach(el=>{if(el.cat!=='lantanideo'&&el.cat!=='actinideo')grid[el.row+'-'+el.col]=el;});
  for(let r=1;r<=7;r++)for(let c=1;c<=18;c++){
    const k=r+'-'+c;
    if(grid[k])table.appendChild(createElement(grid[k]));
    else{const e=document.createElement('div');e.className='element empty';table.appendChild(e);}
  }
}
function renderSeries(id,cat){
  const c=document.getElementById(id);
  for(let i=0;i<3;i++){const e=document.createElement('div');e.className='element empty';c.appendChild(e);}
  ELEMENTS.forEach(el=>{if(el.cat===cat)c.appendChild(createElement(el));});
}
function renderLegend(){
  const l=document.getElementById('legend');
  CATEGORIES.forEach(cat=>{
    const i=document.createElement('div');i.className='legend-item';
    i.innerHTML=`<span class="dot" style="background:${cat.color}"></span>${cat.label}`;
    l.appendChild(i);
  });
}
function showModal(el){
  document.getElementById('mSymbol').textContent=el.sym;
  document.getElementById('mName').textContent=el.name;
  document.getElementById('mSub').textContent=`Nº ${el.n} • Massa: ${el.mass}`;
  document.getElementById('mInfo').innerHTML=
    `<div class="item"><div class="label">Símbolo</div><div class="value">${el.sym}</div></div>`+
    `<div class="item"><div class="label">Número</div><div class="value">${el.n}</div></div>`+
    `<div class="item"><div class="label">Massa</div><div class="value">${el.mass}</div></div>`+
    `<div class="item"><div class="label">Categoria</div><div class="value">${CAT_NAMES[el.cat]}</div></div>`;
  document.getElementById('modal').classList.add('active');
}
document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modal').classList.remove('active'));
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('modal').classList.remove('active');});
renderLegend();renderTable();renderSeries('lantanideos','lantanideo');renderSeries('actinideos','actinideo');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tabela Periódica Interativa — Química</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a1a; --surface: #12122a; --card: #1a1a3a;
    --text: #e8e8f0; --text-muted: #8888aa; --border: #2a2a4a; --accent: #4488ff;
    --metal-alcalino: #ff6b6b; --alcalino-terroso: #ffa94d;
    --metal-transicao: #ffd43b; --metal-pobre: #69db7c;
    --semimetal: #38d9a9; --nao-metal: #4dabf7;
    --halogenio: #9775fa; --gas-nobre: #da77f2;
    --lantanideo: #f783ac; --actinideo: #e599f7;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  nav { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; background: rgba(10,10,26,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  nav .logo { font-weight: 800; font-size: 16px; color: var(--accent); }
  nav .logo span { color: var(--text); }
  nav .stats { font-size: 11px; color: var(--text-muted); }
  nav .stats strong { color: var(--text); }
  .hero { text-align: center; padding: 24px 16px 12px; }
  .hero h1 { font-size: clamp(20px,5vw,40px); font-weight: 800; }
  .hero h1 span { color: var(--accent); }
  .hero p { color: var(--text-muted); margin-top: 4px; font-size: 12px; }
  .search-box { max-width: 600px; margin: 0 auto 10px; padding: 0 16px; }
  .search-box input { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--text-muted); }
  .legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px 10px; padding: 4px 12px 10px; max-width: 1200px; margin: 0 auto; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 9px; color: var(--text-muted); }
  .legend-item .dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .table-wrapper { max-width: 1200px; margin: 0 auto; padding: 0 8px 8px; }
  .periodic-table { display: grid; grid-template-columns: repeat(18,1fr); gap: 2px; }
  .element { aspect-ratio: 1; border-radius: 4px; padding: 2px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; position: relative; }
  .element:hover { transform: scale(1.12); z-index: 10; border-color: rgba(255,255,255,0.3); box-shadow: 0 0 15px rgba(68,136,255,0.3); }
  .element .number { font-size: 6px; color: rgba(255,255,255,0.4); position: absolute; top: 1px; left: 2px; }
  .element .symbol { font-weight: 700; line-height: 1; }
  .element .name { font-size: 5px; color: rgba(255,255,255,0.6); margin-top: 1px; white-space: nowrap; }
  .element .mass { font-size: 5px; color: rgba(255,255,255,0.3); position: absolute; bottom: 1px; right: 2px; }
  .cat-metal-alcalino { background: var(--metal-alcalino); color: #1a1a1a; }
  .cat-alcalino-terroso { background: var(--alcalino-terroso); color: #1a1a1a; }
  .cat-metal-transicao { background: var(--metal-transicao); color: #1a1a1a; }
  .cat-metal-pobre { background: var(--metal-pobre); color: #1a1a1a; }
  .cat-semimetal { background: var(--semimetal); color: #1a1a1a; }
  .cat-nao-metal { background: var(--nao-metal); color: #1a1a1a; }
  .cat-halogenio { background: var(--halogenio); color: #1a1a1a; }
  .cat-gas-nobre { background: var(--gas-nobre); color: #1a1a1a; }
  .cat-lantanideo { background: var(--lantanideo); color: #1a1a1a; }
  .cat-actinideo { background: var(--actinideo); color: #1a1a1a; }
  .element.empty { background: transparent; cursor: default; }
  .element.empty:hover { transform: none; box-shadow: none; border-color: transparent; }
  .series-section { max-width: 1200px; margin: 4px auto 20px; padding: 0 8px; }
  .series-section .label { font-size: 9px; color: var(--text-muted); text-align: center; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .series-grid { display: grid; grid-template-columns: repeat(15,1fr); gap: 2px; }
  .mobile-list { display: none; padding: 0 12px 20px; max-width: 600px; margin: 0 auto; }
  .mobile-list .el-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; margin-bottom: 4px; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
  .mobile-list .el-row:active { opacity: 0.8; }
  .mobile-list .el-row .m-sym { font-size: 16px; font-weight: 700; width: 32px; text-align: center; padding: 4px 0; border-radius: 6px; flex-shrink: 0; }
  .mobile-list .el-row .m-info { flex: 1; min-width: 0; }
  .mobile-list .el-row .m-info .m-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mobile-list .el-row .m-info .m-sub { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
  .mobile-list .el-row .m-num { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
  .modal-overlay { display: none; position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; max-width: 360px; width: 100%; position: relative; animation: modalIn 0.25s ease; }
  @keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal .close { position: absolute; top: 10px; right: 14px; background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 4px; }
  .modal .close:hover { color: var(--text); }
  .modal .modal-symbol { font-size: 36px; font-weight: 800; margin-bottom: 2px; }
  .modal .modal-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .modal .modal-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; }
  .modal .modal-info { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .modal .modal-info .item { background: var(--card); border-radius: 8px; padding: 8px 10px; }
  .modal .modal-info .item .label { font-size: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .modal .modal-info .item .value { font-size: 12px; font-weight: 600; margin-top: 2px; }
  footer { text-align: center; padding: 20px; font-size: 10px; color: var(--text-muted); border-top: 1px solid var(--border); }
  @media (min-width: 701px) {
    .periodic-table { min-width: 700px; }
    .element { min-height: 44px; }
    .element .symbol { font-size: clamp(10px,1vw,14px); }
    .series-grid .element { min-height: 38px; }
    .mobile-list { display: none !important; }
    .search-box { display: none; }
  }
  @media (max-width: 700px) {
    .table-wrapper, .series-section { display: none; }
    .mobile-list { display: block; }
    .hero { padding: 16px 16px 8px; }
    .hero h1 { font-size: 20px; }
    .hero p { font-size: 11px; }
    .legend { gap: 3px 8px; }
    .legend-item { font-size: 8px; }
    .legend-item .dot { width: 6px; height: 6px; }
    nav { padding: 10px 14px; }
    nav .logo { font-size: 14px; }
  }
</style>
</head>

  const div=document.createElement('div');
  div.className=`element cat-${el.cat}`;
  div.innerHTML=`<span class="number">${el.n}</span><span class="symbol">${el.sym}</span><span class="name">${el.name}</span><span class="mass">${el.mass}</span>`;
  if(clickable)div.addEventListener('click',()=>showModal(el));
  return div;
}
function renderTable(){
  const table=document.getElementById('table');
  const grid={};
  ELEMENTS.forEach(el=>{if(el.cat!=='lantanideo'&&el.cat!=='actinideo')grid[el.row+'-'+el.col]=el;});
  for(let r=1;r<=7;r++)for(let c=1;c<=18;c++){
    const k=r+'-'+c;
    if(grid[k])table.appendChild(createElement(grid[k],true));
    else{const e=document.createElement('div');e.className='element empty';table.appendChild(e);}
  }
}
function renderSeries(id,cat){
  const c=document.getElementById(id);
  for(let i=0;i<3;i++){const e=document.createElement('div');e.className='element empty';c.appendChild(e);}
  ELEMENTS.forEach(el=>{if(el.cat===cat)c.appendChild(createElement(el,true));});
}
function renderLegend(){
  const l=document.getElementById('legend');
  CATEGORIES.forEach(cat=>{
    const i=document.createElement('div');i.className='legend-item';
    i.innerHTML=`<span class="dot" style="background:${cat.color}"></span>${cat.label}`;
    l.appendChild(i);
  });
}
function renderMobileList(filter){
  const container=document.getElementById('mobileList');
  container.innerHTML='';
  const f=filter?ELEMENTS.filter(e=>e.name.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().includes(filter)||e.sym.toLowerCase().includes(filter)):ELEMENTS;
  f.forEach(el=>{
    const row=document.createElement('div');row.className='el-row';
    row.innerHTML=`<div class="m-sym" style="background:var(--${el.cat});color:#1a1a1a">${el.sym}</div><div class="m-info"><div class="m-name">${el.n}. ${el.name}</div><div class="m-sub">${CAT_NAMES[el.cat]} &bull; ${el.mass}</div></div><div class="m-num">#${el.n}</div>`;
    row.addEventListener('click',()=>showModal(el));
    container.appendChild(row);
  });
}
function showModal(el){
  document.getElementById('mSymbol').textContent=el.sym;
  document.getElementById('mSymbol').style.color=`var(--${el.cat})`;
  document.getElementById('mName').textContent=el.name;
  document.getElementById('mSub').innerHTML=`N&ordm; ${el.n} &bull; Massa: ${el.mass} &bull; ${CAT_NAMES[el.cat]}`;
  document.getElementById('mInfo').innerHTML=`<div class="item"><div class="label">S&iacute;mbolo</div><div class="value">${el.sym}</div></div><div class="item"><div class="label">N&uacute;mero</div><div class="value">${el.n}</div></div><div class="item"><div class="label">Massa</div><div class="value">${el.mass}</div></div><div class="item"><div class="label">Categoria</div><div class="value">${CAT_NAMES[el.cat]}</div></div>`;
  document.getElementById('modal').classList.add('active');
}
document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modal').classList.remove('active'));
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('modal').classList.remove('active');});
document.getElementById('searchInput').addEventListener('input',function(){renderMobileList(this.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""));});
renderLegend();renderTable();renderSeries('lantanideos','lantanideo');renderSeries('actinideos','actinideo');renderMobileList();
</script>
</body>
</html>

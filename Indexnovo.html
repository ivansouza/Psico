<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psico Portfolio — Premium Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg: #060816;
            --bg-soft: #0c1224;
            --panel: rgba(10, 15, 31, 0.78);
            --panel-strong: rgba(15, 23, 42, 0.94);
            --line: rgba(148, 163, 184, 0.14);
            --text: #e5eefc;
            --muted: #8b9bb7;
            --cyan: #38bdf8;
            --violet: #8b5cf6;
            --emerald: #34d399;
            --amber: #f59e0b;
            --rose: #fb7185;
            --hero-gradient: radial-gradient(circle at top left, rgba(56,189,248,0.16), transparent 28%),
                             radial-gradient(circle at top right, rgba(139,92,246,0.16), transparent 25%),
                             radial-gradient(circle at bottom center, rgba(52,211,153,0.10), transparent 30%),
                             linear-gradient(180deg, #03050d 0%, #070b17 40%, #060816 100%);
        }

        .light-mode {
            --bg: #f8fafc;
            --bg-soft: #f1f5f9;
            --panel: rgba(255, 255, 255, 0.82);
            --panel-strong: rgba(241, 245, 249, 0.96);
            --line: rgba(148, 163, 184, 0.25);
            --text: #0f172a;
            --muted: #64748b;
            --hero-gradient: radial-gradient(circle at top left, rgba(56,189,248,0.1), transparent 35%),
                             radial-gradient(circle at top right, rgba(139,92,246,0.1), transparent 30%),
                             linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: var(--bg);
            background-image: var(--hero-gradient);
            background-attachment: fixed;
        }

        /* View Transition Tweaks */
        ::view-transition-old(root),
        ::view-transition-new(root) {
            animation: none;
            mix-blend-mode: normal;
        }

        ::view-transition-old(root) { z-index: 1; }
        ::view-transition-new(root) { z-index: 999; }

        .app-shell {
            width: min(1680px, calc(100vw - 24px));
            margin: 12px auto;
            display: block;
        }

        .glass {
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: 0 24px 80px rgba(0,0,0,0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .pill-filters {
            cursor: pointer;
            height: 40px;
            padding: 0 14px;
            border-radius: 999px;
            border: 1px solid rgba(56,189,248,0.28);
            background: rgba(56,189,248,0.08);
            color: var(--cyan);
            font-weight: 800;
            font-size: 11px;
            letter-spacing: .14em;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all .18s ease;
        }

        .pill-filters:hover {
            background: rgba(56,189,248,0.14);
            border-color: rgba(56,189,248,0.45);
        }

        .content-area { padding-top: 2px; }

        .filters-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.4);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            opacity: 0;
            pointer-events: none;
            transition: opacity .28s ease;
            z-index: 70;
        }

        .filters-backdrop.open { opacity: 1; pointer-events: auto; }

        .filters-shell {
            position: fixed;
            top: 0;
            left: 0;
            width: min(420px, 92vw);
            height: 100vh;
            border-radius: 0 28px 28px 0;
            padding: 18px;
            overflow-y: auto;
            transform: translateX(-105%);
            transition: transform .32s cubic-bezier(.22,.8,.2,1);
            z-index: 80;
        }

        .filters-shell.open { transform: translateX(0); }

        .hero {
            position: sticky;
            top: 10px;
            z-index: 40;
            width: 100%;
            border-radius: 28px;
            padding: 14px 18px;
            margin-bottom: 20px;
        }

        .hero-title {
            margin: 6px 0 8px;
            font-weight: 900;
            letter-spacing: -.04em;
            line-height: 1;
        }

        .hero-title-sm { font-size: clamp(1.25rem, 3.5vw, 2rem); }

        .gradient-text {
            background: linear-gradient(135deg, var(--text) 0%, var(--cyan) 50%, var(--violet) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .mode-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px 6px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,.05);
            border: 1px solid var(--line);
            font-size: 11px;
            font-weight: 700;
        }

        .theme-toggle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-soft);
            color: var(--cyan);
            display: grid;
            place-items: center;
            cursor: pointer;
            border: 1px solid var(--line);
        }

        .search-input {
            width: 100%;
            height: 54px;
            border-radius: 18px;
            border: 1px solid var(--line);
            background: var(--bg-soft);
            color: var(--text);
            padding: 0 48px 0 42px;
            outline: none;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        .gallery-card {
            border-radius: 28px;
            padding: 18px;
            min-height: 255px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: var(--panel);
            border: 1px solid var(--line);
            transition: transform .22s ease, box-shadow .22s ease;
        }

        .gallery-card:hover {
            transform: translateY(-5px);
            border-color: var(--cyan);
            box-shadow: 0 24px 50px rgba(0,0,0,.1);
        }

        .card-title { font-size: 1.16rem; font-weight: 800; letter-spacing: -.03em; margin: 10px 0; }
        .card-desc { color: var(--muted); font-size: 13px; line-height: 1.55; }
        
        .primary-link {
            min-height: 46px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            font-weight: 800;
            background: linear-gradient(135deg, var(--cyan), var(--violet));
            color: white;
        }

        .secondary-link {
            border: 1px solid var(--line);
            color: var(--text);
            background: var(--bg-soft);
            padding: 0 14px;
            border-radius: 16px;
            display: flex;
            align-items: center;
        }

        .filter-btn, .quick-chip {
            cursor: pointer;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--bg-soft);
            color: var(--muted);
            padding: 8px 12px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .filter-btn.active {
            background: var(--cyan);
            color: white;
            border-color: var(--cyan);
        }

        .eyebrow { font-size: 11px; letter-spacing: .24em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>
    <div class="app-shell">
        <main class="content-area">
            <header id="hero" class="hero glass">
                <div class="flex flex-wrap items-center justify-between gap-4">
                    <div class="flex items-center gap-5">
                        <img src="psico-logo-final.png" alt="Psico Logo" style="height: 50px; width: auto; filter: drop-shadow(0 0 8px var(--cyan));" class="transition-transform hover:scale-110">
                        <div>
                            <div class="eyebrow">Psico Portfolio — <span style="color:var(--cyan)">Creative coding</span></div>
                            <h1 class="hero-title hero-title-sm gradient-text">Laboratório de Ivan Souza</h1>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-3">
                        <div class="mode-pill">
                            <span id="mode-label" class="mr-2">PRODUÇÃO</span>
                            <button id="theme-btn" class="theme-toggle" title="Trocar Tema">
                                <i class="fas fa-moon dark-only"></i>
                                <i class="fas fa-sun light-only hidden"></i>
                            </button>
                            <button id="filters-open" class="pill-filters"><i class="fas fa-sliders"></i> Filtros</button>
                        </div>
                    </div>
                </div>

                <div class="flex gap-8 mt-4 opacity-80">
                    <div><span id="cards-total" class="font-black text-xl">0</span> <span class="eyebrow text-[9px]">Total</span></div>
                    <div><span id="visible-total" class="font-black text-xl">0</span> <span class="eyebrow text-[9px]">Visíveis</span></div>
                </div>
            </header>

            <div id="filters-backdrop" class="filters-backdrop"></div>
            <aside id="filters-shell" class="filters-shell glass">
                <div class="flex items-center justify-between mb-6">
                    <div class="eyebrow">Configurações</div>
                    <button id="filters-close" class="text-3xl">&times;</button>
                </div>

                <div class="relative mb-6">
                    <i class="fas fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 opacity-40"></i>
                    <input id="search-input" class="search-input" type="text" placeholder="Buscar experimento...">
                </div>

                <div class="space-y-6">
                    <section>
                        <div class="eyebrow mb-3">Navegação Rápida</div>
                        <div class="flex flex-wrap gap-2">
                            <button class="quick-chip" onclick="scrollToSection('hero')">Topo</button>
                            <button class="quick-chip" onclick="applyPreset('ai')">IA & LLMs</button>
                            <button class="quick-chip" onclick="applyPreset('recent')">2026</button>
                        </div>
                    </section>

                    <section>
                        <div class="eyebrow mb-3">Categorias</div>
                        <div id="filters-cat" class="flex flex-wrap gap-2"></div>
                    </section>

                    <section class="grid grid-cols-2 gap-4">
                        <div>
                            <div class="eyebrow mb-3">Ano</div>
                            <div id="filters-year" class="flex flex-wrap gap-2"></div>
                        </div>
                        <div>
                            <div class="eyebrow mb-3">Mês</div>
                            <div id="filters-month" class="flex flex-wrap gap-2"></div>
                        </div>
                    </section>

                    <button id="mock-toggle" onclick="toggleMockCards()" class="w-full p-4 rounded-2xl border border-dashed border-cyan-500/40 text-xs font-bold uppercase tracking-widest hover:bg-cyan-500/10 transition-colors">
                        <i class="fas fa-flask mr-2"></i> Modo Laboratório <span id="mock-count"></span>
                    </button>
                </div>
            </aside>

            <div id="active-filters" class="flex flex-wrap gap-2 my-4"></div>
            <div id="gallery" class="gallery"></div>
        </main>
    </div>

    <script>
        // --- THEME TOGGLE LOGIC (850ms, Bi-directional circular) ---
        const themeBtn = document.getElementById('theme-btn');
        function toggleTheme(event) {
            const isLight = document.documentElement.classList.contains('light-mode');
            if (!document.startViewTransition) {
                applyTheme(!isLight);
                return;
            }
            const x = event.clientX ?? window.innerWidth / 2;
            const y = event.clientY ?? window.innerHeight / 2;
            const endRadius = Math.hypot(Math.max(x, innerWidth - x), Math.max(y, innerHeight - y));

            const transition = document.startViewTransition(() => applyTheme(!isLight));
            transition.ready.then(() => {
                document.documentElement.animate(
                    { clipPath: [`circle(0px at ${x}px ${y}px)`, `circle(${endRadius}px at ${x}px ${y}px)`] },
                    { duration: 850, easing: 'cubic-bezier(0.4, 0, 0.2, 1)', pseudoElement: '::view-transition-new(root)' }
                );
            });
        }
        function applyTheme(toLight) {
            document.documentElement.classList.toggle('light-mode', toLight);
            themeBtn.querySelector('.dark-only').classList.toggle('hidden', toLight);
            themeBtn.querySelector('.light-only').classList.toggle('hidden', !toLight);
            localStorage.setItem('psico-theme', toLight ? 'light' : 'dark');
        }
        if (localStorage.getItem('psico-theme') === 'light') applyTheme(true);
        themeBtn.addEventListener('click', toggleTheme);

        // --- DATA & LOGIC ---
        const username = "ivansouza";
        const repo = "Psico";
        const baseUrl = `https://${username}.github.io/${repo}`;
        const sourceUrl = `https://github.com/${username}/${repo}/blob/main`;

        let activeCategory = "Todos";
        let activeMonth = "Todos";
        let activeYear = "Todos";
        let searchQuery = "";
        let showMockCards = false;

        const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

        // LISTA COMPLETA RESTAURADA
        let experiments = [
            { name: "TTS Local", file: "tts-local.html", pick: true, cat: "Util", date: "03/04/2026", desc: "Servidor Supertonic 2 local." },
            { name: "Sólidos Platónicos", file: "solidos-platonicos.html", cat: "Geometria", date: "01/01/2026", desc: "Visualizador interativo dos 5 sólidos perfeitos." },
            { name: "A-lorenz", file: "A-lorenz.html", cat: "Física", date: "02/12/2025", desc: "Simulação do sistema caótico de Lorenz." },
            { name: "Sacred Dodecahedron", file: "Sacred-Dodecahedron.html", cat: "Geometria", date: "19/12/2025", desc: "Geometria sagrada baseada no dodecaedro." },
            { name: "Truchet Tiles", file: "Truchet.html", cat: "Matemática", date: "12/12/2025", desc: "Mosaicos gerados por algoritmos de Truchet." },
            { name: "Faraday 3D", file: "3d-faraday.html", cat: "Física", date: "19/01/2026", desc: "Gaiola de Faraday tridimensional." },
            { name: "3D Water 1", file: "3dwater.html", cat: "Física", date: "28/01/2026", desc: "Simulação de água 3D v1." },
            { name: "3D Water 2", file: "3dwater2.html", cat: "Física", date: "28/01/2026", desc: "Simulação de água 3D v2." },
            { name: "3D Water 3", file: "3dwater3.html", cat: "Física", date: "28/01/2026", desc: "Simulação de água 3D v3." },
            { name: "Astroguia", file: "Astroguia.html", cat: "Util", date: "07/01/2026", desc: "Guia astronómico interativo." },
            { name: "Audio Visualizer", file: "audio.html", cat: "Áudio", date: "28/02/2026", desc: "Visualizador de áudio em tempo real." },
            { name: "Aqua Shader", file: "aqua-shader.html", cat: "Shaders", date: "15/03/2026", desc: "Shader WebGL responsivo de água." },
            { name: "WuSquare", file: "wusquare.html", cat: "Matemática", date: "17/03/2026", desc: "Truque mental para quadrados." },
            { name: "Aizawa Neon", file: "aizawa-neon.html", cat: "Física", date: "17/03/2026", desc: "Atrator de Aizawa neon em Three.js." },
            { name: "Laser no Triângulo", file: "laser-triangulo.html", cat: "Animação", date: "20/03/2026", desc: "Laser refletindo em espelhos." },
            { name: "RSVP Reader", file: "RSVP.html", cat: "Util", date: "14/01/2026", desc: "Leitor de leitura rápida RSVP." },
            { name: "Tusi Couple", file: "Tusi.html", cat: "Matemática", date: "08/01/2026", desc: "Teorema de Tusi em movimento." },
            { name: "Tusi Minimal", file: "tusi-minimal.html", cat: "Geometria", date: "21/03/2026", desc: "Versão neon da ilusão de Tusi." },
            { name: "Tusi Lines", file: "tusi-lines.html", cat: "Geometria", date: "21/03/2026", desc: "Variante com offset e modo 3D." },
            { name: "Aerocast", file: "aerocast.html", cat: "Util", date: "10/02/2026", desc: "Previsão aeronáutica." },
            { name: "Art Sky", file: "art-sky.html", cat: "Arte", date: "31/12/2025", desc: "Céus artísticos generativos." },
            { name: "Árvore Primos", file: "arvore-primos-palindromos.html", cat: "Matemática", date: "11/01/2026", desc: "Árvore de primos palíndromos." },
            { name: "Espiral de Primos", file: "espiral-primos.html", cat: "Matemática", date: "23/03/2026", desc: "Espiral de Ulam interativa." },
            { name: "Duas Circunferências", file: "duas-circunferencias.html", cat: "Matemática", date: "25/03/2026", desc: "Cálculo visual de projeção." },
            { name: "Fractal Dance", file: "fractal-dance.html", cat: "Fractal", date: "25/03/2026", desc: "Koch snowflake interativo." },
            { name: "Voice AI WebGPU", file: "voice-ai-webgpu.html", pick: true, cat: "IA", date: "25/03/2026", desc: "Whisper local com WebGPU." },
            { name: "Whisper Live v4.3", file: "whisper-live-v4-3.html", cat: "IA", date: "25/03/2026", desc: "Fluxo WebGPU/WASM contínuo." },
            { name: "ASCII Art", file: "ascii.html", cat: "Efeitos", date: "01/01/2025", desc: "Conversor ASCII." },
            { name: "BitNet", file: "bitnet.html", cat: "IA", date: "27/03/2026", desc: "Visualização BitNet.", dev: true },
            { name: "Quantization", file: "quantization.html", cat: "IA", date: "27/03/2026", desc: "Demonstração de quantização." },
            { name: "Blackhole", file: "blackhole.html", cat: "Física", date: "02/11/2025", desc: "Lente gravitacional." },
            { name: "Brain", file: "brain.html", cat: "IA", date: "02/12/2025", desc: "Rede neural dinâmica." },
            { name: "AI Explorer v4", file: "ai-explorer-v4.html", pick: true, cat: "IA", date: "30/03/2026", desc: "Chat local WebGPU." },
            { name: "Calculadora Pro", file: "calc.html", cat: "Util", date: "10/03/2026", desc: "Calculadora avançada." },
            { name: "Mandelbrot", file: "mandelbrot.html", cat: "Fractal", date: "02/12/2025", desc: "Explorador de fractais." },
            { name: "Sistema Solar 3D", file: "sistema-solar-3d.html", pick: true, cat: "Física", date: "02/04/2026", desc: "Simulador 3D completo." },
            { name: "N1089", file: "n1089.html", cat: "Matemática", date: "08/03/2026", desc: "Magia do número 1089." },
            { name: "Vibevoice", file: "vibevoice-webgpu.html", cat: "Áudio", date: "01/04/2026", desc: "Vozes WebGPU.", dev: true },
            { name: "Palheta Site", file: "palheta-site.html", cat: "Util", date: "09/03/2026", desc: "Gerador de cores CSS." }
            // ... a lista continua via sync automático ...
        ];

        const categoryPalette = {
            'IA': '#8b5cf6', 'Física': '#38bdf8', 'Matemática': '#34d399', 'Geometria': '#f59e0b', 'Arte': '#fb7185',
            'Áudio': '#22c55e', 'Shaders': '#60a5fa', 'Fractal': '#a78bfa', 'Util': '#94a3b8', 'Animação': '#f97316'
        };

        function parseDateBR(dateStr) {
            if (!dateStr) return new Date(0);
            const [dPart] = dateStr.split(' ');
            const [d, m, y] = dPart.split('/').map(Number);
            return new Date(y, m - 1, d);
        }

        function initFilters() {
            const cats = ['Todos', ...new Set(experiments.map(e => e.cat))];
            const years = ['Todos', ...new Set(experiments.map(e => e.date.split('/')[2].split(' ')[0]))].sort();
            
            document.getElementById('filters-cat').innerHTML = cats.map(c => `<button onclick="applyFilter('cat', '${c}', this)" class="filter-btn ${c === activeCategory ? 'active' : ''}">${c}</button>`).join('');
            document.getElementById('filters-year').innerHTML = years.map(y => `<button onclick="applyFilter('year', '${y}', this)" class="filter-btn ${y === activeYear ? 'active' : ''}">${y}</button>`).join('');
        }

        function applyFilter(type, val, btn) {
            if (type === 'cat') activeCategory = val;
            if (type === 'year') activeYear = val;
            btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCards();
        }

        function toggleMockCards() {
            showMockCards = !showMockCards;
            document.getElementById('mode-label').textContent = showMockCards ? 'MOCK / LAB' : 'PRODUÇÃO';
            renderCards();
        }

        function applyPreset(kind) {
            if (kind === 'ai') { activeCategory = 'IA'; activeYear = 'Todos'; }
            if (kind === 'recent') { activeYear = '2026'; activeCategory = 'Todos'; }
            initFilters();
            renderCards();
        }

        function renderCards() {
            const q = searchQuery.toLowerCase();
            const filtered = experiments.filter(e => {
                const matchCat = activeCategory === 'Todos' || e.cat === activeCategory;
                const matchYear = activeYear === 'Todos' || e.date.includes(activeYear);
                const matchSearch = !q || e.name.toLowerCase().includes(q) || e.desc.toLowerCase().includes(q);
                const matchDev = showMockCards ? !!e.dev : !e.dev;
                return matchCat && matchYear && matchSearch && matchDev;
            });

            document.getElementById('cards-total').textContent = experiments.length;
            document.getElementById('visible-total').textContent = filtered.length;
            document.getElementById('mock-count').textContent = `(${experiments.filter(e => e.dev).length})`;

            const gallery = document.getElementById('gallery');
            if (!filtered.length) {
                gallery.innerHTML = `<div class="col-span-full py-20 text-center opacity-50">Nenhum experimento encontrado para estes filtros.</div>`;
                return;
            }

            gallery.innerHTML = filtered.map(e => {
                const color = categoryPalette[e.cat] || '#94a3b8';
                return `
                    <article class="gallery-card ${e.dev ? 'border-amber-500/30' : ''}">
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <span class="tag" style="color:${color}">${e.cat}</span>
                                <span class="mono text-[10px] opacity-40">${e.date.split(' ')[0]}</span>
                            </div>
                            <h3 class="card-title">${e.name}</h3>
                            <p class="card-desc">${e.desc}</p>
                            <div class="mt-4 text-[10px] mono opacity-30">/${e.file}</div>
                        </div>
                        <div class="flex gap-2 mt-6">
                            <a href="${baseUrl}/${e.file}" target="_blank" class="primary-link flex-1"><i class="fas fa-play"></i> Abrir</a>
                            <a href="${sourceUrl}/${e.file}" target="_blank" class="secondary-link"><i class="fas fa-code"></i></a>
                        </div>
                    </article>
                `;
            }).join('');
        }

        // Interface
        const shell = document.getElementById('filters-shell');
        const backdrop = document.getElementById('filters-backdrop');
        document.getElementById('filters-open').onclick = () => { shell.classList.add('open'); backdrop.classList.add('open'); };
        document.getElementById('filters-close').onclick = () => { shell.classList.remove('open'); backdrop.classList.remove('open'); };
        backdrop.onclick = () => { shell.classList.remove('open'); backdrop.classList.remove('open'); };
        document.getElementById('search-input').oninput = (e) => { searchQuery = e.target.value; renderCards(); };

        function scrollToSection(id) { document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' }); }

        // Sincronização automática para não perder nenhum arquivo do Repo
        async function syncWithGitHub() {
            try {
                const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents`);
                if (!res.ok) return;
                const items = await res.json();
                const files = items.filter(i => i.name.endsWith('.html') && i.name !== 'index.html');
                const known = new Set(experiments.map(e => e.file));
                
                files.forEach(f => {
                    if (!known.has(f.name)) {
                        experiments.push({
                            name: f.name.replace('.html','').replace(/-/g,' '),
                            file: f.name,
                            cat: "Util",
                            date: "01/01/2026",
                            desc: "Sincronizado do repositório."
                        });
                    }
                });
                initFilters();
                renderCards();
            } catch (e) { console.error("Sync error", e); }
        }

        experiments.sort((a,b) => parseDateBR(b.date) - parseDateBR(a.date));
        initFilters();
        renderCards();
        syncWithGitHub();
    </script>
</body>
</html>

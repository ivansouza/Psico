<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vórtice de Partículas Three.js</title>
  <style>
    body { margin:0; padding:0; overflow:hidden; background:#000; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
    #ui-overlay { position:absolute; bottom:20px; left:20px; color:rgba(255,255,255,.72); pointer-events:none; z-index:10; }
    .instruction { font-size:12px; text-transform:uppercase; letter-spacing:1px; margin-top:5px; }
    canvas { display:block; }
  </style>
</head>
<body>
  <div id="ui-overlay">
    <div style="font-size:18px;font-weight:bold;color:#00d2ff;">Vortex Concêntrico</div>
    <div class="instruction">Arraste para girar • Scroll para zoom • Toque para interagir</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const vertexShader = `
      uniform float uTime;
      uniform float uSpeed;
      attribute float aSize;
      attribute vec3 aColor;
      varying vec3 vColor;
      varying float vDistance;

      void main() {
        vColor = aColor;

        vec3 newPos = position;

        float dist = length(position.xz);
        float angle = uTime * (uSpeed / (dist * 0.2 + 0.5));
        float s = sin(angle);
        float c = cos(angle);

        float x = newPos.x * c - newPos.z * s;
        float z = newPos.x * s + newPos.z * c;
        newPos.x = x;
        newPos.z = z;

        newPos.y += sin(dist * 0.5 - uTime * 1.5) * 0.8;

        vec4 mvPosition = modelViewMatrix * vec4(newPos, 1.0);
        gl_PointSize = aSize * (100.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;

        vDistance = dist;
      }
    `;

    const fragmentShader = `
      varying vec3 vColor;
      varying float vDistance;
      uniform float uTime;

      void main() {
        float dist = distance(gl_PointCoord, vec2(0.5));
        if (dist > 0.5) discard;

        float strength = 1.0 - (dist * 2.0);
        strength = pow(strength, 3.0);

        float pulse = sin(vDistance * 0.5 - uTime * 2.0) * 0.5 + 0.5;
        vec3 finalColor = mix(vColor, vec3(1.0), pulse * 0.3);

        gl_FragColor = vec4(finalColor, strength);
      }
    `;

    let scene, camera, renderer, points, clock;
    let mouseX = 0, mouseY = 0;
    let targetRotationX = 0, targetRotationY = 0;

    function init() {
      scene = new THREE.Scene();
      clock = new THREE.Clock();

      const aspect = window.innerWidth / window.innerHeight;
      camera = new THREE.PerspectiveCamera(60, aspect, 0.1, 1000);
      camera.position.set(0, 15, 30);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      createParticles();
      setupEvents();
      animate();
    }

    function createParticles() {
      const count = 40000;
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const sizes = new Float32Array(count);

      const numRings = 10;
      const colorPalette = [
        new THREE.Color(0x00d2ff),
        new THREE.Color(0x3a7bd5),
        new THREE.Color(0x00ffcc),
        new THREE.Color(0x7a5fff),
        new THREE.Color(0xff0080)
      ];

      for (let i = 0; i < count; i++) {
        const ringIndex = Math.floor(Math.random() * numRings);
        const radiusBase = (ringIndex + 1) * 2.5;
        const radius = radiusBase + (Math.random() - 0.5) * 1.5;
        const angle = Math.random() * Math.PI * 2;

        positions[i * 3] = Math.cos(angle) * radius;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 0.5;
        positions[i * 3 + 2] = Math.sin(angle) * radius;

        const colorIdx = ringIndex % colorPalette.length;
        const baseColor = colorPalette[colorIdx];
        colors[i * 3] = baseColor.r;
        colors[i * 3 + 1] = baseColor.g;
        colors[i * 3 + 2] = baseColor.b;

        sizes[i] = Math.random() * 2.0 + 0.5;
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

      const material = new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms: {
          uTime: { value: 0 },
          uSpeed: { value: 0.8 }
        },
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      points = new THREE.Points(geometry, material);
      scene.add(points);
    }

    function setupEvents() {
      window.addEventListener('resize', onWindowResize);

      document.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX - window.innerWidth / 2) / 100;
        mouseY = (e.clientY - window.innerHeight / 2) / 100;
      });

      document.addEventListener('touchmove', (e) => {
        if (e.touches.length > 0) {
          mouseX = (e.touches[0].clientX - window.innerWidth / 2) / 100;
          mouseY = (e.touches[0].clientY - window.innerHeight / 2) / 100;
        }
      }, { passive: true });

      window.addEventListener('wheel', (e) => {
        camera.position.z += e.deltaY * 0.02;
        camera.position.z = Math.max(5, Math.min(camera.position.z, 100));
      });
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    }

    function animate() {
      requestAnimationFrame(animate);

      const elapsedTime = clock.getElapsedTime();
      points.material.uniforms.uTime.value = elapsedTime;

      targetRotationX += (mouseY * 0.5 - targetRotationX) * 0.05;
      targetRotationY += (mouseX * 0.5 - targetRotationY) * 0.05;

      points.rotation.y = elapsedTime * 0.05 + targetRotationY;
      points.rotation.x = targetRotationX;

      renderer.render(scene, camera);
    }

    window.onload = init;
  </script>
</body>
</html>

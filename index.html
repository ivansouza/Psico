<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psico Portfolio — Premium Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg: #060816;
            --bg-soft: #0c1224;
            --panel: rgba(10, 15, 31, 0.78);
            --panel-strong: rgba(15, 23, 42, 0.94);
            --line: rgba(148, 163, 184, 0.14);
            --text: #e5eefc;
            --muted: #8b9bb7;
            --cyan: #38bdf8;
            --violet: #8b5cf6;
            --emerald: #34d399;
            --amber: #f59e0b;
            --rose: #fb7185;
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            min-height: calc(100vh - 80px);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(56,189,248,0.16), transparent 28%),
                radial-gradient(circle at top right, rgba(139,92,246,0.16), transparent 25%),
                radial-gradient(circle at bottom center, rgba(52,211,153,0.10), transparent 30%),
                linear-gradient(180deg, #03050d 0%, #070b17 40%, #060816 100%);
        }

        .app-shell {
            width: min(1680px, calc(100vw - 24px));
            margin: 12px auto;
            display: block;
        }

        .glass {
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: 0 24px 80px rgba(0,0,0,0.38);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .pill-filters {
            cursor: pointer;
            height: 40px;
            padding: 0 14px;
            border-radius: 999px;
            border: 1px solid rgba(56,189,248,0.28);
            background: rgba(56,189,248,0.08);
            color: #93c5fd;
            font-weight: 800;
            font-size: 11px;
            letter-spacing: .14em;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all .18s ease;
        }

        .pill-filters:hover {
            background: rgba(56,189,248,0.14);
            border-color: rgba(56,189,248,0.45);
            color: #dbeafe;
        }

        @media (max-width: 640px) {
            .pill-filters {
                height: 36px;
                padding: 0 12px;
                font-size: 10px;
            }
        }

        .content-area { padding-top: 200px; 
            padding-top: 2px;
        }

        .filters-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            opacity: 0;
            pointer-events: none;
            transition: opacity .28s ease;
            z-index: 70;
        }

        .filters-backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }

        .filters-shell {
            position: fixed;
            top: 0;
            left: 0;
            width: min(420px, 92vw);
            height: calc(100vh - 80px);
            border-radius: 0 28px 28px 0;
            padding: 18px;
            overflow-y: auto;
            margin: 0;
            transform: translateX(-105%);
            opacity: 1;
            transition: transform .32s cubic-bezier(.22,.8,.2,1);
            z-index: 80;
            pointer-events: none;
        }

        .filters-shell.open {
            transform: translateX(0);
            pointer-events: auto;
        }


        .filters-panel {
            overflow: visible;
            transition: none;
        }

        .filters-panel.collapsed {
            max-height: none !important;
            opacity: 1;
            transform: none;
            margin-top: 0 !important;
            pointer-events: auto;
        }

        .filters-shell::before,
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(140deg, rgba(56,189,248,0.10), transparent 35%, rgba(139,92,246,0.10));
        }

        .toolbar, .gallery-card { position: relative; }

        .brand-mark {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, rgba(56,189,248,0.95), rgba(139,92,246,0.95));
            color: white;
            box-shadow: 0 20px 50px rgba(56,189,248,0.24);
        }

        .eyebrow {
            font-size: 11px;
            letter-spacing: .24em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 700;
        }

        .hero {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 40;
            width: min(1680px, calc(100vw - 24px));
            border-radius: 28px;
            padding: 14px 18px;
            overflow: hidden;
            margin: 0;
        }

        .hero-spacer {
            height: 92px;
            width: 100%;
        }

        @media (max-width: 1180px) {
            .hero {
                width: calc(100vw - 24px);
            }
        }

        @media (max-width: 640px) {
            .hero {
                top: 8px;
                width: calc(100vw - 16px);
                padding: 12px 14px;
                left: 8px;
                transform: translateX(0);
            }

            .hero-spacer {
                height: 78px;
            }
        }

        .hero-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .hero-left { min-width: 0; flex: 1 1 0; }

        .hero-title {
            margin: 6px 0 8px;
            font-weight: 900;
            letter-spacing: -.04em;
            line-height: 1;
        }

        .hero-title-sm {
            font-size: clamp(1.25rem, 3.5vw, 2rem);
        }

        .hero-metrics {
            display: flex;
            gap: 20px;
            align-items: baseline;
            margin-top: 10px;
        }

        .hero-metric-value {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -.03em;
        }

        .hero-metric-label {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .18em;
        }

        .mode-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px 8px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.08);
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            white-space: nowrap;
        }

        .gradient-text {
            background: linear-gradient(135deg, #fff 0%, #9bdcff 35%, #c4b5fd 70%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }





        .toolbar {
            margin-top: 12px;
            border-radius: 24px;
            padding: 12px;
        }

        .toolbar-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
        }

        .search-wrap { position: relative; }
        .search-wrap i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #55627f;
            font-size: 13px;
        }

        .search-input {
            width: 100%;
            height: 54px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.04);
            color: white;
            padding: 0 48px 0 42px;
            outline: none;
            transition: .2s ease;
        }
        .search-input:focus { border-color: rgba(56,189,248,0.48); box-shadow: 0 0 0 4px rgba(56,189,248,0.08); }

        .clear-btn, .action-btn, .sidebar-toggle {
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: var(--text);
            border-radius: 18px;
            transition: .22s ease;
        }

        .clear-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            display: grid;
            place-items: center;
            opacity: 0;
            pointer-events: none;
        }

        .action-btn, .sidebar-toggle {
            height: 54px;
            padding: 0 18px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .18em;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .action-btn:hover, .sidebar-toggle:hover, .filter-btn:hover, .quick-chip:hover {
            transform: translateY(-1px);
            border-color: rgba(56,189,248,0.28);
            box-shadow: 0 12px 28px rgba(0,0,0,0.18);
        }

        .action-btn.active {
            background: linear-gradient(135deg, rgba(245,158,11,.18), rgba(251,191,36,.12));
            border-color: rgba(245,158,11,.42);
            color: #fde68a;
        }

        .side-section + .side-section { margin-top: 14px; }

        .side-box {
            padding: 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.035);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .filter-stack { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

        .filter-btn, .quick-chip {
            cursor: pointer;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.07);
            background: rgba(255,255,255,0.03);
            color: #c8d5e8;
            padding: 9px 12px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: .14em;
            text-transform: uppercase;
            transition: .2s ease;
            white-space: nowrap;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, rgba(56,189,248,.22), rgba(139,92,246,.18));
            border-color: rgba(56,189,248,.38);
            color: white;
            box-shadow: 0 10px 30px rgba(56,189,248,.16);
        }

        .quick-chip { padding: 10px 14px; }

        .content-area { padding-top: 200px;  min-width: 0; }
        .active-strip { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0 10px; }

        .active-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(56,189,248,.10);
            border: 1px solid rgba(56,189,248,.18);
            color: #dff5ff;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: .14em;
            text-transform: uppercase;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin: 16px 0 14px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
        }

        .gallery-card {
            border-radius: 28px;
            padding: 18px;
            min-height: 255px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            background:
                linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025)),
                radial-gradient(circle at top right, rgba(56,189,248,.12), transparent 35%);
            border: 1px solid rgba(255,255,255,.07);
            transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
        }

        .gallery-card:hover {
            transform: translateY(-5px);
            border-color: rgba(56,189,248,.34);
            box-shadow: 0 24px 50px rgba(0,0,0,.32);
        }

        .gallery-card.dev-card {
            background:
                linear-gradient(180deg, rgba(245,158,11,.08), rgba(255,255,255,.03)),
                radial-gradient(circle at top right, rgba(245,158,11,.14), transparent 34%);
            border-color: rgba(245,158,11,.22);
        }

        .card-top { display: flex; justify-content: space-between; gap: 12px; align-items: start; margin-bottom: 16px; }
        .category-dot { width: 11px; height: 11px; border-radius: 999px; box-shadow: 0 0 20px currentColor; }
        .card-title { font-size: 1.16rem; line-height: 1.1; font-weight: 800; letter-spacing: -.03em; margin: 10px 0 10px; }
        .card-desc { color: #94a3b8; font-size: 13px; line-height: 1.55; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
        .tag { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }

        .card-actions { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-top: 20px; }
        .primary-link, .secondary-link {
            min-height: 46px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            font-weight: 800;
            transition: .2s ease;
        }

        .primary-link {
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: white;
            box-shadow: 0 18px 34px rgba(56,189,248,.22);
        }
        .secondary-link {
            border: 1px solid rgba(255,255,255,.08);
            color: #d9e5f9;
            background: rgba(255,255,255,.03);
            padding: 0 14px;
        }

        .empty-state {
            padding: 36px 22px;
            border-radius: 28px;
            border: 1px dashed rgba(255,255,255,.12);
            background: rgba(255,255,255,.025);
            text-align: center;
            color: var(--muted);
        }

        .sidebar-toggle { display: none; width: 100%; justify-content: center; margin-bottom: 12px; }

        @media (max-width: 1180px) {
            .toolbar-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 900px) {
            .gallery { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        @media (max-width: 640px) {
            .app-shell { width: min(100vw - 16px, 1680px); margin: 8px auto; gap: 12px; }
            .hero, .toolbar { border-radius: 22px; padding: 14px 12px; }
            .gallery { grid-template-columns: 1fr; gap: 12px; }
            .gallery-card { border-radius: 24px; min-height: 230px; padding: 16px; }
            .hero-title-sm { font-size: 1.35rem; }
            .mode-pill { font-size: 10px; padding: 6px 12px; }
            .hero-inner { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <main class="content-area">
            <div id="filters-backdrop" class="filters-backdrop"></div>
            <section id="filters-shell" class="filters-shell glass" aria-hidden="true">

                        <i class="fas fa-magnifying-glass"></i>

                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 side-section">
                        <div class="side-box">
                            <div class="eyebrow">Ano</div>
                            <div id="filters-year" class="filter-stack"></div>
                        </div>
                        <div class="side-box">
                            <div class="eyebrow">Mês</div>
                            <div id="filters-month" class="filter-stack"></div>

                    </div>

                    <div class="side-section">
                        <div class="side-box">
                            <div class="flex items-center justify-between gap-3">

                                    <i class="fas fa-flask"></i>
                                    <span>Mock <span id="mock-count">(0)</span></span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <section id="hero" class="hero glass">
                <div class="hero-inner">
                    <div class="hero-left">
                        <div class="eyebrow">Psico Portfolio — <span style="color:var(--cyan)">Creative coding</span></div>
                        <div style="display: flex; align-items: center; gap: 20px; justify-content: center; flex-wrap: wrap;">
            <img src="psico-logo-final.png" alt="Psico Logo" style="height: 60px; width: auto; filter: drop-shadow(0 0 12px rgba(56, 189, 248, 0.8)); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);" onmouseover="this.style.transform='scale(1.15) rotate(8deg)'" onmouseout="this.style.transform='scale(1) rotate(0deg)'">
            <h1 class="hero-title hero-title-sm gradient-text">Laboratório interativo de Ivan Souza</h1>
        </div>
                        <div class="hero-metrics">
                            <div>
                                <span id="cards-total" class="hero-metric-value">0</span>
                                <div class="hero-metric-label">Total</div>
                            </div>
                            <div>
                                <span id="cat-total" class="hero-metric-value">0</span>
                                <div class="hero-metric-label">Categorias</div>
                            </div>
                            <div>
                                <span id="visible-total" class="hero-metric-value">0</span>
                                <div class="hero-metric-label">Visíveis</div>
                            </div>
                        </div>
                    </div>
                    <div class="mode-pill">
                        <span id="mode-label" class="font-bold">Produção</span>
                        <button id="filters-open" class="pill-filters" title="Buscar e filtrar"><i class="fas fa-sliders"></i> Filtros</button>
                    </div>
                </div>
            </section>
            <div class="hero-spacer"></div>

            <section id="gallery-section">
                <div class="section-head">
                    <div>
                        <div class="eyebrow">Experiments</div>
                        <h2 class="text-2xl md:text-3xl font-black tracking-tight mt-1">Galeria curada</h2>
                    </div>
                    <div id="stats" class="text-right text-xs md:text-sm text-slate-400 font-semibold"></div>
                </div>
                <div id="gallery" class="gallery"></div>
            </section>
        </main>
    </div>

        const categoryPalette = {
            'IA': '#8b5cf6', 'Física': '#38bdf8', 'Matemática': '#34d399', 'Geometria': '#f59e0b', 'Arte': '#fb7185',
            'Áudio': '#22c55e', 'Shaders': '#60a5fa', 'Fractal': '#a78bfa', 'Util': '#94a3b8', 'Animação': '#f97316',
            'Engenharia': '#eab308', 'Efeitos': '#c084fc', 'Especial': '#f43f5e', 'Interação': '#14b8a6', 'Logo': '#f472b6',
            'Mapas': '#2dd4bf', 'Dashboard': '#38bdf8', 'Eraser': '#fb923c'
        };

        function parseDateBR(dateStr) {
            if (!dateStr) return new Date(0);
            const [datePart, timePart] = dateStr.split(' ');
            const [day, month, year] = datePart.split('/').map(Number);
            if (timePart) {
                const [hour = 0, minute = 0, second = 0] = timePart.split(':').map(Number);
                return new Date(year, month - 1, day, hour || 0, minute || 0, second || 0);
            }
            return new Date(year, month - 1, day);
        }

        function formatDateBR(date = new Date()) {
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function getYearFromDate(dateStr) { return String(parseDateBR(dateStr).getFullYear()); }
        function getMonthFromDate(dateStr) { return monthNames[parseDateBR(dateStr).getMonth()]; }
        function getCategoryColor(cat) { return categoryPalette[cat] || '#94a3b8'; }

        function sortExperiments() {
            experiments.sort((a, b) => parseDateBR(b.date) - parseDateBR(a.date));
        }

        function initFilters() {
            const cats = ['Todos', ...new Set(experiments.map(e => e.cat))];
            const years = ['Todos', ...new Set(experiments.map(e => getYearFromDate(e.date)))].sort();
            const months = ['Todos', ...new Set(experiments.map(e => getMonthFromDate(e.date)))].sort((a, b) => a === 'Todos' ? -1 : b === 'Todos' ? 1 : monthNames.indexOf(a) - monthNames.indexOf(b));

            document.getElementById('cat-total').textContent = cats.length - 1;
            document.getElementById('filters-cat').innerHTML = cats.map(cat => `<button onclick="applyFilter('cat', '${cat}', this)" class="filter-btn ${cat === activeCategory ? 'active' : ''}">${cat}</button>`).join('');
            document.getElementById('filters-year').innerHTML = years.map(year => `<button onclick="applyFilter('year', '${year}', this)" class="filter-btn ${year === activeYear ? 'active' : ''}">${year}</button>`).join('');
            document.getElementById('filters-month').innerHTML = months.map(month => `<button onclick="applyFilter('month', '${month}', this)" class="filter-btn ${month === activeMonth ? 'active' : ''}">${month}</button>`).join('');
        }

        function applyFilter(type, value, btn) {
            if (type === 'cat') activeCategory = value;
            if (type === 'year') activeYear = value;
            if (type === 'month') activeMonth = value;
            btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderActiveFilters();
            renderCards();
        }

        function toggleMockCards(btn) {
            showMockCards = !showMockCards;
            btn.classList.toggle('active', showMockCards);
            const modeLabel = document.getElementById('mode-label');
            if (modeLabel) modeLabel.textContent = showMockCards ? 'Mock' : 'Produção';
            renderActiveFilters();
            renderCards();
        }

        function applyPreset(kind) {
            if (kind === 'recent' || kind === 'fresh') {
                activeYear = '2026';
                activeMonth = 'Todos';
                activeCategory = 'Todos';
            } else if (kind === 'ai') {
                activeCategory = 'IA';
                activeYear = 'Todos';
                activeMonth = 'Todos';
            }
            initFilters();
            renderActiveFilters();
            renderCards();
        }

        function renderActiveFilters() {
            const bits = [];
            if (activeCategory !== 'Todos') bits.push(`Categoria: ${activeCategory}`);
            if (activeYear !== 'Todos') bits.push(`Ano: ${activeYear}`);
            if (activeMonth !== 'Todos') bits.push(`Mês: ${activeMonth}`);
            if (searchQuery) bits.push(`Busca: ${searchQuery}`);
            if (showMockCards) bits.push('Mock');

            document.getElementById('active-filters').innerHTML = bits.length
                ? bits.map(bit => `<span class="active-pill">${bit}</span>`).join('')
                : `<span class="active-pill" style="background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08);color:#cbd5e1"><i class="fas fa-layer-group"></i> Sem filtros</span>`;
        }

        function getFilteredExperiments() {
            const q = searchQuery.trim().toLowerCase();
            return experiments.filter(exp => {
                const matchCat = activeCategory === 'Todos' || exp.cat === activeCategory;
                const matchYear = activeYear === 'Todos' || getYearFromDate(exp.date) === activeYear;
                const matchMonth = activeMonth === 'Todos' || getMonthFromDate(exp.date) === activeMonth;
                const matchSearch = !q || [exp.name, exp.desc, exp.cat, exp.file].filter(Boolean).some(v => String(v).toLowerCase().includes(q));
                const matchDev = showMockCards ? !!exp.dev : !exp.dev;
                return matchCat && matchYear && matchMonth && matchSearch && matchDev;
            });
        }

        function renderCards() {
            const filtered = getFilteredExperiments();
            const normalTotal = experiments.filter(e => !e.dev).length;
            const devTotal = experiments.filter(e => e.dev).length;
            document.getElementById('cards-total').textContent = experiments.length;
            document.getElementById('visible-total').textContent = filtered.length;
            document.getElementById('mock-count').textContent = `(${devTotal})`;
            document.getElementById('stats').innerHTML = showMockCards
                ? `<span class="mono">${filtered.length}</span> de <span class="mono">${devTotal}</span> mock cards visíveis`
                : `<span class="mono">${filtered.length}</span> de <span class="mono">${normalTotal}</span> experiments em produção`;

            const gallery = document.getElementById('gallery');
            if (!filtered.length) {
                gallery.innerHTML = `<div class="empty-state" style="grid-column:1 / -1"><div class="text-2xl mb-3">🫥</div><div class="text-lg font-bold text-slate-200 mb-2">Nada apareceu com esse recorte</div><div>Tenta limpar a busca ou abrir mais categorias.</div></div>`;
                return;
            }

            gallery.innerHTML = filtered.map(exp => {
                const color = getCategoryColor(exp.cat);
                const isDev = !!exp.dev;
                return `
                    <article class="gallery-card ${isDev ? 'dev-card' : ''}">
                        <div>
                            <div class="card-top">
                                <div>
                                    <div class="flex items-center gap-2">
                                        <span class="category-dot" style="color:${color};background:${color}"></span>
                                        <span class="tag" style="color:${color}">${exp.cat}</span>
                                    </div>
                                    <div class="mono text-[11px] text-slate-500 mt-3">${formatDateBR(parseDateBR(exp.date))}</div>
                                </div>
                                <div class="tag">${isDev ? 'dev preview' : 'live'} </div>
                            </div>

                            <h3 class="card-title">${exp.name}</h3>
                            <p class="card-desc">${exp.desc}</p>

                            <div class="card-tags">
                                <span class="tag mono">/${exp.file}</span>
                            </div>
                        </div>

                        <div class="card-actions">
                            <a class="primary-link" target="_blank" href="${baseUrl}/${exp.file}"><i class="fas fa-play"></i> Abrir demo</a>
                            <a class="secondary-link" target="_blank" href="${sourceUrl}/${exp.file}"><i class="fas fa-code"></i></a>
                        </div>
                    </article>
                `;
            }).join('');
        }

        function initSearch() {
            const input = document.getElementById('search-input');
            const clear = document.getElementById('clear-search');
            const sync = () => {
                clear.style.opacity = searchQuery ? '1' : '0';
                clear.style.pointerEvents = searchQuery ? 'auto' : 'none';
            };
            input.addEventListener('input', () => {
                searchQuery = input.value.trim();
                sync();
                renderActiveFilters();
                renderCards();
            });
            clear.addEventListener('click', () => {
                searchQuery = '';
                input.value = '';
                sync();
                renderActiveFilters();
                renderCards();
                input.focus();
            });
            sync();
        }

        function initFiltersPanel() {
            const shell = document.getElementById('filters-shell');
            const backdrop = document.getElementById('filters-backdrop');
            const openBtn = document.getElementById('filters-open');
            const closeBtn = document.getElementById('filters-toggle');
            const panel = document.getElementById('filters-panel');
            if (!shell || !backdrop || !openBtn || !closeBtn || !panel) return;

            panel.classList.remove('collapsed');

            const openShell = () => {
                shell.classList.add('open');
                shell.setAttribute('aria-hidden', 'false');
                backdrop.classList.add('open');
                openBtn.style.display = 'none';
                document.getElementById('search-input')?.focus();
            };

            const closeShell = () => {
                shell.classList.remove('open');
                shell.setAttribute('aria-hidden', 'true');
                backdrop.classList.remove('open');
                openBtn.style.display = 'inline-flex';
            };

            closeShell();

            openBtn.addEventListener('click', openShell);
            closeBtn.addEventListener('click', closeShell);
            backdrop.addEventListener('click', closeShell);
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeShell();
            });
        }

        function scrollToSection(id) {
            document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        async function fetchLastCommitDate(file) {
            try {
                const res = await fetch(`https://api.github.com/repos/${username}/${repo}/commits?path=${file}&per_page=1`);
                if (!res.ok) return null;
                const commits = await res.json();
                if (!Array.isArray(commits) || !commits.length) return null;
                return new Date(commits[0].commit.author.date);
            } catch { return null; }
        }

        function prettyNameFromFile(file) {
            return file.replace(/\.html$/i, '').replace(/[-_]+/g, ' ').replace(/\s+/g, ' ').trim().replace(/\w/g, c => c.toUpperCase());
        }

        function classifyByFileName(file) {
            const f = file.toLowerCase();
            if (/(shader|glsl|sdf)/.test(f)) return 'Shaders';
            if (/(fractal|mandelbrot|julia|nebulabrot|samambaia)/.test(f)) return 'Fractal';
            if (/(audio|binaur|tts|player|stereo)/.test(f)) return 'Áudio';
            if (/(lorenz|gravity|faraday|water|pendulum|orbiter|resson|molas|roldanas|pulley|blackhole|vortex|sp|springs)/.test(f)) return 'Física';
            if (/(n1089|prime|kaprekar|fibonacci|lissajous|riemann|harshad|collatz|pi-|tusi|matem|binet)/.test(f)) return 'Matemática';
            if (/(geo|torus|mobius|sphere|icosa|dode|tesseract|viviani|escher|spiral|spiro|solidos|cubo|cube)/.test(f)) return 'Geometria';
            if (/(chat|grok|neural|brain|qwen|whisper|bitnet|quantization|ai-)/.test(f)) return 'IA';
            if (/(logo|qrcode|timer|map|perfil|color|astro|limpeza|rsvp|fatos|biblia|keep|index)/.test(f)) return 'Util';
            return 'Util';
        }

        async function syncMissingCardsFromGitHub() {
            try {
                const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents`);
                if (!res.ok) return;
                const items = await res.json();
                const remoteHtml = items.filter(item => item.type === 'file' && /\.html$/i.test(item.name) && !/(^dev[\/\\])/.test(item.name) && !['index.html', 'index.html.bkp'].includes(item.name.toLowerCase())).map(item => item.name);
                const known = new Set(experiments.map(e => e.file.toLowerCase()));
                const missing = remoteHtml.filter(file => !known.has(file.toLowerCase()));
                if (!missing.length) return;
                const generated = await Promise.all(missing.map(async file => {
                    const commitDate = await fetchLastCommitDate(file);
                    return {
                        name: prettyNameFromFile(file),
                        file,
                        cat: classifyByFileName(file),
                        date: formatDateBR(commitDate || new Date()),
                        desc: 'Card gerado automaticamente a partir dos arquivos do repositório.'
                    };
                }));
                experiments = [...generated, ...experiments];
                sortExperiments();
                initFilters();
                renderActiveFilters();
                renderCards();
            } catch (err) { console.warn('Sync falhou:', err); }
        }

        sortExperiments();
        initFilters();
        initSearch();
        initFiltersPanel();
        renderActiveFilters();
        renderCards();
        syncMissingCardsFromGitHub();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>TEXTSTRING PRO - Claude Code</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <style>
 body {
 margin: 0;
 padding: 0;
 background: #050505;
 color: #00ffcc;
 font-family: 'JetBrains Mono', 'Fira Code', monospace;
 overflow: hidden;
 height: 100vh;
 touch-action: none;
 }
 
 canvas {
 display: block;
 image-rendering: pixelated;
 }

 .glass-panel {
 background: rgba(10, 10, 10, 0.85);
 backdrop-filter: blur(16px);
 border: 1px solid rgba(0, 255, 204, 0.2);
 box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
 transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
 }

 .glass-panel.collapsed {
 transform: translateX(calc(-100% - 24px));
 }

 input[type="range"] {
 accent-color: #00ffcc;
 height: 4px;
 }

 .neo-button {
 transition: all 0.2s ease;
 border: 1px solid rgba(0, 255, 204, 0.3);
 }
 .neo-button:active {
 transform: scale(0.95);
 background: rgba(0, 255, 204, 0.2);
 }
 .neo-button.active {
 background: rgba(0, 255, 204, 0.2);
 border-color: #00ffcc;
 }

 #toggle-ui {
 position: absolute;
 right: -45px;
 top: 0;
 width: 35px;
 height: 35px;
 display: flex;
 align-items: center;
 justify-content: center;
 background: rgba(10, 10, 10, 0.9);
 border: 1px solid rgba(0, 255, 204, 0.4);
 border-radius: 0 8px 8px 0;
 cursor: pointer;
 color: #00ffcc;
 }

 @media (max-width: 640px) {
 #ui-container {
 width: 85%;
 left: 20px;
 top: 20px;
 }
 }
 </style>
</head>
<body>
 <div id="container" class="fixed inset-0 z-0">
 <canvas id="canvas"></canvas>
 </div>
 
 <div id="ui-container" class="fixed top-6 left-6 z-10 w-72 glass-panel p-5 rounded-xl space-y-4 pointer-events-auto">
 <button id="toggle-ui" title="Alternar Painel">
 <svg id="toggle-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
 </button>

 <div class="flex justify-between items-center border-b border-emerald-500/30 pb-2 mb-4">
 <h1 class="text-lg font-bold tracking-widest text-emerald-400">TEXTSTRING <span class="text-xs font-normal opacity-50">v2.2</span></h1>
 <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
 </div>
 
 <div class="space-y-1">
 <label class="text-[10px] uppercase tracking-tighter opacity-70">Conteúdo do Texto</label>
 <input type="text" id="textInput" value="Claude Code" 
 class="w-full bg-black/40 border border-emerald-500/30 rounded px-3 py-2 text-emerald-400 focus:outline-none focus:border-emerald-400 transition-colors uppercase">
 </div>

 <div class="grid grid-cols-2 gap-2">
 <button id="modeScatter" class="neo-button active text-[10px] py-2 rounded uppercase font-bold">Dispersar</button>
 <button id="modeGather" class="neo-button text-[10px] py-2 rounded uppercase font-bold">Agrupar</button>
 </div>
 
 <div class="space-y-3 pt-2">
 <div class="space-y-1">
 <div class="flex justify-between text-[10px] uppercase opacity-70">
 <span>Velocidade</span>
 <span id="speedVal">1.5</span>
 </div>
 <input type="range" id="speedInput" min="0.5" max="5" step="0.1" value="1.5" class="w-full cursor-pointer">
 </div>

 <div class="space-y-1">
 <div class="flex justify-between text-[10px] uppercase opacity-70">
 <span>Fricção</span>
 <span id="frictionVal">0.95</span>
 </div>
 <input type="range" id="frictionInput" min="0.8" max="0.99" step="0.01" value="0.95" class="w-full cursor-pointer">
 </div>

 <div class="space-y-1">
 <div class="flex justify-between text-[10px] uppercase opacity-70">
 <span>Força do Rato</span>
 <span id="forceVal">100</span>
 </div>
 <input type="range" id="forceInput" min="20" max="300" step="10" value="100" class="w-full cursor-pointer">
 </div>
 </div>
 
 <div class="pt-2 text-[9px] leading-relaxed opacity-50 italic">
 &bull; Mova o rato para interagir<br>
 &bull; Clique/Toque para explosão<br>
 &bull; Partículas amostradas do raster da fonte
 </div>
 </div>

 <script>
 const canvas = document.getElementById('canvas');
 const ctx = canvas.getContext('2d');
 const uiContainer = document.getElementById('ui-container');
 const toggleBtn = document.getElementById('toggle-ui');
 const toggleIcon = document.getElementById('toggle-icon');
 
 const textInput = document.getElementById('textInput');
 const speedInput = document.getElementById('speedInput');
 const frictionInput = document.getElementById('frictionInput');
 const forceInput = document.getElementById('forceInput');
 const modeScatterBtn = document.getElementById('modeScatter');
 const modeGatherBtn = document.getElementById('modeGather');

 let particles = [];
 let width, height;
 let mouse = { x: -1000, y: -1000, active: false };
 let settings = {
 text: "Claude Code",
 speed: 1.5,
 friction: 0.95,
 force: 100,
 mode: 'scatter',
 fontSize: 140,
 spacing: 4
 };

 const offscreen = document.createElement('canvas');
 const offCtx = offscreen.getContext('2d', { willReadFrequently: true });

 class Particle {
 constructor(x, y, targetX, targetY) {
 this.x = Math.random() * width;
 this.y = Math.random() * height;
 this.targetX = targetX;
 this.targetY = targetY;
 this.vx = 0;
 this.vy = 0;
 this.color = `hsl(${150 + Math.random() * 50}, 100%, 60%)`;
 this.char = "01"[Math.floor(Math.random() * 2)];
 }

 update() {
 let dx = this.targetX - this.x;
 let dy = this.targetY - this.y;
 let distance = Math.sqrt(dx * dx + dy * dy);
 let forceDirectionX = dx / distance;
 let forceDirectionY = dy / distance;
 
 const springForce = distance * 0.05 * settings.speed;
 this.vx += forceDirectionX * springForce;
 this.vy += forceDirectionY * springForce;

 let mdx = mouse.x - this.x;
 let mdy = mouse.y - this.y;
 let mDist = Math.sqrt(mdx * mdx + mdy * mdy);
 
 if (mDist < settings.force) {
 let mForce = (settings.force - mDist) / settings.force;
 if (settings.mode === 'scatter') {
 this.vx -= (mdx / mDist) * mForce * 20;
 this.vy -= (mdy / mDist) * mForce * 20;
 } else {
 this.vx += (mdx / mDist) * mForce * 15;
 this.vy += (mdy / mDist) * mForce * 15;
 }
 }

 this.vx *= settings.friction;
 this.vy *= settings.friction;
 this.x += this.vx;
 this.y += this.vy;
 }

 draw() {
 ctx.fillStyle = this.color;
 ctx.font = '8px monospace';
 ctx.fillText(this.char, this.x, this.y);
 }
 }

 function initParticles() {
 particles = [];
 const text = settings.text.toUpperCase();
 
 settings.fontSize = Math.min(width / (text.length * 0.6), 160);
 settings.spacing = settings.fontSize > 100 ? 5 : 4;

 offscreen.width = width;
 offscreen.height = height;
 offCtx.clearRect(0, 0, width, height);
 offCtx.fillStyle = 'white';
 offCtx.font = `bold ${settings.fontSize}px monospace`;
 offCtx.textAlign = 'center';
 offCtx.textBaseline = 'middle';
 offCtx.fillText(text, width / 2, height / 2);

 const pixels = offCtx.getImageData(0, 0, width, height).data;

 for (let y = 0; y < height; y += settings.spacing) {
 for (let x = 0; x < width; x += settings.spacing) {
 const index = (y * width + x) * 4;
 const alpha = pixels[index + 3];
 if (alpha > 128) {
 particles.push(new Particle(x, y, x, y));
 }
 }
 }
 }

 function resize() {
 width = window.innerWidth;
 height = window.innerHeight;
 canvas.width = width;
 canvas.height = height;
 initParticles();
 }

 function animate() {
 ctx.fillStyle = 'rgba(5, 5, 5, 0.25)';
 ctx.fillRect(0, 0, width, height);

 particles.forEach(p => {
 p.update();
 p.draw();
 });

 requestAnimationFrame(animate);
 }

 toggleBtn.addEventListener('click', () => {
 const isCollapsed = uiContainer.classList.toggle('collapsed');
 toggleIcon.style.transform = isCollapsed ? 'rotate(180deg)' : 'rotate(0deg)';
 });

 window.addEventListener('resize', resize);
 
 canvas.addEventListener('mousemove', (e) => {
 mouse.x = e.clientX;
 mouse.y = e.clientY;
 });

 canvas.addEventListener('mousedown', () => {
 particles.forEach(p => {
 p.vx += (Math.random() - 0.5) * 60;
 p.vy += (Math.random() - 0.5) * 60;
 });
 });

 canvas.addEventListener('touchstart', (e) => {
 mouse.x = e.touches[0].clientX;
 mouse.y = e.touches[0].clientY;
 });

 textInput.addEventListener('input', (e) => {
 settings.text = e.target.value || "TEXT";
 initParticles();
 });

 speedInput.addEventListener('input', (e) => {
 settings.speed = parseFloat(e.target.value);
 document.getElementById('speedVal').innerText = settings.speed.toFixed(1);
 });

 frictionInput.addEventListener('input', (e) => {
 settings.friction = parseFloat(e.target.value);
 document.getElementById('frictionVal').innerText = settings.friction;
 });

 forceInput.addEventListener('input', (e) => {
 settings.force = parseInt(e.target.value);
 document.getElementById('forceVal').innerText = settings.force;
 });

 modeScatterBtn.addEventListener('click', () => {
 settings.mode = 'scatter';
 modeScatterBtn.classList.add('active');
 modeGatherBtn.classList.remove('active');
 });

 modeGatherBtn.addEventListener('click', () => {
 settings.mode = 'gather';
 modeGatherBtn.classList.add('active');
 modeScatterBtn.classList.remove('active');
 });

 resize();
 animate();
 </script>
</body>
</html>

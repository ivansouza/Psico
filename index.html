        // Auxiliares de Data
        function getYearFromDate(dateStr) { return String(parseDateBR(dateStr).getFullYear()); }
        function getMonthFromDate(dateStr) { return monthNames[parseDateBR(dateStr).getMonth()]; }

        function initFilters() {
            // Filtro Categoria
            const cats = ["Todos", ...new Set(experiments.map(e => e.cat))];
            const filtersCat = document.getElementById('filters-cat');
            filtersCat.innerHTML = cats.map(cat => `
                <button onclick="applyFilter('cat', '${cat}', this)" class="filter-btn px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest ${cat === activeCategory ? 'active' : ''}">
                    ${cat}
                </button>
            `).join('');

            // Filtro Ano
            const years = ["Todos", ...new Set(experiments.map(e => getYearFromDate(e.date)))].sort();
            const filtersYear = document.getElementById('filters-year');
            filtersYear.innerHTML = years.map(y => `
                <button onclick="applyFilter('year', '${y}', this)" class="filter-btn px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest ${y === activeYear ? 'active' : ''}">
                    ${y}
                </button>
            `).join('');

            // Filtro Mês
            const availableMonths = [...new Set(experiments.map(e => getMonthFromDate(e.date)))];
            availableMonths.sort((a, b) => monthNames.indexOf(a) - monthNames.indexOf(b));
            const filtersMonth = document.getElementById('filters-month');
            const monthList = ["Todos", ...availableMonths];
            filtersMonth.innerHTML = monthList.map(m => `
                <button onclick="applyFilter('month', '${m}', this)" class="filter-btn px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest ${m === activeMonth ? 'active' : ''}">
                    ${m}
                </button>
            `).join('');
        }

        function applyFilter(type, value, btn) {
            if (type === 'cat') activeCategory = value;
            else if (type === 'month') activeMonth = value;
            else if (type === 'year') activeYear = value;

            btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCards();
        }

        function initSearch() {
            const input = document.getElementById('search-input');
            const clearBtn = document.getElementById('clear-search');
            if (!input) return;

            const toggleClear = () => {
                if (!clearBtn) return;
                if (searchQuery) {
                    clearBtn.classList.remove('opacity-0', 'pointer-events-none');
                } else {
                    clearBtn.classList.add('opacity-0', 'pointer-events-none');
                }
            };

            input.addEventListener('input', () => {
                searchQuery = input.value.trim();
                toggleClear();
                renderCards();
            });

            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    searchQuery = "";
                    input.value = "";
                    toggleClear();
                    renderCards();
                    input.focus();
                });
            }

            toggleClear();
        }

        function renderCards() {
            const gallery = document.getElementById('gallery');
            const stats = document.getElementById('stats');
            const normalizedSearch = searchQuery.toLowerCase();
            
            const filtered = experiments.filter(exp => {
                const matchCat = activeCategory === "Todos" || exp.cat === activeCategory;
                const matchMonth = activeMonth === "Todos" || getMonthFromDate(exp.date) === activeMonth;
                const matchYear = activeYear === "Todos" || getYearFromDate(exp.date) === activeYear;
                const matchSearch = !normalizedSearch || [exp.name, exp.desc, exp.cat, exp.file]
                    .filter(Boolean)
                    .some(field => String(field).toLowerCase().includes(normalizedSearch));
                return matchCat && matchMonth && matchYear && matchSearch;
            });
            
            const searchBadge = normalizedSearch ? ` • busca: “${searchQuery}”` : '';
            stats.innerHTML = `Resultados: ${filtered.length} de ${experiments.length} experiências${searchBadge}`;
            
            gallery.innerHTML = filtered.map(exp => `
                <div class="card p-6 rounded-[2rem] flex flex-col justify-between h-full group">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex flex-col">
                                <span class="badge-cat text-sky-400 opacity-60">${exp.cat}</span>
                                <span class="file-date mt-1">${formatDateBR(parseDateBR(exp.date))}</span>
                            </div>
                            <div class="flex gap-1">
                                <span class="w-1.5 h-1.5 rounded-full bg-slate-700"></span>
                                <span class="w-1.5 h-1.5 rounded-full bg-slate-700"></span>
                            </div>
                        </div>
                        <h3 class="text-lg font-extrabold text-white mb-2 leading-tight group-hover:text-sky-400 transition-colors">${exp.name}</h3>
                        <p class="text-[11px] text-slate-500 leading-relaxed mb-6 font-medium">${exp.desc}</p>
                    </div>
                    
                    <div class="flex flex-col gap-2 mt-auto">
                        <a href="${baseUrl}/${exp.file}" target="_blank" class="w-full bg-sky-600 hover:bg-sky-500 text-white text-[10px] font-black py-3 rounded-2xl text-center transition-all uppercase tracking-widest flex items-center justify-center gap-2">
                            <i class="fas fa-play"></i> Ver Demo
                        </a>
                        <a href="${sourceUrl}/${exp.file}" target="_blank" class="w-full bg-slate-800/50 hover:bg-slate-700 text-slate-400 hover:text-white text-[9px] font-bold py-2 rounded-xl text-center transition-all flex items-center justify-center gap-2 border border-white/5">
                            <i class="fas fa-code"></i> Source Code
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function parseDateBR(dateStr) {
            if (!dateStr) return new Date(0);
            const [datePart, timePart] = dateStr.split(' ');
            const [day, month, year] = datePart.split('/').map(Number);
            if (timePart) {
                const [hour = 0, minute = 0, second = 0] = timePart.split(':').map(Number);
                return new Date(year, month - 1, day, hour || 0, minute || 0, second || 0);
            }
            return new Date(year, month - 1, day);
        }

        function sortExperiments() {
            // Ordenação global por data (mais recente primeiro), independente de filtros
            experiments.sort((a, b) => {
                const diff = parseDateBR(b.date) - parseDateBR(a.date);
                return diff !== 0 ? diff : a.name.localeCompare(b.name);
            });
        }

        function formatDateBR(date = new Date()) {
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function prettyNameFromFile(file) {
            return file
                .replace(/\.html$/i, '')
                .replace(/[-_]+/g, ' ')
                .replace(/\s+/g, ' ')
                .trim()
                .replace(/\b\w/g, c => c.toUpperCase());
        }

        function classifyByFileName(file) {
            const f = file.toLowerCase();
            if (/(shader|glsl|sdf)/.test(f)) return 'Shaders';
            if (/(fractal|mandelbrot|julia|nebulabrot|samambaia)/.test(f)) return 'Fractal';
            if (/(audio|binaur|tts|player|stereo)/.test(f)) return 'Áudio';
            if (/(lorenz|gravity|faraday|water|pendulum|orbiter|resson|molas|roldanas|pulley|blackhole|vortex|sp|springs)/.test(f)) return 'Física';
            if (/(n1089|prime|kaprekar|fibonacci|lissajous|riemann|harshad|collatz|pi-|tusi|matem|binet)/.test(f)) return 'Matemática';
            if (/(geo|torus|mobius|sphere|icosa|dode|tesseract|viviani|escher|spiral|spiro|solidos|cubo|cube)/.test(f)) return 'Geometria';
            if (/(chat|grok|neural|brain|qwen)/.test(f)) return 'IA';
            if (/(logo|qrcode|timer|map|perfil|color|astro|limpeza|rsvp|fatos|biblia|keep|index)/.test(f)) return 'Util';
            return 'Util';
        }

        async function fetchLastCommitDate(file) {
            try {
                const res = await fetch(`https://api.github.com/repos/${username}/${repo}/commits?path=${file}&per_page=1`);
                if (!res.ok) return null;
                const commits = await res.json();
                if (!Array.isArray(commits) || !commits.length) return null;
                return new Date(commits[0].commit.author.date);
            } catch (err) {
                console.warn('Não foi possível obter data do commit para', file, err);
                return null;
            }
        }

        async function syncMissingCardsFromGitHub() {
            try {
                const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents`);
                if (!res.ok) return;

                const items = await res.json();
                const remoteHtml = items
                    .filter(item => item.type === 'file' && /\.html$/i.test(item.name) && item.name.toLowerCase() !== 'index.html')
                    .map(item => item.name);

                const known = new Set(experiments.map(e => e.file.toLowerCase()));
                const missing = remoteHtml.filter(file => !known.has(file.toLowerCase()));
                if (!missing.length) return;

                const generated = await Promise.all(missing.map(async (file) => {
                    const commitDate = await fetchLastCommitDate(file);
                    return {
                        name: prettyNameFromFile(file),
                        file,
                        cat: classifyByFileName(file),
                        date: formatDateBR(commitDate || new Date()),
                        desc: 'Card gerado automaticamente a partir dos arquivos do repositório.'
                    };
                }));

                experiments = [...generated, ...experiments];
                sortExperiments();
                document.getElementById('cards-total').textContent = experiments.length;
                initFilters();
                renderCards();
            } catch (err) {
                console.warn('Não foi possível sincronizar cards automaticamente:', err);
            }
        }

        sortExperiments();
        document.getElementById('cards-total').textContent = experiments.length;
        initFilters();
        initSearch();
        renderCards();
        syncMissingCardsFromGitHub();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WuSquare • O Truque Mental de Scott Wu</title>

  <!-- Bibliotecas Externas -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- KaTeX para renderização de fórmulas LaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
    .title-font { font-family: 'Space Grotesk', sans-serif; }
    .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(250, 204, 21, 0.1); }

    .step-card { transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); opacity: 0; transform: translateY(20px); }
    .step-card.visible { opacity: 1; transform: translateY(0); }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    .animate-pop { animation: pop 0.3s ease-out; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #09090b; }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }

    .katex-display {
      margin: 0.5em 0 !important;
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100%;
      padding: 4px 0;
    }

    .confetti { position: fixed; pointer-events: none; z-index: 999; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 selection:bg-yellow-400 selection:text-black">

  <!-- NAVEGAÇÃO -->
  <nav class="fixed top-0 w-full z-50 border-b border-white/5 glass">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 md:w-10 md:h-10 bg-yellow-400 rounded-lg md:rounded-xl flex items-center justify-center text-lg md:text-xl shadow-[0_0_20px_rgba(234,179,8,0.3)]">🧠</div>
        <span class="title-font text-lg md:text-xl font-bold tracking-tight text-yellow-400">WuSquare</span>
      </div>
      <button onclick="document.getElementById('pratique').scrollIntoView()" class="bg-yellow-400 text-black text-[10px] md:text-xs font-bold px-4 py-2 rounded-full hover:bg-yellow-300 transition-all uppercase">Treinar</button>
    </div>
  </nav>

  <!-- SEÇÃO HERO DINÂMICA -->
  <section class="relative pt-24 md:pt-32 pb-16 md:pb-20 px-4 overflow-hidden">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full bg-[radial-gradient(circle_at_center,rgba(234,179,8,0.05)_0%,transparent_70%)]"></div>
    <div class="max-w-4xl mx-auto text-center relative">
      <div id="hero-badge" class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-yellow-400/10 border border-yellow-400/20 text-yellow-400 text-[9px] md:text-[10px] font-bold tracking-[0.2em] mb-4 md:mb-6 uppercase">
        MÉTODO SCOTT WU
      </div>
      <h1 class="title-font text-4xl md:text-7xl font-bold tracking-tighter leading-none mb-4 md:mb-6">
        Calcule Quadrados <br> <span class="text-yellow-400">Instantaneamente.</span>
      </h1>
      <p id="hero-description" class="text-zinc-400 text-sm md:text-lg max-w-xl mx-auto mb-8 md:mb-10 leading-relaxed px-2">
        Domine o truque algébrico que permite elevar qualquer número ao quadrado mentalmente em segundos.
      </p>

      <div class="flex items-center justify-center px-2">
        <div class="p-4 md:p-6 rounded-2xl md:rounded-3xl bg-zinc-900/50 border border-white/5 flex flex-col items-center w-full max-w-sm">
          <span id="hero-formula-label" class="text-[9px] md:text-xs font-mono text-zinc-500 mb-1 md:mb-2 underline decoration-yellow-400/50 uppercase italic text-center">A Fórmula Mestra</span>
          <div id="hero-formula" class="text-lg md:text-3xl font-mono font-bold tracking-tighter math-render w-full overflow-hidden text-center">
            $$n^2 = (n-25) \cdot 100 + (n-50)^2$$
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- SIMULADOR -->
  <section id="demo" class="py-12 md:py-24 px-4 border-y border-white/5 bg-zinc-900/20">
    <div class="max-w-3xl mx-auto">
      <div class="text-center mb-8">
        <h2 class="title-font text-2xl md:text-3xl font-bold mb-2">Simulador</h2>
        <div class="flex flex-col sm:flex-row justify-center gap-2 mt-6">
          <button id="btn-wu" onclick="setMethod('wu')" class="px-6 py-3 rounded-xl text-[10px] font-bold border border-yellow-400 bg-yellow-400 text-black uppercase">Fórmula de Wu</button>
          <button id="btn-blocks" onclick="setMethod('blocks')" class="px-6 py-3 rounded-xl text-[10px] font-bold border border-white/10 bg-zinc-900 text-zinc-400 hover:border-yellow-400/50 uppercase">Técnica de Blocos</button>
        </div>
      </div>

      <div class="bg-zinc-900 rounded-[2rem] p-1 border border-white/5 shadow-2xl">
        <div class="bg-black rounded-[1.8rem] p-6 md:p-12">
          <div class="flex flex-col items-center gap-8">
            <div class="w-full">
              <label class="block text-center text-[10px] font-bold text-zinc-500 mb-2 uppercase tracking-widest">Número ($n$)</label>
              <input type="number" id="demo-input" value="53"
                class="w-full bg-transparent text-center text-7xl md:text-8xl font-bold title-font text-yellow-400 outline-none"
                oninput="runDemo()">
            </div>
            <div id="demo-steps" class="w-full space-y-4 math-render"></div>
            <div id="demo-final" class="hidden w-full pt-6 border-t border-white/10 flex flex-col items-center math-render text-center">
              <span class="text-[10px] font-bold text-zinc-500 mb-2 uppercase">Resultado Final</span>
              <div id="final-res" class="text-5xl md:text-6xl font-bold text-emerald-400 tracking-tighter"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ARENA DE TREINO -->
  <section id="pratique" class="py-16 md:py-24 px-4 bg-yellow-400 text-black">
    <div class="max-w-xl mx-auto text-center">
      <h2 class="title-font text-3xl md:text-4xl font-black mb-12 uppercase italic tracking-tighter">Arena de Treino</h2>

      <div class="bg-black text-white rounded-[2.5rem] p-8 md:p-10 shadow-2xl">
        <div class="flex justify-between items-start mb-8">
          <div class="text-left">
            <span class="text-[10px] font-bold text-zinc-500 block uppercase">Desafio</span>
            <div id="practice-target" class="text-5xl md:text-7xl font-bold title-font math-render"></div>
          </div>
          <div class="text-right">
            <span class="text-[10px] font-bold text-zinc-500 block uppercase">Combo</span>
            <div id="streak-count" class="text-3xl md:text-4xl font-bold text-yellow-400">0</div>
          </div>
        </div>

        <div class="mb-8">
          <input type="number" id="practice-input" placeholder="???"
            class="w-full bg-zinc-900 rounded-2xl py-6 px-4 text-4xl text-center font-bold outline-none border-2 border-transparent focus:border-yellow-400 transition-all">
        </div>

        <div class="flex flex-col gap-3">
          <button onclick="checkPractice()" class="bg-yellow-400 text-black font-bold py-4 rounded-xl uppercase text-sm shadow-lg shadow-yellow-400/20 active:scale-95 transition-all">Verificar Resposta</button>
          <div class="grid grid-cols-2 gap-3">
            <button onclick="solveForMe()" class="bg-zinc-800 text-zinc-300 font-bold py-3 rounded-xl uppercase text-[10px] hover:bg-zinc-700 transition-all">Resolva pra mim</button>
            <button onclick="newPractice()" class="bg-zinc-800 text-zinc-400 font-bold py-3 rounded-xl uppercase text-[10px] hover:bg-zinc-700 transition-all">Pular</button>
          </div>
        </div>

        <div id="practice-feedback" class="mt-8 min-h-[1.5rem] text-sm md:text-base"></div>
      </div>
    </div>
  </section>

  <!-- PROVA -->
  <section class="py-20 px-4">
    <div class="max-w-2xl mx-auto">
      <div id="prova-container" class="bg-zinc-900/50 p-8 md:p-12 rounded-[2.5rem] border border-white/5 math-render text-center"></div>
    </div>
  </section>

  <script>
    let currentMethod = 'wu';
    const demoInput = document.getElementById('demo-input');
    const demoSteps = document.getElementById('demo-steps');
    const demoFinal = document.getElementById('demo-final');
    const finalRes = document.getElementById('final-res');
    const provaContainer = document.getElementById('prova-container');

    const heroDescription = document.getElementById('hero-description');
    const heroFormula = document.getElementById('hero-formula');
    const heroFormulaLabel = document.getElementById('hero-formula-label');
    const heroBadge = document.getElementById('hero-badge');

    const practiceTarget = document.getElementById('practice-target');
    const practiceInput = document.getElementById('practice-input');
    const streakEl = document.getElementById('streak-count');
    const practiceFeedback = document.getElementById('practice-feedback');

    let currentPractice = { n: 0, result: 0 };
    let streak = 0;

    const katexOptions = {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false }
      ],
      throwOnError: false
    };

    function setMethod(m) {
      currentMethod = m;
      document.getElementById('btn-wu').className = m === 'wu'
        ? 'px-6 py-3 rounded-xl text-[10px] font-bold border border-yellow-400 bg-yellow-400 text-black uppercase'
        : 'px-6 py-3 rounded-xl text-[10px] font-bold border border-white/10 bg-zinc-900 text-zinc-400 hover:border-yellow-400/50 uppercase';
      document.getElementById('btn-blocks').className = m === 'blocks'
        ? 'px-6 py-3 rounded-xl text-[10px] font-bold border border-yellow-400 bg-yellow-400 text-black uppercase'
        : 'px-6 py-3 rounded-xl text-[10px] font-bold border border-white/10 bg-zinc-900 text-zinc-400 hover:border-yellow-400/50 uppercase';

      updateHeroContent();
      updateProofContent();
      runDemo();
    }

    function refreshMath(element) {
      if (window.renderMathInElement) {
        renderMathInElement(element || document.body, katexOptions);
      }
    }

    function updateHeroContent() {
      if (currentMethod === 'wu') {
        heroDescription.textContent = 'Domine o truque algébrico que permite elevar qualquer número ao quadrado mentalmente em segundos.';
        heroFormulaLabel.textContent = 'A Fórmula Mestra';
        heroFormula.innerHTML = '$$n^2 = (n-25) \\cdot 100 + (n-50)^2$$';
        heroBadge.className = 'inline-flex items-center gap-2 px-3 py-1 rounded-full bg-yellow-400/10 border border-yellow-400/20 text-yellow-400 text-[9px] md:text-[10px] font-bold tracking-[0.2em] mb-4 md:mb-6 uppercase';
        heroBadge.textContent = 'Fórmula de Wu';
      } else {
        heroDescription.textContent = 'A técnica de Base 50: some a distância ao 25 e “cole” o quadrado da distância no final. Rápido e intuitivo.';
        heroFormulaLabel.textContent = 'A Lógica Visual';
        heroFormula.innerHTML = '$$n^2 = (25 + d) \\mid d^2 \\text{ onde } d = n-50$$';
        heroBadge.className = 'inline-flex items-center gap-2 px-3 py-1 rounded-full bg-emerald-400/10 border border-emerald-400/20 text-emerald-400 text-[9px] md:text-[10px] font-bold tracking-[0.2em] mb-4 md:mb-6 uppercase';
        heroBadge.textContent = 'Técnica de Blocos';
      }
      refreshMath(heroFormula.parentElement);
    }

    function updateProofContent() {
      if (currentMethod === 'wu') {
        provaContainer.innerHTML = `
          <h3 class="title-font text-xl font-bold mb-6 text-yellow-400 uppercase tracking-widest">Prova de Wu</h3>
          <div class="space-y-4 font-mono text-zinc-400 text-sm text-center">
            <div class="bg-black/40 py-4 rounded-2xl mb-6">
              $$(n-25) \\cdot 100 + (n-50)^2$$
            </div>
            <p class="flex justify-between border-b border-white/5 pb-2 px-2">
              <span>Expansão:</span>
              <span class="text-white">$100n - 2500 + n^2 - 100n + 2500$</span>
            </p>
            <p class="flex justify-center pt-4">
              <span class="text-emerald-400 text-3xl font-bold">$= n^2$</span>
            </p>
          </div>`;
      } else {
        provaContainer.innerHTML = `
          <h3 class="title-font text-xl font-bold mb-6 text-emerald-400 uppercase tracking-widest">Prova de Blocos</h3>
          <div class="space-y-4 font-mono text-zinc-400 text-sm text-center">
            <p class="text-xs italic mb-4">Seja $n = 50 + d$</p>
            <div class="bg-black/40 py-4 rounded-2xl mb-6">
              $$n^2 = (50 + d)^2 = 2500 + 100d + d^2$$
            </div>
            <p class="flex justify-between border-b border-white/5 pb-2 px-2">
              <span>Fatoração:</span>
              <span class="text-white">$100 \\cdot (25 + d) + d^2$</span>
            </p>
            <p class="flex justify-center pt-4">
              <span class="text-emerald-400 text-3xl font-bold">$= n^2$</span>
            </p>
          </div>`;
      }
      refreshMath(provaContainer);
    }

    function runDemo() {
      const n = parseInt(demoInput.value, 10);
      if (Number.isNaN(n)) {
        demoSteps.innerHTML = '';
        demoFinal.classList.add('hidden');
        return;
      }

      const diff = n - 50;
      const total = n * n;

      if (currentMethod === 'wu') {
        const p1 = (n - 25) * 100;
        const p2 = diff * diff;
        demoSteps.innerHTML = `
          <div class="bg-zinc-900 p-4 rounded-xl border border-white/5 flex justify-between items-center">
            <span class="text-xs text-yellow-400 uppercase font-bold">Base 25</span>
            <span class="text-xl font-mono">$${p1}$</span>
          </div>
          <div class="bg-zinc-900 p-4 rounded-xl border border-white/5 flex justify-between items-center">
            <span class="text-xs text-yellow-400 uppercase font-bold">Diferença^2</span>
            <span class="text-xl font-mono">$${p2}$</span>
          </div>`;
      } else {
        const b1 = 25 + diff;
        const b2 = diff * diff;
        const b2_tens = Math.floor(b2 / 100);
        const b2_units = b2 % 100;
        const b2Str = b2_units < 10 ? `0${b2_units}` : b2_units.toString();

        let visualHtml = `
          <div class="bg-zinc-900 p-4 rounded-xl border border-white/5 flex justify-between items-center">
            <span class="text-xs text-emerald-400 uppercase font-bold">Esquerda</span>
            <span class="text-xl font-mono">$${b1}$</span>
          </div>
          <div class="bg-zinc-900 p-4 rounded-xl border border-white/5 flex justify-between items-center">
            <span class="text-xs text-emerald-400 uppercase font-bold">Direita</span>
            <span class="text-xl font-mono">$${b2}$</span>
          </div>`;

        if (b2 >= 100) {
          visualHtml += `
            <div class="text-[10px] text-zinc-500 mt-2 italic">
              * Como a direita é $\\ge 100$, somamos as centenas ($${b2_tens}$) ao bloco da esquerda: $${b1} + ${b2_tens} = ${b1 + b2_tens}$.
            </div>`;
        }

        demoSteps.innerHTML = visualHtml;
      }

      demoFinal.classList.remove('hidden');
      finalRes.innerHTML = `$$${total}$$`;
      refreshMath(demoSteps);
      refreshMath(demoFinal);
    }

    function getStepByStepHtml(n, method) {
      const diff = n - 50;
      const total = n * n;
      if (method === 'wu') {
        const p1 = (n - 25) * 100;
        const p2 = diff * diff;
        return `
          <div class="mt-6 p-5 bg-zinc-900 rounded-3xl text-left border border-white/10 space-y-3 max-w-sm mx-auto">
            <p class="text-[9px] text-zinc-500 uppercase font-black tracking-widest mb-1">Raciocínio (Wu)</p>
            <p class="text-xs text-zinc-300">$(${n}-25) \\times 100 = ${p1}$</p>
            <p class="text-xs text-zinc-300">$(${n}-50)^2 = ${p2}$</p>
            <p class="text-lg font-bold text-yellow-400 pt-2 border-t border-white/10">Total: $${p1} + ${p2} = ${total}$</p>
          </div>`;
      }

      const b1 = 25 + diff;
      const b2 = diff * diff;
      const b2_tens = Math.floor(b2 / 100);
      const b2_units = b2 % 100;
      const b2Str = b2_units < 10 ? `0${b2_units}` : b2_units.toString();

      let explanation = '';
      if (b2 >= 100) {
        explanation = `
          <p class="text-xs text-zinc-300">Esquerda: $25 + (${diff}) = ${b1}$</p>
          <p class="text-xs text-zinc-300">Direita: $${b2}$</p>
          <p class="text-[10px] text-zinc-500 italic">Carry: Soma centenas ($${b2_tens}$) ao $${b1}$</p>
          <p class="text-lg font-bold text-emerald-400 pt-2 border-t border-white/10">Final: $(${b1} + ${b2_tens}) \\mid ${b2Str} = ${total}$</p>`;
      } else {
        explanation = `
          <p class="text-xs text-zinc-300">Esquerda: $25 + (${diff}) = ${b1}$</p>
          <p class="text-xs text-zinc-300">Direita: $${b2Str}$</p>
          <p class="text-lg font-bold text-emerald-400 pt-2 border-t border-white/10">Juntando: $${b1}${b2Str} = ${total}$</p>`;
      }

      return `
        <div class="mt-6 p-5 bg-zinc-900 rounded-3xl text-left border border-white/10 space-y-3 max-w-sm mx-auto">
          <p class="text-[9px] text-zinc-500 uppercase font-black tracking-widest mb-1">Raciocínio (Blocos)</p>
          ${explanation}
        </div>`;
    }

    function newPractice() {
      const n = Math.floor(Math.random() * 88) + 11;
      currentPractice = { n, result: n * n };
      practiceTarget.innerHTML = `$$${n}^2$$`;
      practiceInput.value = '';
      practiceFeedback.textContent = '';
      practiceInput.classList.remove('border-emerald-500', 'border-rose-500');
      practiceInput.focus();
      refreshMath(practiceTarget);
    }

    function checkPractice() {
      const userVal = parseInt(practiceInput.value, 10);
      if (Number.isNaN(userVal)) return;

      if (userVal === currentPractice.result) {
        streak += 1;
        streakEl.textContent = streak.toString();
        practiceFeedback.innerHTML = '<span class="text-emerald-400 font-bold uppercase tracking-widest">✓ Sensacional!</span>';
        practiceInput.classList.add('border-emerald-500');
        spawnConfetti();
        setTimeout(newPractice, 1000);
      } else {
        streak = 0;
        streakEl.textContent = '0';
        const stepsHtml = getStepByStepHtml(currentPractice.n, currentMethod);
        practiceFeedback.innerHTML = `
          <div class="text-red-500 font-bold">Incorreto! Era $${currentPractice.result}$$</div>
          ${stepsHtml}`;
        practiceInput.classList.add('border-rose-500');
        refreshMath(practiceFeedback);
        practiceInput.animate([
          { transform: 'translateX(-8px)' },
          { transform: 'translateX(8px)' },
          { transform: 'translateX(0)' }
        ], { duration: 300 });
      }
    }

    function solveForMe() {
      streak = 0;
      streakEl.textContent = '0';
      const stepsHtml = getStepByStepHtml(currentPractice.n, currentMethod);
      practiceFeedback.innerHTML = `
        <div class="text-zinc-400 mb-1">A solução é:</div>
        ${stepsHtml}`;
      refreshMath(practiceFeedback);
    }

    function spawnConfetti() {
      for (let i = 0; i < 15; i += 1) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.width = '6px';
        c.style.height = '6px';
        c.style.background = ['#fbbf24', '#fff', '#000'][Math.floor(Math.random() * 3)];
        c.style.left = `${Math.random() * 100}vw`;
        c.style.top = '-10px';
        document.body.appendChild(c);
        const anim = c.animate([
          { transform: 'translateY(0)', opacity: 1 },
          { transform: 'translateY(100vh) rotate(360deg)', opacity: 0 }
        ], { duration: 1500 });
        anim.onfinish = () => c.remove();
      }
    }

    window.onload = () => {
      updateHeroContent();
      updateProofContent();
      runDemo();
      newPractice();
    };

    practiceInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        checkPractice();
      }
    });
  </script>
</body>
</html>
